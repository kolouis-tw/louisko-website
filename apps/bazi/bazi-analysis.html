<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八字論命</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #191d24;
      --panel-2: #202631;
      --text: #f2efe6;
      --muted: #b3ad9f;
      --line: rgba(242, 239, 230, 0.16);
      --accent: #d8b86a;
      --wood: #39b777;
      --fire: #ef684f;
      --earth: #d1a34c;
      --metal: #cfd6df;
      --water: #4f96e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .back-link,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #151922;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    button.active {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy,
    .summary-panel,
    .section,
    .empty-state {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .hero-copy {
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
      font-weight: 650;
    }

    .summary-panel {
      padding: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      min-height: 86px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .chart-overview {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .pillar {
      min-height: 210px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .pillar-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .pillar-chars {
      display: grid;
      gap: 8px;
      justify-items: center;
      margin: 12px 0;
    }

    .char {
      display: grid;
      place-items: center;
      width: 62px;
      height: 62px;
      border: 1px solid currentColor;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 36px;
      font-weight: 950;
      line-height: 1;
    }

    .pillar-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section {
      padding: 18px;
    }

    .section.wide {
      grid-column: 1 / -1;
    }

    .section h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .tag {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
      font-weight: 800;
    }

    .evidence {
      margin: 10px 0 0;
      padding-left: 20px;
      color: #ddd7c8;
      line-height: 1.75;
      font-size: 15px;
      font-weight: 600;
    }

    .conclusion {
      margin: 14px 0 0;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--text);
      line-height: 1.8;
      font-size: 16px;
      font-weight: 720;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 36px 1fr 28px;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--muted);
      font-weight: 800;
    }

    .bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .monthly-card {
      min-height: 260px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shensha-card {
      min-height: 190px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .shensha-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-card h3 {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 20px;
    }

    .monthly-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 104px 72px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 700;
    }

    .timeline-item strong {
      color: var(--text);
      font-size: 18px;
    }

    .prompt-box {
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      background: #0d1016;
      color: #d8d2c2;
      font-size: 13px;
      line-height: 1.6;
    }

    .prompt-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .prompt-mode-group,
    .prompt-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .prompt-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .prompt-status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .prompt-status.safe { color: var(--wood); }
    .prompt-status.near { color: var(--earth); }
    .prompt-status.over { color: var(--fire); }

    .shensha-disclaimer {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-disclaimer {
      padding: 14px;
    }

    .shensha-disclaimer {
      margin-bottom: 12px;
      color: #ddd7c8;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 700;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
    }

    .wood { color: var(--wood); }
    .fire { color: var(--fire); }
    .earth { color: var(--earth); }
    .metal { color: var(--metal); }
    .water { color: var(--water); }

    @media (max-width: 860px) {
      .hero,
      .chart-overview,
      .monthly-grid,
      .shensha-grid,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      main {
        width: min(100vw - 20px, 520px);
        padding-top: 18px;
      }

      .topbar {
        display: grid;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero-copy,
      .summary-panel,
      .section {
        padding: 16px;
      }
    }
  </style>
  <link rel="stylesheet" href="../../assets/louisko-theme.css">
</head>
<body>
  <main class="bazi-analysis-page">
    <div class="topbar">
      <a class="louisko-page-brand" href="../../index.html" aria-label="Louisko 首頁">
        <img class="louisko-logo" src="../../assets/louis-logo-transparent.png" alt="Louis">
        <span class="louisko-brand-text">Louisko</span>
      </a>
      <a class="back-link" href="./">返回排盤</a>
      <div class="topbar-actions">
        <button class="primary" id="copy-prompt" type="button" hidden>複製 Prompt</button>
        <button id="download-prompt" type="button" hidden>下載 .md</button>
      </div>
    </div>

    <div id="app"></div>
  </main>

  <script>
    const elementClassByElement = { 木: "wood", 火: "fire", 土: "earth", 金: "metal", 水: "water" };
    const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const monthBranches = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
    const firstMonthStemByYearStem = { 甲: "丙", 己: "丙", 乙: "戊", 庚: "戊", 丙: "庚", 辛: "庚", 丁: "壬", 壬: "壬", 戊: "甲", 癸: "甲" };
    const branchMainStem = { 子: "癸", 丑: "己", 寅: "甲", 卯: "乙", 辰: "戊", 巳: "丙", 午: "丁", 未: "己", 申: "庚", 酉: "辛", 戌: "戊", 亥: "壬" };
    const stemElement = { 甲: "木", 乙: "木", 丙: "火", 丁: "火", 戊: "土", 己: "土", 庚: "金", 辛: "金", 壬: "水", 癸: "水" };
    const stemYinYang = { 甲: "陽", 乙: "陰", 丙: "陽", 丁: "陰", 戊: "陽", 己: "陰", 庚: "陽", 辛: "陰", 壬: "陽", 癸: "陰" };
    const branchElement = { 子: "水", 丑: "土", 寅: "木", 卯: "木", 辰: "土", 巳: "火", 午: "火", 未: "土", 申: "金", 酉: "金", 戌: "土", 亥: "水" };
    const elementGenerates = { 木: "火", 火: "土", 土: "金", 金: "水", 水: "木" };
    const elementControls = { 木: "土", 土: "水", 水: "火", 火: "金", 金: "木" };
    const MAX_PROMPT_CHARS = 6000;
    const SHEN_SHA_RULESET_VERSION = "core-v1.0";
    const SHEN_SHA_DISCLAIMER = "看八字神煞時，必須秉持「神煞不獨論，須配合日主旺衰、月令格局、用神喜忌與大運流年」的原則。";
    const PERMANENT_PROMPT_TARGET_MIN = 5000;
    const PERMANENT_PROMPT_TARGET_MAX = 8000;
    const PERMANENT_PROMPT_HARD_MAX = 10000;
    const solarTermMonthLabels = [
      { monthIndex: 1, branch: "寅", solarTermName: "立春", approximateGregorianRange: "約 2/4-3/5" },
      { monthIndex: 2, branch: "卯", solarTermName: "驚蟄", approximateGregorianRange: "約 3/5-4/4" },
      { monthIndex: 3, branch: "辰", solarTermName: "清明", approximateGregorianRange: "約 4/4-5/5" },
      { monthIndex: 4, branch: "巳", solarTermName: "立夏", approximateGregorianRange: "約 5/5-6/5" },
      { monthIndex: 5, branch: "午", solarTermName: "芒種", approximateGregorianRange: "約 6/5-7/7" },
      { monthIndex: 6, branch: "未", solarTermName: "小暑", approximateGregorianRange: "約 7/7-8/7" },
      { monthIndex: 7, branch: "申", solarTermName: "立秋", approximateGregorianRange: "約 8/7-9/7" },
      { monthIndex: 8, branch: "酉", solarTermName: "白露", approximateGregorianRange: "約 9/7-10/8" },
      { monthIndex: 9, branch: "戌", solarTermName: "寒露", approximateGregorianRange: "約 10/8-11/7" },
      { monthIndex: 10, branch: "亥", solarTermName: "立冬", approximateGregorianRange: "約 11/7-12/7" },
      { monthIndex: 11, branch: "子", solarTermName: "大雪", approximateGregorianRange: "約 12/7-隔年 1/5" },
      { monthIndex: 12, branch: "丑", solarTermName: "小寒", approximateGregorianRange: "約 1/5-2/4" }
    ];
    const monthSeason = {
      寅: "初春木旺，陽氣始生", 卯: "仲春木旺，木氣純粹", 辰: "季春土濕，木餘土起",
      巳: "初夏火旺，燥熱漸成", 午: "仲夏火旺，陽氣極盛", 未: "季夏土燥，火餘土厚",
      申: "初秋金旺，肅殺漸起", 酉: "仲秋金旺，金氣純粹", 戌: "季秋燥土，金餘火藏",
      亥: "初冬水旺，寒氣漸深", 子: "仲冬水旺，寒氣最重", 丑: "季冬寒土，水餘土凝"
    };
    const tenGodMeaning = {
      比肩: ["自主、同儕、自我", "固執、競爭、自我過強"],
      劫財: ["行動、冒險、人脈", "破財、衝動、爭奪"],
      食神: ["才華、享受、創作", "安逸、拖延、過度理想"],
      傷官: ["表達、創新、批判", "叛逆、口舌、衝撞權威"],
      正財: ["穩定、管理、現實", "保守、壓力、物質焦慮"],
      偏財: ["機會、商業、資源", "投機、分散、不穩"],
      正官: ["秩序、名聲、規範", "壓抑、拘束、畏懼權威"],
      七殺: ["競爭、魄力、危機處理", "壓力、衝突、急躁"],
      正印: ["學習、保護、正統資源", "依賴、保守、慢熱"],
      偏印: ["靈感、研究、非主流", "孤僻、想太多、不穩定"]
    };
    const pillarOrder = ["year", "month", "day", "hour"];
    const pillarLabels = { year: "年柱", month: "月柱", day: "日柱", hour: "時柱" };
    const shortPillarLabel = { year: "年", month: "月", day: "日", hour: "時" };
    const shenShaOrder = ["tian-yi", "wen-chang", "tian-de", "yue-de", "yi-ma", "tao-hua", "hua-gai", "yang-ren", "gu-chen", "gua-su", "yin-yang-cha-cuo"];
    const shenShaRuleMaps = {
      tianYi: { 甲: ["丑", "未"], 戊: ["丑", "未"], 庚: ["丑", "未"], 乙: ["子", "申"], 己: ["子", "申"], 丙: ["亥", "酉"], 丁: ["亥", "酉"], 壬: ["卯", "巳"], 癸: ["卯", "巳"], 辛: ["午", "寅"] },
      wenChang: { 甲: "巳", 乙: "午", 丙: "申", 丁: "酉", 戊: "申", 己: "酉", 庚: "亥", 辛: "子", 壬: "寅", 癸: "卯" },
      tianDe: {
        寅: { targetType: "stem", value: "丁" }, 卯: { targetType: "branch", value: "申" }, 辰: { targetType: "stem", value: "壬" },
        巳: { targetType: "stem", value: "辛" }, 午: { targetType: "branch", value: "亥" }, 未: { targetType: "stem", value: "甲" },
        申: { targetType: "stem", value: "癸" }, 酉: { targetType: "branch", value: "寅" }, 戌: { targetType: "stem", value: "丙" },
        亥: { targetType: "stem", value: "乙" }, 子: { targetType: "branch", value: "巳" }, 丑: { targetType: "stem", value: "庚" }
      },
      yueDe: { 寅: "丙", 午: "丙", 戌: "丙", 申: "壬", 子: "壬", 辰: "壬", 亥: "甲", 卯: "甲", 未: "甲", 巳: "庚", 酉: "庚", 丑: "庚" },
      yiMa: { 申: "寅", 子: "寅", 辰: "寅", 寅: "申", 午: "申", 戌: "申", 巳: "亥", 酉: "亥", 丑: "亥", 亥: "巳", 卯: "巳", 未: "巳" },
      taoHua: { 申: "酉", 子: "酉", 辰: "酉", 寅: "卯", 午: "卯", 戌: "卯", 巳: "午", 酉: "午", 丑: "午", 亥: "子", 卯: "子", 未: "子" },
      huaGai: { 寅: "戌", 午: "戌", 戌: "戌", 亥: "未", 卯: "未", 未: "未", 申: "辰", 子: "辰", 辰: "辰", 巳: "丑", 酉: "丑", 丑: "丑" },
      yangRen: { 甲: "卯", 丙: "午", 戊: "午", 庚: "酉", 壬: "子" },
      guChenGuaSu: {
        亥: { guChen: "寅", guaSu: "戌" }, 子: { guChen: "寅", guaSu: "戌" }, 丑: { guChen: "寅", guaSu: "戌" },
        寅: { guChen: "巳", guaSu: "丑" }, 卯: { guChen: "巳", guaSu: "丑" }, 辰: { guChen: "巳", guaSu: "丑" },
        巳: { guChen: "申", guaSu: "辰" }, 午: { guChen: "申", guaSu: "辰" }, 未: { guChen: "申", guaSu: "辰" },
        申: { guChen: "亥", guaSu: "未" }, 酉: { guChen: "亥", guaSu: "未" }, 戌: { guChen: "亥", guaSu: "未" }
      },
      yinYangChaCuo: new Set(["丙子", "丙午", "丁丑", "丁未", "戊寅", "戊申", "辛卯", "辛酉", "壬辰", "壬戌", "癸巳", "癸亥"])
    };
    let latestPromptExport = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
      })[char]);
    }

    function elementClass(element) {
      return elementClassByElement[element] ?? "";
    }

    function elementText(element) {
      return `<span class="${elementClass(element)}">${escapeHtml(element)}</span>`;
    }

    function getTenGod(dayMaster, targetStem) {
      if (dayMaster === targetStem) return "比肩";
      const dayElement = stemElement[dayMaster];
      const targetElement = stemElement[targetStem];
      const samePolarity = stemYinYang[dayMaster] === stemYinYang[targetStem];
      if (dayElement === targetElement) return samePolarity ? "比肩" : "劫財";
      if (elementGenerates[dayElement] === targetElement) return samePolarity ? "食神" : "傷官";
      if (elementControls[dayElement] === targetElement) return samePolarity ? "偏財" : "正財";
      if (elementControls[targetElement] === dayElement) return samePolarity ? "七殺" : "正官";
      if (elementGenerates[targetElement] === dayElement) return samePolarity ? "偏印" : "正印";
      return "資料不足";
    }

    function getAnnualMonths(yearStem) {
      const firstMonthStem = firstMonthStemByYearStem[yearStem];
      if (!firstMonthStem) throw new Error(`Invalid year stem: ${yearStem}`);
      const firstStemIndex = stems.indexOf(firstMonthStem);
      return monthBranches.map((branch, index) => {
        const stem = stems[(firstStemIndex + index) % stems.length];
        const label = solarTermMonthLabels[index];
        return {
          monthIndex: index + 1,
          solarTermName: label.solarTermName,
          approximateGregorianRange: label.approximateGregorianRange,
          stem,
          branch,
          pillar: `${stem}${branch}`,
          element: stemElement[stem],
          branchElement: branchElement[branch]
        };
      });
    }

    function enrichAnnualMonthsWithTenGods(annualMonths, dayStem) {
      return annualMonths.map((month) => ({
        ...month,
        tenGod: getTenGod(dayStem, month.stem),
        branchTenGod: getTenGod(dayStem, branchMainStem[month.branch])
      }));
    }

    function getPillarList(payload) {
      return [payload.pillars.year, payload.pillars.month, payload.pillars.day, payload.pillars.hour];
    }

    function getAllBranches(payload) {
      const branches = getPillarList(payload).map((pillar) => pillar.branch);
      if (payload.annualLuck?.branch) branches.push(payload.annualLuck.branch);
      if (payload.currentLuck?.branch) branches.push(payload.currentLuck.branch);
      return branches;
    }

    function strongestKey(record) {
      return Object.entries(record).sort((a, b) => b[1] - a[1])[0]?.[0] ?? "";
    }

    function weakestKey(record) {
      return Object.entries(record).sort((a, b) => a[1] - b[1])[0]?.[0] ?? "";
    }

    function analyzeStrength(payload) {
      const dayElement = payload.dayMaster.element;
      const monthBranch = payload.pillars.month.branch;
      const monthElement = payload.pillars.month.branchElement;
      let score = 50;
      const evidence = [];

      if (monthElement === dayElement) {
        score += 28;
        evidence.push(`日主${payload.dayMaster.stem}${dayElement}生於${monthBranch}月，月令同氣，得令有力。`);
      } else if (elementGenerates[monthElement] === dayElement) {
        score += 16;
        evidence.push(`${monthBranch}月之${monthElement}能生扶日主${dayElement}，月令有助。`);
      } else if (elementControls[monthElement] === dayElement) {
        score -= 22;
        evidence.push(`${monthBranch}月之${monthElement}制約日主${dayElement}，月令成壓。`);
      } else {
        evidence.push(`${monthBranch}月為${monthSeason[monthBranch] ?? "月令氣勢待校"}，需合看通根與透干。`);
      }

      const roots = getPillarList(payload).flatMap((pillar) =>
        (pillar.hiddenStems ?? [])
          .filter((hidden) => hidden.element === dayElement)
          .map((hidden) => ({ branch: pillar.branch, qiType: hidden.qiType }))
      );
      const rootScore = roots.reduce((sum, root) => sum + (root.qiType === "本氣" ? 18 : root.qiType === "中氣" ? 11 : 6), 0);
      score += rootScore;
      evidence.push(roots.length ? `地支見${roots.map((root) => `${root.branch}${root.qiType}`).join("、")}，日主有根。` : "四支藏干未見日主同氣，日主根氣偏少。");

      const supportCount = getPillarList(payload).filter((pillar) => pillar.stemElement === dayElement || elementGenerates[pillar.stemElement] === dayElement).length;
      const pressureCount = getPillarList(payload).filter((pillar) => elementControls[pillar.stemElement] === dayElement || elementControls[dayElement] === pillar.stemElement).length;
      score += supportCount * 5 - pressureCount * 4;
      evidence.push(`天干生扶同黨約 ${supportCount} 位，剋洩耗壓力約 ${pressureCount} 位。`);

      score = Math.max(0, Math.min(100, score));
      const level = score >= 76 ? "身強" : score >= 61 ? "偏強" : score >= 43 ? "中和" : score >= 28 ? "偏弱" : "身弱";
      const conclusion = level.includes("強")
        ? "日主氣勢不弱，論命宜看能否洩秀、制衡與調候，不宜一味再增生扶。"
        : level.includes("弱")
          ? "日主承載力偏弱，宜先看印比扶身與根氣是否可用，再談財官食傷。"
          : "日主大致中和，格局、調候與大運引動會成為判斷重點。";

      return { id: "day-master-strength", title: "日主旺衰", subtitle: `${level}｜分數 ${score}`, score, tags: [level, payload.dayMaster.stem + payload.dayMaster.element], evidence, conclusion };
    }

    function analyzeFiveElements(payload) {
      const counts = payload.fiveElements;
      const dominant = strongestKey(counts);
      const weak = weakestKey(counts);
      const monthElement = payload.pillars.month.branchElement;
      const evidence = [
        `五行表面數量以${dominant}較顯，${weak}較少。`,
        `月令為${payload.pillars.month.branch}，其主氣屬${monthElement}，故${monthElement}得時令加權。`,
        "五行不可只看數量，仍需合看透干、通根、合沖與調候。"
      ];
      const conclusion = `此局五行氣勢以${dominant}與月令${monthElement}為觀察重心。若能形成「生而有承、洩而不枯」之流通，則結構較順；若某氣過旺無制，便成命局之病。`;
      return { id: "five-element-flow", title: "五行氣勢", subtitle: `旺象 ${dominant}｜弱象 ${weak}`, tags: [dominant + "較顯", weak + "較少"], evidence, conclusion };
    }

    function analyzeTenGod(payload) {
      const counts = payload.tenGodCounts ?? {};
      const strongest = strongestKey(counts);
      const monthMainGod = payload.pillars.month.branchMainTenGod;
      const visible = getPillarList(payload).map((pillar) => pillar.tenGodStem).filter((god) => god && god !== "日主");
      const meaning = tenGodMeaning[strongest] ?? ["資料不足", "資料不足"];
      return {
        id: "ten-god-structure",
        title: "十神結構",
        subtitle: `較顯十神：${strongest || "待判"}`,
        tags: [monthMainGod ? `月令主氣${monthMainGod}` : "月令待判", ...visible.slice(0, 4)],
        evidence: [
          `十神統計以${strongest || "資料不足"}較顯，其正向象為「${meaning[0]}」，陰影象為「${meaning[1]}」。`,
          `月令主氣為${payload.pillars.month.branchMainStem}${monthMainGod}，格局判定須先看月令，不以數量最多者獨斷。`,
          `天干透出十神包含：${visible.join("、") || "資料不足"}。`
        ],
        conclusion: `${strongest || "主要十神"}為命局重要取象，但須看是否得令、是否通根，以及是否被合沖破壞；旺而有制為用，旺而失衡則成壓。`
      };
    }

    function analyzeInteractions(payload) {
      const branches = getAllBranches(payload);
      const pairs = [
        ["六合", "子", "丑", "土"], ["六合", "寅", "亥", "木"], ["六合", "卯", "戌", "火"], ["六合", "辰", "酉", "金"], ["六合", "巳", "申", "水"], ["六合", "午", "未", "土"],
        ["六沖", "子", "午"], ["六沖", "丑", "未"], ["六沖", "寅", "申"], ["六沖", "卯", "酉"], ["六沖", "辰", "戌"], ["六沖", "巳", "亥"],
        ["六害", "子", "未"], ["六害", "丑", "午"], ["六害", "寅", "巳"], ["六害", "卯", "辰"], ["六害", "申", "亥"], ["六害", "酉", "戌"]
      ];
      const found = pairs.filter((item) => branches.includes(item[1]) && branches.includes(item[2]));
      const evidence = found.length
        ? found.map((item) => `${item[1]}${item[2]}見${item[0]}${item[3] ? `，有化${item[3]}之象，仍需看月令與透干是否成化。` : "，主變動牽引，吉凶視其所沖之宮位與用忌而定。"}`)
        : ["目前原局、大運、流年地支未見明顯六合、六沖、六害成組。"];
      return {
        id: "stem-branch-interactions",
        title: "干支作用",
        subtitle: found.length ? `見 ${found.length} 組作用` : "作用較少",
        tags: found.map((item) => `${item[1]}${item[2]}${item[0]}`),
        evidence,
        conclusion: "合沖刑害不是直接判吉凶；合可成局也可合去用神，沖可破根也可沖開阻滯，必須放回日主旺衰、月令與大運流年中判斷。"
      };
    }

    function findBranchInteractions(monthBranch, payload) {
      const relations = [
        ["合", "子", "丑", "子丑合土"], ["合", "寅", "亥", "寅亥合木"], ["合", "卯", "戌", "卯戌合火"], ["合", "辰", "酉", "辰酉合金"], ["合", "巳", "申", "巳申合水"], ["合", "午", "未", "午未合土"],
        ["沖", "子", "午", "子午沖"], ["沖", "丑", "未", "丑未沖"], ["沖", "寅", "申", "寅申沖"], ["沖", "卯", "酉", "卯酉沖"], ["沖", "辰", "戌", "辰戌沖"], ["沖", "巳", "亥", "巳亥沖"],
        ["害", "子", "未", "子未害"], ["害", "丑", "午", "丑午害"], ["害", "寅", "巳", "寅巳害"], ["害", "卯", "辰", "卯辰害"], ["害", "申", "亥", "申亥害"], ["害", "酉", "戌", "酉戌害"]
      ];
      const targets = [
        ...Object.entries(payload.pillars).map(([key, pillar]) => ({ target: "原局", key, branch: pillar.branch })),
        payload.currentLuck?.branch ? { target: "大運", key: "currentLuck", branch: payload.currentLuck.branch } : null,
        payload.annualLuck?.branch ? { target: "流年", key: "annualLuck", branch: payload.annualLuck.branch } : null
      ].filter(Boolean);
      const result = [];
      for (const item of targets) {
        for (const [type, a, b, description] of relations) {
          if ((monthBranch === a && item.branch === b) || (monthBranch === b && item.branch === a)) {
            const palace = item.key === "day" ? "，引動日支夫妻宮" : item.key === "month" ? "，引動月柱事業宮" : "";
            result.push({ target: item.target, type, description: `${description}見於流月與${item.target}${palace}` });
          }
        }
      }
      return result;
    }

    function tenGodTheme(tenGod) {
      const map = {
        比肩: ["自我能量與同儕互動增強", "宜把競爭化為作品與行動，少作意氣之爭。"],
        劫財: ["人際、合作與資源爭奪感較明", "合作可談，但財務承諾宜白紙黑字。"],
        食神: ["創作、表達與享受生活", "適合整理作品與穩定輸出，避免過度安逸。"],
        傷官: ["表達、突破與制度摩擦", "宜用專業說話，少用情緒挑戰權威。"],
        正財: ["穩定收入、管理與現實責任", "適合做預算、收款、整理資源。"],
        偏財: ["機會、商業、人脈與外部資源", "可主動開啟合作，但不宜投機過快。"],
        正官: ["規範、職責、名聲與秩序", "宜守規矩、重承諾，適合處理正式事務。"],
        七殺: ["壓力、競爭、決斷與危機處理", "宜化壓力為紀律，避免急躁硬碰。"],
        正印: ["學習、保護、資格與正統資源", "適合進修、整理方法論、尋求長輩貴人。"],
        偏印: ["靈感、研究、非主流路線", "適合深度研究，但需避免想太多而不落地。"]
      };
      return map[tenGod] ?? ["本月主題待判", "資料不足，暫不判定。"];
    }

    function analyzeAnnualMonths(payload) {
      if (!payload.annualLuck?.stem) return [];
      return enrichAnnualMonthsWithTenGods(getAnnualMonths(payload.annualLuck.stem), payload.dayMaster.stem).map((month) => {
        const interactions = findBranchInteractions(month.branch, payload);
        const [theme, advice] = tenGodTheme(month.tenGod);
        const interactionText = interactions.length
          ? interactions.map((item) => item.description).join("；")
          : "本月與原局、大運、流年未見明顯六合、六沖、六害成組。";
        return {
          ...month,
          interactions,
          theme,
          evidence: `${month.pillar}以${month.solarTermName}起，約略區間為${month.approximateGregorianRange}；天干${month.stem}${month.element}為${month.tenGod}，地支${month.branch}${month.branchElement}主氣為${month.branchTenGod}。${interactionText}`,
          advice
        };
      });
    }

    function getPillarsForShenSha(payload) {
      return {
        year: { stem: payload.pillars.year.stem, branch: payload.pillars.year.branch },
        month: { stem: payload.pillars.month.stem, branch: payload.pillars.month.branch },
        day: { stem: payload.pillars.day.stem, branch: payload.pillars.day.branch },
        hour: { stem: payload.pillars.hour.stem, branch: payload.pillars.hour.branch }
      };
    }

    function summarizeShenShaBasis(basisList) {
      return uniqueList((basisList ?? []).map((basis) => basis.label ?? `${basis.type}:${basis.value}`)).join("、");
    }

    function calculateShenShaStatic(chart, options = {}) {
      const entries = pillarOrder.map((key) => [key, chart[key]]);
      const rawHits = [];
      const yangRenMode = options.yangRenMode ?? "yang-stems-only";
      const pushHit = (config) => {
        rawHits.push({
          ruleSetVersion: SHEN_SHA_RULESET_VERSION,
          pillarLabel: pillarLabels[config.pillar],
          position: config.pillar,
          ...config
        });
      };
      const addBranchMappedHits = (id, name, category, meaning, map, references) => {
        references.forEach((basis) => {
          const target = map[basis.value];
          entries.forEach(([pillarKey, pillar]) => {
            if (pillar.branch === target) {
              pushHit({
                id,
                name,
                category,
                pillar: pillarKey,
                matchedOn: "branch",
                matchedValue: pillar.branch,
                basis: [basis],
                meaning
              });
            }
          });
        });
      };
      const addStemMappedHits = (id, name, category, meaning, targets, basis) => {
        entries.forEach(([pillarKey, pillar]) => {
          if (targets.includes(pillar.branch)) {
            pushHit({
              id,
              name,
              category,
              pillar: pillarKey,
              matchedOn: "branch",
              matchedValue: pillar.branch,
              basis: [basis],
              meaning
            });
          }
        });
      };

      addStemMappedHits("tian-yi", "天乙貴人", "貴人扶助", "遇事較易得助力、貴人、緩衝與轉機。", shenShaRuleMaps.tianYi[chart.day.stem] ?? [], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });
      addStemMappedHits("wen-chang", "文昌貴人", "學習表達", "較利學習、表達、整理知識、寫作與考試節奏。", [shenShaRuleMaps.wenChang[chart.day.stem]], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });

      const tianDeRule = shenShaRuleMaps.tianDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        const matches = tianDeRule.targetType === "stem"
          ? pillar.stem === tianDeRule.value
          : pillar.branch === tianDeRule.value;
        if (matches) {
          pushHit({
            id: "tian-de",
            name: "天德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: tianDeRule.targetType,
            matchedValue: tianDeRule.targetType === "stem" ? pillar.stem : pillar.branch,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "多主緩和、化解、善意資源與轉圜空間。"
          });
        }
      });

      const yueDeTarget = shenShaRuleMaps.yueDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.stem === yueDeTarget) {
          pushHit({
            id: "yue-de",
            name: "月德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: "stem",
            matchedValue: pillar.stem,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "較利以溫和方式化解壓力，也較易得人情與支持。"
          });
        }
      });

      const branchReferences = [
        { type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` },
        { type: "dayBranch", value: chart.day.branch, label: `依日支${chart.day.branch}查得` }
      ];
      addBranchMappedHits("yi-ma", "驛馬", "遷移變動", "多主移動、節奏變化、奔波、外務與跨域連結。", shenShaRuleMaps.yiMa, branchReferences);
      addBranchMappedHits("tao-hua", "桃花", "人際魅力", "多主人緣、吸引力、審美與情感互動題材。", shenShaRuleMaps.taoHua, branchReferences);
      addBranchMappedHits("hua-gai", "華蓋", "藝文思辨", "多主藝術感、獨立思考、研究氣質與精神世界。", shenShaRuleMaps.huaGai, branchReferences);

      if (yangRenMode === "yang-stems-only" && shenShaRuleMaps.yangRen[chart.day.stem]) {
        addStemMappedHits("yang-ren", "羊刃", "剛烈決斷", "多主衝勁、競爭、決斷與壓力承受題材。", [shenShaRuleMaps.yangRen[chart.day.stem]], {
          type: "dayStem",
          value: chart.day.stem,
          label: `依日干${chart.day.stem}查得（陽干版）`
        });
      }

      const lonelyTargets = shenShaRuleMaps.guChenGuaSu[chart.year.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.branch === lonelyTargets.guChen) {
          pushHit({
            id: "gu-chen",
            name: "孤辰",
            category: "孤高內傾",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易呈現獨立、自持、保留距離感的一面。"
          });
        }
        if (pillar.branch === lonelyTargets.guaSu) {
          pushHit({
            id: "gua-su",
            name: "寡宿",
            category: "情感保留",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易慢熱、內斂，在關係裡保留觀察空間。"
          });
        }
      });

      const dayPillar = `${chart.day.stem}${chart.day.branch}`;
      if (shenShaRuleMaps.yinYangChaCuo.has(dayPillar)) {
        pushHit({
          id: "yin-yang-cha-cuo",
          name: "陰陽差錯",
          category: "日柱特殊",
          pillar: "day",
          matchedOn: "pillar",
          matchedValue: dayPillar,
          basis: [{ type: "dayPillar", value: dayPillar, label: `依日柱${dayPillar}查得` }],
          meaning: "多主節奏與人事拿捏較有反差感，需更看整體結構。"
        });
      }

      const dedupedMap = new Map();
      rawHits.forEach((hit) => {
        const key = `${hit.id}:${hit.pillar}:${hit.matchedOn}:${hit.matchedValue}`;
        const existing = dedupedMap.get(key);
        if (existing) {
          existing.basis = [...existing.basis, ...hit.basis];
        } else {
          dedupedMap.set(key, { ...hit });
        }
      });

      const hits = [...dedupedMap.values()]
        .map((hit) => ({
          ...hit,
          basis: uniqueList(hit.basis.map((item) => JSON.stringify(item))).map((item) => JSON.parse(item))
        }))
        .sort((a, b) => {
          const orderA = shenShaOrder.indexOf(a.id);
          const orderB = shenShaOrder.indexOf(b.id);
          if (orderA !== orderB) return orderA - orderB;
          return pillarOrder.indexOf(a.pillar) - pillarOrder.indexOf(b.pillar);
        });

      const names = uniqueList(hits.map((hit) => hit.name));
      return {
        ruleSetVersion: SHEN_SHA_RULESET_VERSION,
        disclaimer: SHEN_SHA_DISCLAIMER,
        hits,
        summary: names.length
          ? `核心神煞命中 ${names.join("、")}。神煞只作輔助，仍須回到原局、大運、流年與喜忌同看。`
          : "本命盤未見核心神煞明顯集中成象，仍以原局旺衰、格局、用神與大運流年為主。"
      };
    }

    function analyzePattern(payload, strength) {
      const monthGod = payload.pillars.month.branchMainTenGod;
      const map = { 正官: "正官格", 七殺: "七殺格", 正財: "正財格", 偏財: "偏財格", 食神: "食神格", 傷官: "傷官格", 正印: "正印格", 偏印: "偏印格", 比肩: "建祿/月劫類", 劫財: "月劫格" };
      const pattern = map[monthGod] ?? "格局待判";
      return {
        id: "structure-pattern",
        title: "格局判定",
        subtitle: pattern,
        tags: [pattern, strength.subtitle.split("｜")[0]],
        evidence: [
          `子平格局先取月令，月支${payload.pillars.month.branch}主氣為${payload.pillars.month.branchMainStem}${monthGod}。`,
          `依月令主氣，初步可觀察為「${pattern}」。`,

    function validatePromptLength(prompt) {
      const chars = String(prompt ?? "").length;
      return {
        chars,
        max: MAX_PROMPT_CHARS,
        status: chars > MAX_PROMPT_CHARS ? "超過上限" : chars >= Math.round(MAX_PROMPT_CHARS * 0.85) ? "接近上限" : "安全"
      };
    }

    function buildCompactBaziPrompt(data) {
      const variants = [
        { shortRules: false, shortShenSha: false, ultraCompact: false },
        { shortRules: true, shortShenSha: false, ultraCompact: false },
        { shortRules: true, shortShenSha: true, ultraCompact: false },
        { shortRules: true, shortShenSha: true, ultraCompact: true }
      ];
      let lastPrompt = "";
      for (const options of variants) {
        const prompt = buildCompactPromptSections(data, options);
        lastPrompt = prompt;
        if (validatePromptLength(prompt).chars <= MAX_PROMPT_CHARS) return prompt;
      }
      return lastPrompt;
    }

    function createPromptEntry(label, filenameSuffix, prompt, validation, extra = {}) {
      return {
        label,
        filenameSuffix,
        prompt,
        validation,

      const fullPayload = { ...payload, monthlyLuck: annualMonths, shenSha: shenShaResult };
      const data = { payload: fullPayload, sections, annualMonths, shenShaResult };
      const fullPrompt = buildFullBaziPrompt(data);
      const permanentPrompt = buildPermanentBaziPrompt(data);
      return {
        debug: createPromptEntry("完整除錯資料", "debug", fullPrompt, validatePromptLength(fullPrompt)),
        permanent: createPromptEntry("永久 AI Prompt", "permanent", permanentPrompt, validatePermanentPromptLength(permanentPrompt)),
        mode: "permanent"
      };
    }

    function buildAiPrompt(payload, sections, annualMonths, shenShaResult) {
      return buildPromptExportState(payload, sections, annualMonths, shenShaResult).permanent.prompt;

      const annualMonths = analyzeAnnualMonths(payload);
      const shenShaResult = calculateShenShaStatic(getPillarsForShenSha(payload));
      const strength = analyzeStrength(payload);
      const elementFlow = analyzeFiveElements(payload);

      const pattern = analyzePattern(payload, strength);
      const climate = analyzeClimate(payload);

      const luck = analyzeLuck(payload);
      const annual = analyzeAnnual(payload);
      const monthly = analyzeMonthly(payload, annualMonths);
      const domains = analyzeDomains(payload, tenGod, favorable);
      const shenSha = analyzeShenSha(payload, shenShaResult);
      const sections = [strength, elementFlow, tenGod, interactions, pattern, climate, favorable, domains, luck, annual, monthly, shenSha];
      return {
        sections,
        annualMonths,
        shenShaResult,
        promptExport: buildPromptExportState(payload, sections, annualMonths, shenShaResult),
        aiPrompt: buildAiPrompt({ ...payload, monthlyLuck: annualMonths, shenSha: shenShaResult }, sections, annualMonths, shenShaResult)

    async function copyCurrentPrompt() {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      await navigator.clipboard.writeText(current.prompt);
      const button = document.getElementById("copy-prompt");
      if (!button) return;
      button.textContent = "已複製";
      setTimeout(() => {
        const latestButton = document.getElementById("copy-prompt");
        if (latestButton) latestButton.textContent = "複製 Prompt";
      }, 1200);
    }

    function downloadCurrentPrompt(payload) {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      const blob = new Blob([current.prompt], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = getPromptFilename(current.filenameSuffix, payload);
      link.click();
      URL.revokeObjectURL(url);
    }

      downloadButton.hidden = false;
      copyButton.onclick = () => { copyCurrentPrompt().catch(() => {}); };
      downloadButton.onclick = () => downloadCurrentPrompt(payload);

      if (!payload?.pillars?.day || !payload?.dayMaster) renderEmptyState();
      else renderBaziAnalysis(payload);
    } catch (error) {
      renderEmptyState();
    }
  </script>
