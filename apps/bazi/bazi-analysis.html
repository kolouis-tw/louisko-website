<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八字論命</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #191d24;
      --panel-2: #202631;
      --text: #f2efe6;
      --muted: #b3ad9f;
      --line: rgba(242, 239, 230, 0.16);
      --accent: #d8b86a;
      --wood: #39b777;
      --fire: #ef684f;
      --earth: #d1a34c;
      --metal: #cfd6df;
      --water: #4f96e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .back-link,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #151922;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    button.active {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy,
    .summary-panel,
    .section,
    .empty-state {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .hero-copy {
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
      font-weight: 650;
    }

    .summary-panel {
      padding: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      min-height: 86px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .chart-overview {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .pillar {
      min-height: 210px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .pillar-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .pillar-chars {
      display: grid;
      gap: 8px;
      justify-items: center;
      margin: 12px 0;
    }

    .char {
      display: grid;
      place-items: center;
      width: 62px;
      height: 62px;
      border: 1px solid currentColor;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 36px;
      font-weight: 950;
      line-height: 1;
    }

    .pillar-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section {
      padding: 18px;
    }

    .section.wide {
      grid-column: 1 / -1;
    }

    .section h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .tag {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
      font-weight: 800;
    }

    .evidence {
      margin: 10px 0 0;
      padding-left: 20px;
      color: #ddd7c8;
      line-height: 1.75;
      font-size: 15px;
      font-weight: 600;
    }

    .conclusion {
      margin: 14px 0 0;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--text);
      line-height: 1.8;
      font-size: 16px;
      font-weight: 720;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 36px 1fr 28px;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--muted);
      font-weight: 800;
    }

    .bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .monthly-card {
      min-height: 260px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shensha-card {
      min-height: 190px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .shensha-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-card h3 {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 20px;
    }

    .monthly-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 104px 72px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 700;
    }

    .timeline-item strong {
      color: var(--text);
      font-size: 18px;
    }

    .prompt-box {
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      background: #0d1016;
      color: #d8d2c2;
      font-size: 13px;
      line-height: 1.6;
    }

    .prompt-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .prompt-mode-group,
    .prompt-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .prompt-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .prompt-status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .prompt-status.safe { color: var(--wood); }
    .prompt-status.near { color: var(--earth); }
    .prompt-status.over { color: var(--fire); }

    .shensha-disclaimer {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-disclaimer {
      padding: 14px;
    }

    .shensha-disclaimer {
      margin-bottom: 12px;
      color: #ddd7c8;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 700;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
    }

    .wood { color: var(--wood); }
    .fire { color: var(--fire); }
    .earth { color: var(--earth); }
    .metal { color: var(--metal); }
    .water { color: var(--water); }

    @media (max-width: 860px) {
      .hero,
      .chart-overview,
      .monthly-grid,
      .shensha-grid,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      main {
        width: min(100vw - 20px, 520px);
        padding-top: 18px;
      }

      .topbar {
        display: grid;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero-copy,
      .summary-panel,
      .section {
        padding: 16px;
      }
    }
  </style>

      { type: "害", a: "子", b: "未", label: "子未害" },
      { type: "害", a: "丑", b: "午", label: "丑午害" },
      { type: "害", a: "寅", b: "巳", label: "寅巳害" },
      { type: "害", a: "卯", b: "辰", label: "卯辰害" },
      { type: "害", a: "申", b: "亥", label: "申亥害" },
      { type: "害", a: "酉", b: "戌", label: "酉戌害" }
    ];
    const supportedConditionalBranches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    let latestPromptExport = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
      })[char]);
    }

    function elementClass(element) {
      return elementClassByElement[element] ?? "";
    }

    function elementText(element) {
      return `<span class="${elementClass(element)}">${escapeHtml(element)}</span>`;
    }

    function getTenGod(dayMaster, targetStem) {
      if (dayMaster === targetStem) return "比肩";
      const dayElement = stemElement[dayMaster];
      const targetElement = stemElement[targetStem];
      const samePolarity = stemYinYang[dayMaster] === stemYinYang[targetStem];
      if (dayElement === targetElement) return samePolarity ? "比肩" : "劫財";
      if (elementGenerates[dayElement] === targetElement) return samePolarity ? "食神" : "傷官";
      if (elementControls[dayElement] === targetElement) return samePolarity ? "偏財" : "正財";
      if (elementControls[targetElement] === dayElement) return samePolarity ? "七殺" : "正官";
      if (elementGenerates[targetElement] === dayElement) return samePolarity ? "偏印" : "正印";
      return "資料不足";
    }

    function getAnnualMonths(yearStem) {
      const firstMonthStem = firstMonthStemByYearStem[yearStem];
      if (!firstMonthStem) throw new Error(`Invalid year stem: ${yearStem}`);
      const firstStemIndex = stems.indexOf(firstMonthStem);
      return monthBranches.map((branch, index) => {
        const stem = stems[(firstStemIndex + index) % stems.length];
        const label = solarTermMonthLabels[index];
        return {
          monthIndex: index + 1,
          solarTermName: label.solarTermName,
          approximateGregorianRange: label.approximateGregorianRange,
          stem,
          branch,
          pillar: `${stem}${branch}`,
          element: stemElement[stem],
          branchElement: branchElement[branch]
        };
      });
    }

    function enrichAnnualMonthsWithTenGods(annualMonths, dayStem) {
      return annualMonths.map((month) => ({
        ...month,
        tenGod: getTenGod(dayStem, month.stem),
        branchTenGod: getTenGod(dayStem, branchMainStem[month.branch])
      }));
    }

    function buildChartSignature(chart, ruleVersion = "") {
      const pillars = [chart?.pillars?.year?.pillar, chart?.pillars?.month?.pillar, chart?.pillars?.day?.pillar, chart?.pillars?.hour?.pillar].filter(Boolean).join("-");
      const timezone = chart?.user?.timezone ?? "unknown-timezone";
      const dayChangeRule = chart?.user?.dayChangeRule ?? "unknown-day-change";
      const direction = chart?.luckStartInfo?.direction ?? "unknown-direction";
      const startAge = chart?.luckStartInfo?.startAge ?? "unknown-start-age";
      return [pillars, timezone, dayChangeRule, direction, startAge, ruleVersion || "no-rule-version"].join("|");
    }

    function getPillarList(payload) {
      return [payload.pillars.year, payload.pillars.month, payload.pillars.day, payload.pillars.hour];
    }

    function getPillarListByChart(chart) {
      return [chart.pillars.year, chart.pillars.month, chart.pillars.day, chart.pillars.hour];
    }

    function getNatalBranches(chart) {
      return getPillarListByChart(chart).map((pillar) => pillar.branch);
    }

    function getAllBranches(payload) {
      const branches = getPillarList(payload).map((pillar) => pillar.branch);
      if (payload.annualLuck?.branch) branches.push(payload.annualLuck.branch);
      if (payload.currentLuck?.branch) branches.push(payload.currentLuck.branch);
      return branches;
    }

    function createLifetimeAdvisorSource(payload, sections, annualMonths, shenShaResult) {
      const chart = { ...payload, monthlyLuck: annualMonths, shenSha: shenShaResult };
      const currentLuck = (chart.luckCycles ?? []).find((cycle) =>
        chart.currentLuck && cycle.pillar === chart.currentLuck.pillar && cycle.ageStart === chart.currentLuck.ageStart
      ) || null;
      return {
        chart,
        natalAnalysis: {
          sections,
          sectionMap: getSectionMap(sections)
        },
        luckCycles: chart.luckCycles ?? [],
        currentLuck,
        shenSha: shenShaResult?.hits ?? [],
        metadata: {
          version: LIFETIME_PROMPT_VERSION,
          ruleVersion: shenShaResult?.ruleSetVersion ?? "",
          generatedAt: new Date().toISOString(),
          chartSignature: buildChartSignature(chart, shenShaResult?.ruleSetVersion ?? ""),
          targetYear: chart.annualLuck?.year ?? null
        }
      };
    }

    function strongestKey(record) {
      return Object.entries(record).sort((a, b) => b[1] - a[1])[0]?.[0] ?? "";
    }

    function weakestKey(record) {
      return Object.entries(record).sort((a, b) => a[1] - b[1])[0]?.[0] ?? "";
    }

    function getStrengthResult(score) {
      const boundedScore = Math.max(0, Math.min(100, Number(score ?? 0)));
      if (boundedScore >= 76) return { category: "strong", label: "身強", score: boundedScore };
      if (boundedScore >= 61) return { category: "slightlyStrong", label: "偏強", score: boundedScore };
      if (boundedScore >= 53) return { category: "balancedStrong", label: "中和偏強", score: boundedScore };
      if (boundedScore >= 43) return { category: "balancedWeak", label: "中和偏弱", score: boundedScore };
      if (boundedScore >= 28) return { category: "slightlyWeak", label: "偏弱", score: boundedScore };
      return { category: "weak", label: "身弱", score: boundedScore };
    }

    function formatStrengthLabel(result) {
      if (!result) return "待判";
      return `${result.label}（${result.score}）`;
    }

    function analyzeStrength(payload) {
      const dayElement = payload.dayMaster.element;
      const monthBranch = payload.pillars.month.branch;
      const monthElement = payload.pillars.month.branchElement;
      let score = 50;
      const evidence = [];

      if (monthElement === dayElement) {
        score += 28;
        evidence.push(`日主${payload.dayMaster.stem}${dayElement}生於${monthBranch}月，月令同氣，得令有力。`);
      } else if (elementGenerates[monthElement] === dayElement) {
        score += 16;
        evidence.push(`${monthBranch}月之${monthElement}能生扶日主${dayElement}，月令有助。`);
      } else if (elementControls[monthElement] === dayElement) {
        score -= 22;
        evidence.push(`${monthBranch}月之${monthElement}制約日主${dayElement}，月令成壓。`);
      } else {
        evidence.push(`${monthBranch}月為${monthSeason[monthBranch] ?? "月令氣勢待校"}，需合看通根與透干。`);
      }

      const roots = getPillarList(payload).flatMap((pillar) =>
        (pillar.hiddenStems ?? [])
          .filter((hidden) => hidden.element === dayElement)
          .map((hidden) => ({ branch: pillar.branch, qiType: hidden.qiType }))
      );
      const rootScore = roots.reduce((sum, root) => sum + (root.qiType === "本氣" ? 18 : root.qiType === "中氣" ? 11 : 6), 0);
      score += rootScore;
      evidence.push(roots.length ? `地支見${roots.map((root) => `${root.branch}${root.qiType}`).join("、")}，日主有根。` : "四支藏干未見日主同氣，日主根氣偏少。");

      const supportCount = getPillarList(payload).filter((pillar) => pillar.stemElement === dayElement || elementGenerates[pillar.stemElement] === dayElement).length;
      const pressureCount = getPillarList(payload).filter((pillar) => elementControls[pillar.stemElement] === dayElement || elementControls[dayElement] === pillar.stemElement).length;
      score += supportCount * 5 - pressureCount * 4;
      evidence.push(`天干生扶同黨約 ${supportCount} 位，剋洩耗壓力約 ${pressureCount} 位。`);

      const strengthResult = getStrengthResult(score);
      const level = strengthResult.label;
      const conclusion = level.includes("強")
        ? "日主氣勢不弱，論命宜看能否洩秀、制衡與調候，不宜一味再增生扶。"
        : level.includes("弱")
          ? "日主承載力偏弱，宜先看印比扶身與根氣是否可用，再談財官食傷。"
          : "日主大致中和，格局、調候與大運引動會成為判斷重點。";

      return {
        id: "day-master-strength",
        title: "日主旺衰",
        subtitle: formatStrengthLabel(strengthResult),
        score: strengthResult.score,
        strengthResult,
        tags: [level, payload.dayMaster.stem + payload.dayMaster.element],
        evidence,
        conclusion
      };
    }

    function analyzeFiveElements(payload) {
      const counts = payload.fiveElements;
      const dominant = strongestKey(counts);
      const weak = weakestKey(counts);
      const monthElement = payload.pillars.month.branchElement;
      const evidence = [
        `五行表面數量以${dominant}較顯，${weak}較少。`,
        `月令為${payload.pillars.month.branch}，其主氣屬${monthElement}，故${monthElement}得時令加權。`,
        "五行不可只看數量，仍需合看透干、通根、合沖與調候。"
      ];
      const conclusion = `此局五行氣勢以${dominant}與月令${monthElement}為觀察重心。若能形成「生而有承、洩而不枯」之流通，則結構較順；若某氣過旺無制，便成命局之病。`;
      return { id: "five-element-flow", title: "五行氣勢", subtitle: `旺象 ${dominant}｜弱象 ${weak}`, tags: [dominant + "較顯", weak + "較少"], evidence, conclusion };
    }

    function analyzeTenGod(payload) {
      const counts = payload.tenGodCounts ?? {};
      const strongest = strongestKey(counts);
      const monthMainGod = payload.pillars.month.branchMainTenGod;
      const visible = getPillarList(payload).map((pillar) => pillar.tenGodStem).filter((god) => god && god !== "日主");
      const meaning = tenGodMeaning[strongest] ?? ["資料不足", "資料不足"];
      return {
        id: "ten-god-structure",
        title: "十神結構",
        subtitle: `較顯十神：${strongest || "待判"}`,
        tags: [monthMainGod ? `月令主氣${monthMainGod}` : "月令待判", ...visible.slice(0, 4)],
        evidence: [
          `十神統計以${strongest || "資料不足"}較顯，其正向象為「${meaning[0]}」，陰影象為「${meaning[1]}」。`,
          `月令主氣為${payload.pillars.month.branchMainStem}${monthMainGod}，格局判定須先看月令，不以數量最多者獨斷。`,
          `天干透出十神包含：${visible.join("、") || "資料不足"}。`
        ],
        conclusion: `${strongest || "主要十神"}為命局重要取象，但須看是否得令、是否通根，以及是否被合沖破壞；旺而有制為用，旺而失衡則成壓。`
      };
    }

    function formatRepeatedBranchTag(branch, count) {
      if (count === 2) return `雙${branch}同支重現`;
      return `${branch}支重現${count}次`;
    }

    function getNatalInteractionAnalysis(chart) {
      const natalBranches = getNatalBranches(chart);
      const branchCounts = natalBranches.reduce((acc, branch) => {
        acc[branch] = (acc[branch] ?? 0) + 1;
        return acc;
      }, {});
      const pairTags = natalInteractionRules
        .filter((rule) => natalBranches.includes(rule.a) && natalBranches.includes(rule.b))
        .map((rule) => rule.label);
      const repeatedTags = Object.entries(branchCounts)
        .filter(([, count]) => count > 1)
        .map(([branch, count]) => formatRepeatedBranchTag(branch, count));
      const branchElements = natalBranches.map((branch) => branchElement[branch]).filter(Boolean);
      const elementCounts = branchElements.reduce((acc, element) => {
        acc[element] = (acc[element] ?? 0) + 1;
        return acc;
      }, {});
      const concentratedTags = Object.entries(elementCounts)
        .filter(([, count]) => count >= 2)
        .map(([element]) => `${element}勢集中`);
      const conditionalNotes = supportedConditionalBranches
        .filter((branch) => !natalBranches.includes(branch))
        .map((branch) => {
          const hits = natalInteractionRules
            .filter((rule) => (rule.a === branch && natalBranches.includes(rule.b)) || (rule.b === branch && natalBranches.includes(rule.a)))
            .map((rule) => rule.label);
          return hits.length ? `逢${branch}可引動：${uniqueList(hits).join("、")}` : null;
        })
        .filter(Boolean);
      return {
        natalBranches,
        tags: uniqueList([...pairTags, ...repeatedTags, ...concentratedTags]),
        fixed: uniqueList([...pairTags, ...repeatedTags, ...concentratedTags]),
        conditionalNotes,
        branchCounts
      };
    }

    function analyzeInteractions(payload) {
      const natal = getNatalInteractionAnalysis(payload);
      const evidence = [];
      if (natal.fixed.length) {
        evidence.push(`原局固有：${natal.fixed.join("、")}。`);
      } else {
        evidence.push("原局固有：四支之間未見明顯合沖害成組。");
      }
      if (natal.conditionalNotes.length) {
        evidence.push(`條件式引動：${natal.conditionalNotes.slice(0, 3).join("；")}。`);
      }
      return {
        id: "stem-branch-interactions",
        title: "干支作用",
        subtitle: natal.fixed.length ? `原局見 ${natal.fixed.length} 組固定訊號` : "原局作用較少",
        tags: natal.tags,
        evidence,
        conclusion: "合沖刑害不是直接判吉凶；合可成局也可合去用神，沖可破根也可沖開阻滯，必須放回日主旺衰、月令與大運流年中判斷。"
      };
    }

    function findBranchInteractions(monthBranch, payload) {
      const relations = [
        ["合", "子", "丑", "子丑合土"], ["合", "寅", "亥", "寅亥合木"], ["合", "卯", "戌", "卯戌合火"], ["合", "辰", "酉", "辰酉合金"], ["合", "巳", "申", "巳申合水"], ["合", "午", "未", "午未合土"],
        ["沖", "子", "午", "子午沖"], ["沖", "丑", "未", "丑未沖"], ["沖", "寅", "申", "寅申沖"], ["沖", "卯", "酉", "卯酉沖"], ["沖", "辰", "戌", "辰戌沖"], ["沖", "巳", "亥", "巳亥沖"],
        ["害", "子", "未", "子未害"], ["害", "丑", "午", "丑午害"], ["害", "寅", "巳", "寅巳害"], ["害", "卯", "辰", "卯辰害"], ["害", "申", "亥", "申亥害"], ["害", "酉", "戌", "酉戌害"]
      ];
      const targets = [
        ...Object.entries(payload.pillars).map(([key, pillar]) => ({ target: "原局", key, branch: pillar.branch })),
        payload.currentLuck?.branch ? { target: "大運", key: "currentLuck", branch: payload.currentLuck.branch } : null,
        payload.annualLuck?.branch ? { target: "流年", key: "annualLuck", branch: payload.annualLuck.branch } : null
      ].filter(Boolean);
      const result = [];
      for (const item of targets) {
        for (const [type, a, b, description] of relations) {
          if ((monthBranch === a && item.branch === b) || (monthBranch === b && item.branch === a)) {
            const palace = item.key === "day" ? "，引動日支夫妻宮" : item.key === "month" ? "，引動月柱事業宮" : "";
            result.push({ target: item.target, type, description: `${description}見於流月與${item.target}${palace}` });
          }
        }
      }
      return result;
    }

    function tenGodTheme(tenGod) {
      const map = {
        比肩: ["自我能量與同儕互動增強", "宜把競爭化為作品與行動，少作意氣之爭。"],
        劫財: ["人際、合作與資源爭奪感較明", "合作可談，但財務承諾宜白紙黑字。"],
        食神: ["創作、表達與享受生活", "適合整理作品與穩定輸出，避免過度安逸。"],
        傷官: ["表達、突破與制度摩擦", "宜用專業說話，少用情緒挑戰權威。"],
        正財: ["穩定收入、管理與現實責任", "適合做預算、收款、整理資源。"],
        偏財: ["機會、商業、人脈與外部資源", "可主動開啟合作，但不宜投機過快。"],
        正官: ["規範、職責、名聲與秩序", "宜守規矩、重承諾，適合處理正式事務。"],
        七殺: ["壓力、競爭、決斷與危機處理", "宜化壓力為紀律，避免急躁硬碰。"],
        正印: ["學習、保護、資格與正統資源", "適合進修、整理方法論、尋求長輩貴人。"],
        偏印: ["靈感、研究、非主流路線", "適合深度研究，但需避免想太多而不落地。"]
      };
      return map[tenGod] ?? ["本月主題待判", "資料不足，暫不判定。"];
    }

    function analyzeAnnualMonths(payload) {
      if (!payload.annualLuck?.stem) return [];
      return enrichAnnualMonthsWithTenGods(getAnnualMonths(payload.annualLuck.stem), payload.dayMaster.stem).map((month) => {
        const interactions = findBranchInteractions(month.branch, payload);
        const [theme, advice] = tenGodTheme(month.tenGod);
        const interactionText = interactions.length
          ? interactions.map((item) => item.description).join("；")
          : "本月與原局、大運、流年未見明顯六合、六沖、六害成組。";
        return {
          ...month,
          interactions,
          theme,
          evidence: `${month.pillar}以${month.solarTermName}起，約略區間為${month.approximateGregorianRange}；天干${month.stem}${month.element}為${month.tenGod}，地支${month.branch}${month.branchElement}主氣為${month.branchTenGod}。${interactionText}`,
          advice
        };
      });
    }

    function getPillarsForShenSha(payload) {
      return {
        year: { stem: payload.pillars.year.stem, branch: payload.pillars.year.branch },
        month: { stem: payload.pillars.month.stem, branch: payload.pillars.month.branch },
        day: { stem: payload.pillars.day.stem, branch: payload.pillars.day.branch },
        hour: { stem: payload.pillars.hour.stem, branch: payload.pillars.hour.branch }
      };
    }

    function summarizeShenShaBasis(basisList) {
      return uniqueList((basisList ?? []).map((basis) => basis.label ?? `${basis.type}:${basis.value}`)).join("、");
    }

    function calculateShenShaStatic(chart, options = {}) {
      const entries = pillarOrder.map((key) => [key, chart[key]]);
      const rawHits = [];
      const yangRenMode = options.yangRenMode ?? "yang-stems-only";
      const pushHit = (config) => {
        rawHits.push({
          ruleSetVersion: SHEN_SHA_RULESET_VERSION,
          pillarLabel: pillarLabels[config.pillar],
          position: config.pillar,
          ...config
        });
      };
      const addBranchMappedHits = (id, name, category, meaning, map, references) => {
        references.forEach((basis) => {
          const target = map[basis.value];
          entries.forEach(([pillarKey, pillar]) => {
            if (pillar.branch === target) {
              pushHit({
                id,
                name,
                category,
                pillar: pillarKey,
                matchedOn: "branch",
                matchedValue: pillar.branch,
                basis: [basis],
                meaning
              });
            }
          });
        });
      };
      const addStemMappedHits = (id, name, category, meaning, targets, basis) => {
        entries.forEach(([pillarKey, pillar]) => {
          if (targets.includes(pillar.branch)) {
            pushHit({
              id,
              name,
              category,
              pillar: pillarKey,
              matchedOn: "branch",
              matchedValue: pillar.branch,
              basis: [basis],
              meaning
            });
          }
        });
      };

      addStemMappedHits("tian-yi", "天乙貴人", "貴人扶助", "遇事較易得助力、貴人、緩衝與轉機。", shenShaRuleMaps.tianYi[chart.day.stem] ?? [], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });
      addStemMappedHits("wen-chang", "文昌貴人", "學習表達", "較利學習、表達、整理知識、寫作與考試節奏。", [shenShaRuleMaps.wenChang[chart.day.stem]], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });

      const tianDeRule = shenShaRuleMaps.tianDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        const matches = tianDeRule.targetType === "stem"
          ? pillar.stem === tianDeRule.value
          : pillar.branch === tianDeRule.value;
        if (matches) {
          pushHit({
            id: "tian-de",
            name: "天德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: tianDeRule.targetType,
            matchedValue: tianDeRule.targetType === "stem" ? pillar.stem : pillar.branch,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "多主緩和、化解、善意資源與轉圜空間。"
          });
        }
      });

      const yueDeTarget = shenShaRuleMaps.yueDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.stem === yueDeTarget) {
          pushHit({
            id: "yue-de",
            name: "月德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: "stem",
            matchedValue: pillar.stem,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "較利以溫和方式化解壓力，也較易得人情與支持。"
          });
        }
      });

      const branchReferences = [
        { type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` },
        { type: "dayBranch", value: chart.day.branch, label: `依日支${chart.day.branch}查得` }
      ];
      addBranchMappedHits("yi-ma", "驛馬", "遷移變動", "多主移動、節奏變化、奔波、外務與跨域連結。", shenShaRuleMaps.yiMa, branchReferences);
      addBranchMappedHits("tao-hua", "桃花", "人際魅力", "多主人緣、吸引力、審美與情感互動題材。", shenShaRuleMaps.taoHua, branchReferences);
      addBranchMappedHits("hua-gai", "華蓋", "藝文思辨", "多主藝術感、獨立思考、研究氣質與精神世界。", shenShaRuleMaps.huaGai, branchReferences);

      if (yangRenMode === "yang-stems-only" && shenShaRuleMaps.yangRen[chart.day.stem]) {
        addStemMappedHits("yang-ren", "羊刃", "剛烈決斷", "多主衝勁、競爭、決斷與壓力承受題材。", [shenShaRuleMaps.yangRen[chart.day.stem]], {
          type: "dayStem",
          value: chart.day.stem,
          label: `依日干${chart.day.stem}查得（陽干版）`
        });
      }

      const lonelyTargets = shenShaRuleMaps.guChenGuaSu[chart.year.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.branch === lonelyTargets.guChen) {
          pushHit({
            id: "gu-chen",
            name: "孤辰",
            category: "孤高內傾",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易呈現獨立、自持、保留距離感的一面。"
          });
        }
        if (pillar.branch === lonelyTargets.guaSu) {
          pushHit({
            id: "gua-su",
            name: "寡宿",
            category: "情感保留",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易慢熱、內斂，在關係裡保留觀察空間。"
          });
        }
      });

      const dayPillar = `${chart.day.stem}${chart.day.branch}`;
      if (shenShaRuleMaps.yinYangChaCuo.has(dayPillar)) {
        pushHit({
          id: "yin-yang-cha-cuo",
          name: "陰陽差錯",
          category: "日柱特殊",
          pillar: "day",
          matchedOn: "pillar",
          matchedValue: dayPillar,
          basis: [{ type: "dayPillar", value: dayPillar, label: `依日柱${dayPillar}查得` }],
          meaning: "多主節奏與人事拿捏較有反差感，需更看整體結構。"
        });
      }

      const dedupedMap = new Map();
      rawHits.forEach((hit) => {
        const key = `${hit.id}:${hit.pillar}:${hit.matchedOn}:${hit.matchedValue}`;
        const existing = dedupedMap.get(key);
        if (existing) {
          existing.basis = [...existing.basis, ...hit.basis];
        } else {
          dedupedMap.set(key, { ...hit });
        }
      });

      const hits = [...dedupedMap.values()]
        .map((hit) => ({
          ...hit,
          basis: uniqueList(hit.basis.map((item) => JSON.stringify(item))).map((item) => JSON.parse(item))
        }))
        .sort((a, b) => {
          const orderA = shenShaOrder.indexOf(a.id);
          const orderB = shenShaOrder.indexOf(b.id);
          if (orderA !== orderB) return orderA - orderB;
          return pillarOrder.indexOf(a.pillar) - pillarOrder.indexOf(b.pillar);
        });

      const names = uniqueList(hits.map((hit) => hit.name));
      return {
        ruleSetVersion: SHEN_SHA_RULESET_VERSION,
        disclaimer: SHEN_SHA_DISCLAIMER,
        hits,
        summary: names.length
          ? `核心神煞命中 ${names.join("、")}。神煞只作輔助，仍須回到原局、大運、流年與喜忌同看。`
          : "本命盤未見核心神煞明顯集中成象，仍以原局旺衰、格局、用神與大運流年為主。"
      };
    }

      const normalized = String(subtitle ?? "").trim();
      if (!normalized) return "待判";
      const parenMatch = normalized.match(/^(.*?)（(\d+)）$/);
      if (parenMatch) return normalized;
      const legacyMatch = normalized.match(/^(.*?)｜分數\s*(\d+)/);
      if (legacyMatch) return `${legacyMatch[1]}（${legacyMatch[2]}）`;
      return normalized;
    }

    function buildFiveElementMomentum(chart) {
      const hiddenByElement = getPillarListByChart(chart).flatMap((pillar) => pillar.hiddenStems ?? []).reduce((acc, hidden) => {

        return acc;
      }, {});
      const exposedByElement = getPillarListByChart(chart).reduce((acc, pillar) => {
        acc[pillar.stemElement] = (acc[pillar.stemElement] ?? 0) + 1;
        return acc;
      }, {});
      const monthElement = chart.pillars.month.branchElement;
      const natalBranches = getNatalBranches(chart);
      return ["木", "火", "土", "金", "水"].map((element) => {
        const seasonalStrength = monthElement === element
          ? "得月令"
          : elementGenerates[monthElement] === element
            ? "受月令生扶"
            : elementControls[monthElement] === element
              ? "受月令制約"
              : "月令不直接扶助";
        const rootedness = hiddenByElement[element]
          ? `藏干見 ${hiddenByElement[element]} 處根氣`
          : "藏干根氣偏少";
        const exposed = exposedByElement[element]
          ? `天干透出 ${exposedByElement[element]} 位`
          : "天干未透";
        const role = element === chart.dayMaster.element
          ? "屬日主本氣，觀其承載與續航"
          : elementGenerates[element] === chart.dayMaster.element
            ? "偏向資源、生扶與保護"
            : elementGenerates[chart.dayMaster.element] === element
              ? "偏向輸出、表達與耗力"
              : elementControls[chart.dayMaster.element] === element
                ? "偏向財務、成果與現實承接"
                : "偏向壓力、規範與責任測試";
        const branchCount = natalBranches.filter((branch) => branchElement[branch] === element).length;
        const conclusion = branchCount >= 2
          ? `${element}在地支成勢，需看是否過旺或能否流通。`
          : seasonalStrength === "得月令"
            ? `${element}得令，是本局氣機重心。`
            : `${element}需結合透干、藏干與時運再定其輕重。`;
        return { element, seasonalStrength, rootedness, exposed, role, conclusion };
      });

    function collectCycleRelations(chart, cycleBranch) {
      if (!cycleBranch) return [];
      return getPillarListByChart(chart).flatMap((pillar, index) => {
        const key = pillarOrder[index];
        const sameBranch = pillar.branch === cycleBranch;
        const sameBranchRelation = sameBranch ? {
          targetKey: key,
          targetLabel: pillarLabels[key],
          targetBranch: pillar.branch,
          type: "同支重現",
          label: `${cycleBranch}與${pillar.branch}同支重現`
        } : null;
        const pairRelations = natalInteractionRules
          .filter((rule) => (rule.a === cycleBranch && rule.b === pillar.branch) || (rule.b === cycleBranch && rule.a === pillar.branch))
          .map((rule) => ({
            targetKey: key,
            targetLabel: pillarLabels[key],
            targetBranch: pillar.branch,
            type: rule.type,
            label: rule.label
          }));
        return [sameBranchRelation, ...pairRelations].filter(Boolean);
      });
    }

    function analyzeLuckCycleEffects(chart, cycle) {
      if (!cycle?.pillar) {
        return {
          relations: [],
          monthTouched: false,
          dayTouched: false,
          yearTouched: false,
          hourTouched: false,
          monthConflict: false,
          fullPillarRepeat: false,
          stemRepeat: false,
          branchRepeat: false,
          repeatedBranchCount: 0,
          repeatedBranchNote: ""
        };
      }
      const { stem, branch } = splitPillar(cycle.pillar);
      const relations = collectCycleRelations(chart, branch);
      const monthTouched = relations.some((relation) => relation.targetKey === "month");
      const dayTouched = relations.some((relation) => relation.targetKey === "day");
      const yearTouched = relations.some((relation) => relation.targetKey === "year");
      const hourTouched = relations.some((relation) => relation.targetKey === "hour");
      const monthConflict = relations.some((relation) => relation.targetKey === "month" && relation.type === "沖");
      const fullPillarRepeat = getPillarListByChart(chart).some((pillar) => pillar.pillar === cycle.pillar);
      const stemRepeat = getPillarListByChart(chart).some((pillar) => pillar.stem === stem);
      const repeatedBranchMatches = getPillarListByChart(chart).filter((pillar) => pillar.branch === branch);
      const branchRepeat = repeatedBranchMatches.length > 0;
      const repeatedBranchCount = repeatedBranchMatches.length;
      const touchedBranchCounts = relations.reduce((acc, relation) => {
        acc[relation.targetBranch] = (acc[relation.targetBranch] ?? 0) + 1;
        return acc;
      }, {});
      const repeatedTargetBranchEntry = Object.entries(touchedBranchCounts).find(([, count]) => count >= 2) ?? null;
      const repeatedBranchNote = repeatedBranchCount >= 2
        ? `同時引動 ${repeatedBranchCount} 個${branch}`
        : repeatedBranchCount === 1
          ? `${branch}支重現`
          : repeatedTargetBranchEntry
            ? `同時引動 ${repeatedTargetBranchEntry[1]} 個${repeatedTargetBranchEntry[0]}`
            : "";
      return {
        relations,
        monthTouched,
        dayTouched,
        yearTouched,
        hourTouched,
        monthConflict,
        fullPillarRepeat,
        stemRepeat,
        branchRepeat,
        repeatedBranchCount,
        repeatedTargetBranch: repeatedTargetBranchEntry?.[0] ?? "",
        repeatedTargetBranchCount: Number(repeatedTargetBranchEntry?.[1] ?? 0),
        repeatedBranchNote
      };
    }

      const actual = new Set(getNatalInteractionAnalysis({ pillars: Object.fromEntries(

      ) }).tags);
      const listed = Array.isArray(interactions)
        ? interactions
        : String(interactions ?? "").split("｜").map((item) => item.trim()).filter(Boolean);
      const invalid = listed.filter((item) => !actual.has(item));
      return {
        actual: [...actual],
        listed,
        invalid,
        invalidCount: invalid.length
      };
    }

    function validateLifetimePrompt(prompt) {
      const chars = String(prompt ?? "").length;
      let status = "理想範圍";
      if (chars < LIFETIME_PROMPT_TARGET_MIN) status = "內容偏短";
      else if (chars > LIFETIME_PROMPT_HARD_MAX) status = "超過上限";
      else if (chars > LIFETIME_PROMPT_TARGET_MAX) status = "接近上限";
      return {
        chars,
        min: LIFETIME_PROMPT_TARGET_MIN,
        max: LIFETIME_PROMPT_TARGET_MAX,
        hardMax: LIFETIME_PROMPT_HARD_MAX,
        status
      };
    }

    function getPromptSection(prompt, heading) {
      const text = String(prompt ?? "");
      const start = text.indexOf(heading);
      if (start === -1) return "";
      const rest = text.slice(start + heading.length);
      const nextHeadingIndex = rest.search(/\n#{1,3} /);
      return nextHeadingIndex === -1 ? rest.trim() : rest.slice(0, nextHeadingIndex).trim();
    }

    function getPromptLine(prompt, prefix) {
      return String(prompt ?? "").split("\n").find((line) => line.startsWith(prefix)) ?? "";
    }

    function extractPillarValue(line) {
      return line.split("：")[1]?.trim() ?? "";
    }

    function validatePromptChartConsistency(source, prompt) {
      const chart = source.chart;
      const errors = [];
      const lineChecks = [
        ["年柱：", chart.pillars.year.pillar],
        ["月柱：", chart.pillars.month.pillar],
        ["日柱：", chart.pillars.day.pillar],
        ["時柱：", chart.pillars.hour.pillar],
        ["日主：", `${chart.dayMaster.stem}${chart.dayMaster.element}`],
        ["換日法：", chart.user.dayChangeRule]
      ];
      lineChecks.forEach(([prefix, expected]) => {
        const line = getPromptLine(prompt, prefix);
        if (line && extractPillarValue(line) !== expected) errors.push(`${prefix}${extractPillarValue(line)} 應為 ${expected}`);
      });
      const spouseMatches = [...String(prompt).matchAll(/日支([子丑寅卯辰巳午未申酉戌亥])/g)].map((match) => match[1]);
      spouseMatches.forEach((branch) => {
        if (branch !== chart.pillars.day.branch) errors.push(`夫妻宮引用日支${branch}，應為日支${chart.pillars.day.branch}`);
      });
      return {
        errors,
        passed: errors.length === 0
      };
    }

    function validateTenGodConsistency(chart, prompt) {
      const errors = [];
      stems.forEach((stem) => {
        const expected = getTenGod(chart.dayMaster.stem, stem);
        Object.keys(tenGodMeaning).forEach((god) => {
          if (god === expected) return;
          if (String(prompt).includes(`${stem}${god}`)) errors.push(`${stem} 誤標為 ${god}，應為 ${expected}`);
        });
      });
      return {
        errors: uniqueList(errors),
        passed: errors.length === 0
      };
    }

    function validateHiddenStemConsistency(chart, prompt) {
      const errors = [];
      const pillarPrefixes = { year: "- 年柱", month: "- 月柱", day: "- 日柱", hour: "- 時柱" };
      pillarOrder.forEach((key) => {
        const pillar = chart.pillars[key];
        const line = String(prompt).split("\n").find((item) => item.startsWith(`${pillarPrefixes[key]}${pillar.pillar}`)) ?? "";
        if (!line) return;
        const expected = (pillar.hiddenStems ?? []).map((hidden) => `${hidden.stem}${hidden.tenGod}`);
        expected.forEach((token) => {
          if (!line.includes(token)) errors.push(`${pillarLabels[key]}缺少藏干 ${token}`);
        });
        stems.forEach((stem) => {
          const correct = expected.some((token) => token.startsWith(stem));
          if (!correct && line.includes(`${stem}藏`)) errors.push(`${pillarLabels[key]}混入非本柱藏干 ${stem}`);
        });
      });
      return {
        errors: uniqueList(errors),
        passed: errors.length === 0
      };
    }

    function validateLifeDomainEvidence(source, lifeDomainSection) {
      const chart = source.chart;
      const errors = [];
      const allowedPillars = new Set(getPillarListByChart(chart).map((pillar) => pillar.pillar));
      const foundPillars = String(lifeDomainSection).match(/[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]/g) ?? [];
      foundPillars.forEach((pillar) => {

      spouseMatches.forEach((branch) => {

    function detectRepeatedTemplateSentences(prompt) {
      const normalizedLines = String(prompt)
        .split("\n")
        .map((line) => line.trim())
        .filter((line) => line.length >= 20 && !line.startsWith("#") && !line.startsWith("- 命造") && !line.startsWith("- 引動") && !line.startsWith("- 是否") && !line.startsWith("- 與原局"));
      const counts = normalizedLines.reduce((acc, line) => {
        acc[line] = (acc[line] ?? 0) + 1;
        return acc;
      }, {});
      const repeatedExact = Object.entries(counts)
        .filter(([line, count]) => count > 4 && !line.includes("原局作用"))
        .map(([line, count]) => `${line}（重複 ${count} 次）`);
      const skeletonCounts = normalizedLines.reduce((acc, line) => {
        const skeleton = line
          .replace(/[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]/g, "{干支}")
          .replace(/\d{4}-\d{4}/g, "{年份區間}")
          .replace(/\d+-\d+歲/g, "{年齡區間}")
          .replace(/[甲乙丙丁戊己庚辛壬癸]/g, "{干}")
          .replace(/[子丑寅卯辰巳午未申酉戌亥]/g, "{支}");
        acc[skeleton] = (acc[skeleton] ?? 0) + 1;
        return acc;
      }, {});
      const repeatedSkeleton = Object.entries(skeletonCounts)
        .filter(([skeleton, count]) => count > 8 && skeleton.includes("{"))
        .map(([skeleton, count]) => `${skeleton}（高相似 ${count} 次）`);
      return uniqueList([...repeatedExact, ...repeatedSkeleton]);
    }

        if (!effect.monthConflict && section.includes("沖月令：是")) errors.push(`${cycle.pillar}大運誤判為沖月令`);
        if (effect.repeatedBranchCount >= 2 && !section.includes(`同時引動 ${effect.repeatedBranchCount} 個${cycle.branch}`)) {
          errors.push(`${cycle.pillar}大運漏寫同時引動 ${effect.repeatedBranchCount} 個${cycle.branch}`);

      return {

      const chartConsistency = validatePromptChartConsistency(source, prompt);

      const canonicalStrength = source.natalAnalysis.sectionMap["day-master-strength"]?.strengthResult?.label ?? "";
      const contradictoryStrengthLabels = uniqueList(strengthMatches.filter((label) => canonicalStrength && label !== canonicalStrength));
      const unresolvedPlaceholders = uniqueList((String(prompt).match(/待判|暫定|待權威曆法|placeholder/g) ?? []));
      const foreignChartContamination = uniqueList([
        ...chartConsistency.errors,
        ...lifeDomain.errors

        tenGodErrors: tenGod.errors,

    function countOccurrences(haystack, needle) {
      if (!needle) return 0;
      return String(haystack).split(needle).length - 1;

    function analyzePromptQuality(prompt, source) {
      const genericPhrases = [
        "若能把喜用之氣用在可累積的路線",
        "特別在目前大運與強烈流年交會時",
        "選擇可驗證、可修正的策略",
        "先看原局承接，再看大運支持",
        "能承接就擴張，不能承接就修正"
      ];
      const repeatedSentenceCount = genericPhrases.reduce((sum, phrase) => {
        const count = countOccurrences(prompt, phrase);
        return sum + Math.max(0, count - 1);
      }, 0);
      const genericSectionCount = (String(prompt).match(/十神、格局、調候皆以網站定盤為準/g) ?? []).length;
      const sourceValidation = validateLifetimeAdvisorSource(source);
      const promptValidation = validateGeneratedLifetimePrompt(source, prompt);
      const unresolvedPlaceholderCount = promptValidation.unresolvedPlaceholders.length;
      const duplicatedLuckCycleParagraphCount = Math.max(0, ((String(prompt).match(/【此運策略】/g) ?? []).length) - new Set((source.luckCycles ?? []).map((cycle) => cycle.pillar)).size);
      const missingEvidenceSections = [];
      String(prompt).split("\n### ").slice(1).forEach((sectionText) => {
        const title = sectionText.split("\n")[0].trim();
        if (title === "AI指令區") return;
        if (!sectionText.includes("【依據】") && !sectionText.includes("【與原局關係】")) missingEvidenceSections.push(title);
      });
      const score = Math.max(0, 100
        - repeatedSentenceCount * 6
        - genericSectionCount * 4
        - promptValidation.natalInteractionErrors.length * 15
        - promptValidation.chartConsistencyErrors.length * 12
        - promptValidation.tenGodErrors.length * 12
        - promptValidation.hiddenStemErrors.length * 12
        - promptValidation.luckCycleErrors.length * 12
        - promptValidation.foreignChartContamination.length * 15
        - promptValidation.repeatedTemplateSentences.length * 4
        - promptValidation.contradictoryStrengthLabels.length * 12
        - unresolvedPlaceholderCount * 10
        - duplicatedLuckCycleParagraphCount * 8
        - missingEvidenceSections.length * 5);
      return {
        ...promptValidation,
        sourceErrors: sourceValidation.errors,
        repeatedSentenceCount,
        genericSectionCount,
        invalidNatalInteractionCount: promptValidation.natalInteractionErrors.length,
        unresolvedPlaceholderCount,
        duplicatedLuckCycleParagraphCount,
        missingEvidenceSections,
        score,
        passed: sourceValidation.passed && promptValidation.passed
      };
    }

      const domains = analyzeDomains(payload, tenGod, favorable);
      const shenSha = analyzeShenSha(payload, shenShaResult);
      const sections = [strength, elementFlow, tenGod, interactions, pattern, climate, favorable, domains, luck, annual, monthly, shenSha];
      return {
        sections,
        annualMonths,
        shenShaResult,
        promptExport: buildPromptExportState(payload, sections, annualMonths, shenShaResult),
        aiPrompt: buildAiPrompt({ ...payload, monthlyLuck: annualMonths, shenSha: shenShaResult }, sections, annualMonths, shenShaResult)
      };
    }

    function renderPillar(pillar, title) {
      return `
        <article class="pillar">
          <div class="pillar-label">${title}</div>
          <div class="pillar-chars">
            <div class="char ${elementClass(pillar.stemElement)}">${escapeHtml(pillar.stem)}</div>
            <div class="char ${elementClass(pillar.branchElement)}">${escapeHtml(pillar.branch)}</div>
          </div>
          <div class="pillar-meta">
            天干 ${elementText(pillar.stemElement)}｜${escapeHtml(pillar.tenGodStem)}<br>
            地支 ${elementText(pillar.branchElement)}｜主氣 ${escapeHtml(pillar.branchMainStem)}${escapeHtml(pillar.branchMainTenGod)}<br>
            藏干 ${(pillar.hiddenStems ?? []).map((hidden) => `${escapeHtml(hidden.stem)}${escapeHtml(hidden.tenGod)}`).join("、") || "無"}
          </div>
        </article>
      `;
    }

    function renderElementBars(fiveElements) {
      const max = Math.max(1, ...Object.values(fiveElements));
      return Object.entries(fiveElements).map(([element, count]) => `
        <div class="bar-row">
          <span class="${elementClass(element)}">${element}</span>
          <div class="bar-track"><div class="bar-fill ${elementClass(element)}" style="width:${Math.round(count / max * 100)}%; background: currentColor;"></div></div>
          <span>${count}</span>
        </div>
      `).join("");
    }

    function renderSection(section) {
      return `
        <section class="section ${section.id === "life-domains" || section.id === "luck-cycle-analysis" ? "wide" : ""}" id="${escapeHtml(section.id)}">
          <h2>${escapeHtml(section.title)}</h2>
          <p class="subtitle">${escapeHtml(section.subtitle ?? "")}</p>
          <div class="tags">${(section.tags ?? []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          <ul class="evidence">${(section.evidence ?? []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          <p class="conclusion">${escapeHtml(section.conclusion)}</p>
        </section>
      `;
    }

    function renderTimeline(cycles) {
      if (!cycles?.length) return "<p class=\"subtitle\">目前缺少大運資料。</p>";
      return `<div class="timeline">${cycles.map((cycle) => `
        <div class="timeline-item">
          <span>${cycle.ageStart}-${cycle.ageEnd} 歲</span>
          <strong>${escapeHtml(cycle.pillar)}</strong>
          <span>天干 ${escapeHtml(cycle.stemTenGod)}，地支 ${escapeHtml(cycle.branchTenGod)}；五行主題 ${escapeHtml((cycle.elementTheme ?? []).join("、"))}</span>
        </div>
      `).join("")}</div>`;
    }

    function renderAnnualMonths(months) {
      if (!months.length) return "<p class=\"subtitle\">目前缺少流年資料，暫不產生流月。</p>";
      return `<div class="monthly-grid">${months.map((month) => `
        <article class="monthly-card">
          <h3>${escapeHtml(month.pillar)}月</h3>
          <p class="subtitle">${escapeHtml(month.solarTermName)}起｜${escapeHtml(month.approximateGregorianRange)}</p>
          <div class="monthly-meta">
            <span class="tag">十神 ${escapeHtml(month.tenGod)}</span>
            <span class="tag">五行 ${escapeHtml(month.element)}${escapeHtml(month.branchElement)}</span>
            <span class="tag">主氣 ${escapeHtml(month.branchTenGod)}</span>
          </div>
          <p><strong>本月主題：</strong>${escapeHtml(month.theme)}</p>
          <p><strong>命理依據：</strong>${escapeHtml(month.evidence)}</p>
          <p><strong>結論建議：</strong>${escapeHtml(month.advice)}</p>
        </article>
      `).join("")}</div>`;
    }

    function renderShenSha(result) {
      if (!result.hits.length) {
        return `
          <p class="shensha-disclaimer">${escapeHtml(result.disclaimer)}</p>
          <p class="conclusion">${escapeHtml(result.summary)}</p>
        `;
      }
      return `
        <p class="shensha-disclaimer">${escapeHtml(result.disclaimer)}</p>
        <p class="conclusion">${escapeHtml(result.summary)}</p>
        <div class="shensha-grid">${result.hits.map((hit) => `
          <article class="shensha-card">
            <h3>${escapeHtml(hit.name)}</h3>
            <div class="tags">
              <span class="tag">${escapeHtml(hit.category)}</span>
              <span class="tag">${escapeHtml(hit.pillarLabel)}</span>
              <span class="tag">${escapeHtml(hit.matchedValue)}</span>
            </div>
            <p><strong>依據：</strong>${escapeHtml(summarizeShenShaBasis(hit.basis))}</p>
            <p><strong>命中：</strong>${escapeHtml(hit.pillarLabel)}・${escapeHtml(hit.matchedValue)}</p>
            <p><strong>簡義：</strong>${escapeHtml(hit.meaning)}</p>
          </article>
        `).join("")}</div>
      `;
    }

    function renderEmptyState() {
      document.getElementById("app").innerHTML = `
        <section class="empty-state">
          <h1>尚未取得命盤資料</h1>
          <p class="lead">請先返回主頁完成排盤，再點擊「論命」進入本頁。</p>
          <p><a class="back-link" href="./">返回排盤</a></p>
        </section>
      `;
    }

    function renderPromptPanel(exportState) {
      const current = exportState[exportState.mode];
      const blocked = exportState.mode === "lifetime" && current.qualityReport && !current.qualityReport.passed;
      const statusClass = current.validation.status === "超過上限"
        ? "over"
        : current.validation.status === "接近上限"
          ? "near"
          : "safe";
      const countLabel = exportState.mode === "lifetime"
        ? `終身 Prompt 字數：${current.validation.chars}`
        : `Prompt 字數：${current.validation.chars} / ${MAX_PROMPT_CHARS}`;
      return `
        <div class="prompt-toolbar">
          <div class="prompt-mode-group">
            <button id="prompt-mode-lifetime" class="${exportState.mode === "lifetime" ? "active" : ""}" type="button">終身 AI 命理顧問 Prompt</button>
            <button id="prompt-mode-debug" class="${exportState.mode === "debug" ? "active" : ""}" type="button">完整除錯資料</button>
          </div>
          <div class="prompt-meta">
            <span id="prompt-char-count">${countLabel}</span>
            <span id="prompt-status" class="prompt-status ${statusClass}">狀態：${current.validation.status}</span>
            ${current.displayName ? `<span>命主：${escapeHtml(current.displayName)}</span>` : ""}
            ${current.pillars ? `<span>四柱：${escapeHtml(current.pillars)}</span>` : ""}
            ${current.version ? `<span>版本：${escapeHtml(current.version)}</span>` : ""}
            ${current.instructionChars ? `<span>指令區：${current.instructionChars}</span>` : ""}
            ${current.knowledgeChars ? `<span>知識庫：${current.knowledgeChars}</span>` : ""}
            ${current.qualityReport ? `<span>品質分：${escapeHtml(current.qualityReport.score)}</span>` : ""}
            ${current.qualityReport ? `<span>一致性：${current.qualityReport.passed ? "通過" : "失敗"}</span>` : ""}
          </div>
        </div>
        ${blocked ? `<p class="subtitle">此命盤的 AI 顧問檔案尚未通過一致性檢查，請重新產生或聯絡管理者。</p>` : ""}
        ${current.qualityReport && isDevelopmentMode() && (current.qualityReport.score < 85 || !current.qualityReport.passed) ? `<p class="subtitle">開發檢查：品質分數 ${current.qualityReport.score}、原局作用異常 ${current.qualityReport.invalidNatalInteractionCount}、圖表錯置 ${current.qualityReport.chartConsistencyErrors.length}、十神錯誤 ${current.qualityReport.tenGodErrors.length}、藏干錯誤 ${current.qualityReport.hiddenStemErrors.length}、大運錯誤 ${current.qualityReport.luckCycleErrors.length}、模板重複 ${current.qualityReport.repeatedTemplateSentences.length}。</p>` : ""}
        <pre id="prompt-output" class="prompt-box">${escapeHtml(current.prompt)}</pre>
      `;
    }

    function getPromptFilename(mode, payload) {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (current?.suggestedFilename) return current.suggestedFilename;
      const birthDate = String(payload.user?.birthSolar ?? "prompt").slice(0, 10);
      return `bazi-${mode}-prompt-${birthDate}.md`;
    }

    async function copyCurrentPrompt() {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      await navigator.clipboard.writeText(current.prompt);
      const button = document.getElementById("copy-prompt");
      if (!button) return;
      button.textContent = "已複製";
      setTimeout(() => {
        const latestButton = document.getElementById("copy-prompt");
        if (latestButton) latestButton.textContent = "複製 Prompt";
      }, 1200);
    }

    function downloadCurrentPrompt(payload) {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      const blob = new Blob([current.prompt], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = getPromptFilename(current.filenameSuffix, payload);
      link.click();
      URL.revokeObjectURL(url);
    }

    function syncTopbarPromptButtons(payload) {
      const copyButton = document.getElementById("copy-prompt");
      const downloadButton = document.getElementById("download-prompt");
      if (!copyButton || !downloadButton) return;
      const current = latestPromptExport?.[latestPromptExport.mode];
      const blocked = latestPromptExport?.mode === "lifetime" && current?.qualityReport && !current.qualityReport.passed;
      copyButton.hidden = false;
      downloadButton.hidden = false;
      copyButton.disabled = Boolean(blocked);
      downloadButton.disabled = Boolean(blocked);
      copyButton.onclick = blocked ? null : () => { copyCurrentPrompt().catch(() => {}); };
      downloadButton.onclick = blocked ? null : () => downloadCurrentPrompt(payload);
    }

    function bindPromptModeSwitch(payload) {
      document.getElementById("prompt-mode-lifetime")?.addEventListener("click", () => {
        latestPromptExport.mode = "lifetime";
        updatePromptPanel(payload);
      });
      document.getElementById("prompt-mode-debug")?.addEventListener("click", () => {
        latestPromptExport.mode = "debug";
        updatePromptPanel(payload);
      });
    }

    function updatePromptPanel(payload) {
      const container = document.getElementById("ai-prompt-panel");
      if (!container || !latestPromptExport) return;
      container.innerHTML = renderPromptPanel(latestPromptExport);
      bindPromptModeSwitch(payload);
      syncTopbarPromptButtons(payload);
    }

    function getVisibleAnalysisSections(sections) {
      const hiddenIds = new Set(["life-domains", "luck-cycle-analysis"]);
      return (sections ?? []).filter((section) => !hiddenIds.has(section.id));
    }

    function renderBaziAnalysis(payload) {
      const analysis = analyzeBazi(payload);
      const annual = payload.annualLuck;
      latestPromptExport = analysis.promptExport;

      document.getElementById("app").innerHTML = `
        <section class="hero">
          <div class="hero-copy">
            <h1>八字論命</h1>
            <p class="lead">以月令、旺衰、通根、格局、調候、用神為序，再看大運流年如何引動原局。</p>
          </div>
          <aside class="summary-panel">
            <div class="summary-grid">
              <div class="metric"><span>日主</span><strong class="${elementClass(payload.dayMaster.element)}">${escapeHtml(payload.dayMaster.stem)}${escapeHtml(payload.dayMaster.element)}</strong></div>
              <div class="metric"><span>出生</span><strong>${escapeHtml(payload.user.birthSolar)}</strong></div>
              <div class="metric"><span>月令</span><strong>${escapeHtml(payload.pillars.month.branch)}月</strong></div>
              <div class="metric"><span>流年</span><strong>${annual ? `${escapeHtml(annual.year)} ${escapeHtml(annual.pillar)}` : "待定"}</strong></div>
            </div>
          </aside>
        </section>

        <section class="chart-overview" id="chart-overview">
          ${renderPillar(payload.pillars.year, "年柱")}
          ${renderPillar(payload.pillars.month, "月柱")}
          ${renderPillar(payload.pillars.day, "日柱")}
          ${renderPillar(payload.pillars.hour, "時柱")}
        </section>

        <section class="section wide" id="five-element-bars">
          <h2>五行分布</h2>
          <p class="subtitle">數量只作入口，正式判斷仍以月令、透干、通根與合沖為主。</p>
          ${renderElementBars(payload.fiveElements)}
        </section>

        <div class="section-grid">
          ${getVisibleAnalysisSections(analysis.sections).map(renderSection).join("")}
          <section class="section wide" id="luck-timeline">
            <h2>大運時間軸</h2>
            <p class="subtitle">每步十年。</p>
            ${renderTimeline(payload.luckCycles)}
          </section>
          <section class="section wide" id="monthly-cards">
            <h2>十二流月卡</h2>
            <p class="subtitle">依流年天干五虎遁推算，日期以節氣約略區間呈現。</p>
            ${renderAnnualMonths(analysis.annualMonths)}
          </section>
          <section class="section wide" id="shensha-list">
            <h2>核心神煞 Core Shen Sha Set</h2>
            <p class="subtitle">規則版本 ${escapeHtml(analysis.shenShaResult.ruleSetVersion)}；固定規則引擎計算，只作輔助參考。</p>
            ${renderShenSha(analysis.shenShaResult)}
          </section>
          <section class="section wide" id="ai-master-reading">
            <h2>AI Prompt 匯出</h2>
            <p class="subtitle">預設顯示終身 AI 命理顧問 Prompt；完整除錯資料仍保留於內部輸出層。</p>
            <div id="ai-prompt-panel">${renderPromptPanel(latestPromptExport)}</div>
          </section>
        </div>
      `;
      bindPromptModeSwitch(payload);
      syncTopbarPromptButtons(payload);
    }

    try {
      const raw = localStorage.getItem("baziAnalysisPayload");
      const payload = raw ? JSON.parse(raw) : null;
      if (!payload?.pillars?.day || !payload?.dayMaster) renderEmptyState();
      else renderBaziAnalysis(payload);
    } catch (error) {
      renderEmptyState();
    }
  </script>
</body>
</html>
