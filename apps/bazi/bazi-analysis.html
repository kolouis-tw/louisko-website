<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八字論命</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #191d24;
      --panel-2: #202631;
      --text: #f2efe6;
      --muted: #b3ad9f;
      --line: rgba(242, 239, 230, 0.16);
      --accent: #d8b86a;
      --wood: #39b777;
      --fire: #ef684f;
      --earth: #d1a34c;
      --metal: #cfd6df;
      --water: #4f96e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .back-link,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #151922;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    button.active {
      background: var(--accent);
      color: #15120a;
      border-color: transparent;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy,
    .summary-panel,
    .section,
    .empty-state {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .hero-copy {
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
      font-weight: 650;
    }

    .summary-panel {
      padding: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      min-height: 86px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .chart-overview {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .pillar {
      min-height: 210px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .pillar-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .pillar-chars {
      display: grid;
      gap: 8px;
      justify-items: center;
      margin: 12px 0;
    }

    .char {
      display: grid;
      place-items: center;
      width: 62px;
      height: 62px;
      border: 1px solid currentColor;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 36px;
      font-weight: 950;
      line-height: 1;
    }

    .pillar-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section {
      padding: 18px;
    }

    .section.wide {
      grid-column: 1 / -1;
    }

    .section h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .tag {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
      font-weight: 800;
    }

    .evidence {
      margin: 10px 0 0;
      padding-left: 20px;
      color: #ddd7c8;
      line-height: 1.75;
      font-size: 15px;
      font-weight: 600;
    }

    .conclusion {
      margin: 14px 0 0;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--text);
      line-height: 1.8;
      font-size: 16px;
      font-weight: 720;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 36px 1fr 28px;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--muted);
      font-weight: 800;
    }

    .bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .monthly-card {
      min-height: 260px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shensha-card {
      min-height: 190px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .shensha-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-card h3 {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 20px;
    }

    .monthly-card p {
      margin: 8px 0;
      color: #ddd7c8;
      font-size: 14px;
      font-weight: 650;
      line-height: 1.65;
    }

    .monthly-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 104px 72px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 700;
    }

    .timeline-item strong {
      color: var(--text);
      font-size: 18px;
    }

    .prompt-box {
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      background: #0d1016;
      color: #d8d2c2;
      font-size: 13px;
      line-height: 1.6;
    }

    .prompt-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .prompt-mode-group,
    .prompt-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .prompt-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .prompt-status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .prompt-status.safe { color: var(--wood); }
    .prompt-status.near { color: var(--earth); }
    .prompt-status.over { color: var(--fire); }

    .shensha-disclaimer,
    .dynamic-query-panel,
    .dynamic-output-panel,
    .attention-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .shensha-disclaimer,
    .dynamic-query-panel,
    .dynamic-output-panel {
      padding: 14px;
    }

    .shensha-disclaimer {
      margin-bottom: 12px;
      color: #ddd7c8;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 700;
    }

    .dynamic-query-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.span-2 {
      grid-column: span 2;
    }

    .field.span-3 {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #151922;
      color: var(--text);
      font: inherit;
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
    }

    .dynamic-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .dynamic-summary-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .dynamic-summary-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
    }

    .dynamic-summary-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .attention-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .attention-card {
      padding: 14px;
    }

    .attention-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .attention-card p,
    .attention-card li {
      color: #ddd7c8;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 650;
    }

    .attention-card ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
    }

    .wood { color: var(--wood); }
    .fire { color: var(--fire); }
    .earth { color: var(--earth); }
    .metal { color: var(--metal); }
    .water { color: var(--water); }

    @media (max-width: 860px) {
      .hero,
      .chart-overview,
      .monthly-grid,
      .shensha-grid,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      main {
        width: min(100vw - 20px, 520px);
        padding-top: 18px;
      }

      .topbar {
        display: grid;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero-copy,
      .summary-panel,
      .section {
        padding: 16px;
      }
    }
  </style>

</head>

    function toJulianDayNumber(year, month, day) {
      const a = Math.floor((14 - month) / 12);
      const y = year + 4800 - a;
      const m = month + 12 * a - 3;
      return day + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    }

    function utcTime(year, monthIndex, day, hour = 0, minute = 0) {
      const date = new Date(Date.UTC(0, monthIndex, day, hour, minute));
      date.setUTCFullYear(year);
      return date.getTime();
    }

    function localTimeToUtcMs(year, month, day, hour = 0, minute = 0, timezoneOffset = engineTimezoneOffset) {
      return utcTime(year, month - 1, day, hour, minute) - timezoneOffset * 60 * msPerMinute;
    }

    function normalizeDegrees(value) {
      return ((value % 360) + 360) % 360;
    }

    function degreesToRadians(value) {
      return value * Math.PI / 180;
    }

    function signedAngleDifference(longitude, target) {
      return ((normalizeDegrees(longitude - target) + 540) % 360) - 180;
    }

    function julianDayFromUtcMs(utcMs) {
      return utcMs / msPerDay + 2440587.5;
    }

    function getSolarApparentLongitude(utcMs) {
      const jd = julianDayFromUtcMs(utcMs);
      const t = (jd - 2451545.0) / 36525;
      const meanLongitude = normalizeDegrees(280.46646 + 36000.76983 * t + 0.0003032 * t * t);
      const meanAnomaly = 357.52911 + 35999.05029 * t - 0.0001537 * t * t;
      const anomalyRad = degreesToRadians(meanAnomaly);
      const equationOfCenter =
        (1.914602 - 0.004817 * t - 0.000014 * t * t) * Math.sin(anomalyRad) +
        (0.019993 - 0.000101 * t) * Math.sin(2 * anomalyRad) +
        0.000289 * Math.sin(3 * anomalyRad);
      const trueLongitude = meanLongitude + equationOfCenter;
      const omega = 125.04 - 1934.136 * t;
      return normalizeDegrees(trueLongitude - 0.00569 - 0.00478 * Math.sin(degreesToRadians(omega)));
    }

    function findSolarTermUtcMs(year, term) {
      const estimate = localTimeToUtcMs(year, term.month, term.day, 12);
      const target = term.longitude;
      let lower = estimate - 5 * msPerDay;
      let upper = estimate + 5 * msPerDay;
      let lowerDiff = signedAngleDifference(getSolarApparentLongitude(lower), target);
      let upperDiff = signedAngleDifference(getSolarApparentLongitude(upper), target);

      if (lowerDiff > 0 || upperDiff < 0) {
        let previousTime = lower;
        let previousDiff = lowerDiff;
        for (let time = lower + 6 * 60 * msPerMinute; time <= upper; time += 6 * 60 * msPerMinute) {
          const diff = signedAngleDifference(getSolarApparentLongitude(time), target);
          if (previousDiff <= 0 && diff >= 0) {
            lower = previousTime;
            upper = time;
            lowerDiff = previousDiff;
            upperDiff = diff;
            break;
          }
          previousTime = time;
          previousDiff = diff;
        }
      }

      if (lowerDiff > 0 || upperDiff < 0) {
        throw new Error(`Cannot bracket solar term ${term.name} for ${year}`);
      }

      for (let i = 0; i < 50; i += 1) {
        const mid = (lower + upper) / 2;
        const diff = signedAngleDifference(getSolarApparentLongitude(mid), target);
        if (diff >= 0) upper = mid;
        else lower = mid;
      }

      return Math.round(upper / 60000) * 60000;
    }

        ["沖", "子", "午", "子午沖"], ["沖", "丑", "未", "丑未沖"], ["沖", "寅", "申", "寅申沖"], ["沖", "卯", "酉", "卯酉沖"], ["沖", "辰", "戌", "辰戌沖"], ["沖", "巳", "亥", "巳亥沖"],
        ["害", "子", "未", "子未害"], ["害", "丑", "午", "丑午害"], ["害", "寅", "巳", "寅巳害"], ["害", "卯", "辰", "卯辰害"], ["害", "申", "亥", "申亥害"], ["害", "酉", "戌", "酉戌害"]
      ];
      const targets = [
        ...Object.entries(payload.pillars).map(([key, pillar]) => ({ target: "原局", key, branch: pillar.branch })),
        payload.currentLuck?.branch ? { target: "大運", key: "currentLuck", branch: payload.currentLuck.branch } : null,
        payload.annualLuck?.branch ? { target: "流年", key: "annualLuck", branch: payload.annualLuck.branch } : null
      ].filter(Boolean);
      const result = [];

            result.push({ target: item.target, type, description: `${description}見於流月與${item.target}${palace}` });
          }

    }

    function analyzeAnnualMonths(payload) {
      if (!payload.annualLuck?.stem) return [];

    function getPillarsForShenSha(payload) {
      return {
        year: { stem: payload.pillars.year.stem, branch: payload.pillars.year.branch },

    function summarizeShenShaBasis(basisList) {
      return uniqueList((basisList ?? []).map((basis) => basis.label ?? `${basis.type}:${basis.value}`)).join("、");
    }

    function calculateShenShaStatic(chart, options = {}) {
      const entries = pillarOrder.map((key) => [key, chart[key]]);
      const rawHits = [];
      const yangRenMode = options.yangRenMode ?? "yang-stems-only";
      const pushHit = (config) => {
        rawHits.push({
          ruleSetVersion: SHEN_SHA_RULESET_VERSION,
          pillarLabel: pillarLabels[config.pillar],
          position: config.pillar,
          ...config
        });
      };
      const addBranchMappedHits = (id, name, category, meaning, map, references) => {
        references.forEach((basis) => {
          const target = map[basis.value];
          entries.forEach(([pillarKey, pillar]) => {
            if (pillar.branch === target) {
              pushHit({
                id,
                name,
                category,
                pillar: pillarKey,
                matchedOn: "branch",
                matchedValue: pillar.branch,
                basis: [basis],
                meaning
              });
            }
          });
        });
      };
      const addStemMappedHits = (id, name, category, meaning, targets, basis) => {
        entries.forEach(([pillarKey, pillar]) => {
          if (targets.includes(pillar.branch)) {
            pushHit({
              id,
              name,
              category,
              pillar: pillarKey,
              matchedOn: "branch",
              matchedValue: pillar.branch,
              basis: [basis],
              meaning
            });
          }
        });
      };

      addStemMappedHits("tian-yi", "天乙貴人", "貴人扶助", "遇事較易得助力、貴人、緩衝與轉機。", shenShaRuleMaps.tianYi[chart.day.stem] ?? [], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });
      addStemMappedHits("wen-chang", "文昌貴人", "學習表達", "較利學習、表達、整理知識、寫作與考試節奏。", [shenShaRuleMaps.wenChang[chart.day.stem]], {
        type: "dayStem",
        value: chart.day.stem,
        label: `依日干${chart.day.stem}查得`
      });

      const tianDeRule = shenShaRuleMaps.tianDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        const matches = tianDeRule.targetType === "stem"
          ? pillar.stem === tianDeRule.value
          : pillar.branch === tianDeRule.value;
        if (matches) {
          pushHit({
            id: "tian-de",
            name: "天德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: tianDeRule.targetType,
            matchedValue: tianDeRule.targetType === "stem" ? pillar.stem : pillar.branch,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "多主緩和、化解、善意資源與轉圜空間。"
          });
        }
      });

      const yueDeTarget = shenShaRuleMaps.yueDe[chart.month.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.stem === yueDeTarget) {
          pushHit({
            id: "yue-de",
            name: "月德貴人",
            category: "德性解厄",
            pillar: pillarKey,
            matchedOn: "stem",
            matchedValue: pillar.stem,
            basis: [{ type: "monthBranch", value: chart.month.branch, label: `依月支${chart.month.branch}查得` }],
            meaning: "較利以溫和方式化解壓力，也較易得人情與支持。"
          });
        }
      });

      const branchReferences = [
        { type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` },
        { type: "dayBranch", value: chart.day.branch, label: `依日支${chart.day.branch}查得` }
      ];
      addBranchMappedHits("yi-ma", "驛馬", "遷移變動", "多主移動、節奏變化、奔波、外務與跨域連結。", shenShaRuleMaps.yiMa, branchReferences);
      addBranchMappedHits("tao-hua", "桃花", "人際魅力", "多主人緣、吸引力、審美與情感互動題材。", shenShaRuleMaps.taoHua, branchReferences);
      addBranchMappedHits("hua-gai", "華蓋", "藝文思辨", "多主藝術感、獨立思考、研究氣質與精神世界。", shenShaRuleMaps.huaGai, branchReferences);

      if (yangRenMode === "yang-stems-only" && shenShaRuleMaps.yangRen[chart.day.stem]) {
        addStemMappedHits("yang-ren", "羊刃", "剛烈決斷", "多主衝勁、競爭、決斷與壓力承受題材。", [shenShaRuleMaps.yangRen[chart.day.stem]], {
          type: "dayStem",
          value: chart.day.stem,
          label: `依日干${chart.day.stem}查得（陽干版）`
        });
      }

      const lonelyTargets = shenShaRuleMaps.guChenGuaSu[chart.year.branch];
      entries.forEach(([pillarKey, pillar]) => {
        if (pillar.branch === lonelyTargets.guChen) {
          pushHit({
            id: "gu-chen",
            name: "孤辰",
            category: "孤高內傾",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易呈現獨立、自持、保留距離感的一面。"
          });
        }
        if (pillar.branch === lonelyTargets.guaSu) {
          pushHit({
            id: "gua-su",
            name: "寡宿",
            category: "情感保留",
            pillar: pillarKey,
            matchedOn: "branch",
            matchedValue: pillar.branch,
            basis: [{ type: "yearBranch", value: chart.year.branch, label: `依年支${chart.year.branch}查得` }],
            meaning: "較易慢熱、內斂，在關係裡保留觀察空間。"
          });
        }
      });

      const dayPillar = `${chart.day.stem}${chart.day.branch}`;
      if (shenShaRuleMaps.yinYangChaCuo.has(dayPillar)) {
        pushHit({
          id: "yin-yang-cha-cuo",
          name: "陰陽差錯",
          category: "日柱特殊",
          pillar: "day",
          matchedOn: "pillar",
          matchedValue: dayPillar,
          basis: [{ type: "dayPillar", value: dayPillar, label: `依日柱${dayPillar}查得` }],
          meaning: "多主節奏與人事拿捏較有反差感，需更看整體結構。"
        });
      }

      const dedupedMap = new Map();
      rawHits.forEach((hit) => {
        const key = `${hit.id}:${hit.pillar}:${hit.matchedOn}:${hit.matchedValue}`;
        const existing = dedupedMap.get(key);
        if (existing) {
          existing.basis = [...existing.basis, ...hit.basis];
        } else {
          dedupedMap.set(key, { ...hit });
        }
      });

      const hits = [...dedupedMap.values()]
        .map((hit) => ({
          ...hit,
          basis: uniqueList(hit.basis.map((item) => JSON.stringify(item))).map((item) => JSON.parse(item))
        }))
        .sort((a, b) => {
          const orderA = shenShaOrder.indexOf(a.id);
          const orderB = shenShaOrder.indexOf(b.id);
          if (orderA !== orderB) return orderA - orderB;
          return pillarOrder.indexOf(a.pillar) - pillarOrder.indexOf(b.pillar);
        });

      const names = uniqueList(hits.map((hit) => hit.name));
      return {
        ruleSetVersion: SHEN_SHA_RULESET_VERSION,
        disclaimer: SHEN_SHA_DISCLAIMER,
        hits,
        summary: names.length
          ? `核心神煞命中 ${names.join("、")}。神煞只作輔助，仍須回到原局、大運、流年與喜忌同看。`
          : "本命盤未見核心神煞明顯集中成象，仍以原局旺衰、格局、用神與大運流年為主。"
      };
    }

      return {

        "請依序分析：命盤總論、日主旺衰、月令與通根、五行氣勢、十神結構、干支合沖刑害、格局、調候、用神喜忌、性格、事業、財運、感情婚姻、健康五行傾向、大運、目前大運、指定流年、十二流月、神煞輔助、最終建議。"
      ];
      return options.ultraCompact ? lines.filter((line) => !line.startsWith("土：")).join("\n").trim() : lines.join("\n").trim();
    }

    function validatePromptLength(prompt) {
      const chars = String(prompt ?? "").length;
      return {
        chars,
        max: MAX_PROMPT_CHARS,
        status: chars > MAX_PROMPT_CHARS ? "超過上限" : chars >= Math.round(MAX_PROMPT_CHARS * 0.85) ? "接近上限" : "安全"
      };
    }

    function buildCompactBaziPrompt(data) {
      const variants = [
        { shortRules: false, shortShenSha: false, ultraCompact: false },
        { shortRules: true, shortShenSha: false, ultraCompact: false },
        { shortRules: true, shortShenSha: true, ultraCompact: false },
        { shortRules: true, shortShenSha: true, ultraCompact: true }
      ];
      let lastPrompt = "";
      for (const options of variants) {
        const prompt = buildCompactPromptSections(data, options);
        lastPrompt = prompt;
        if (validatePromptLength(prompt).chars <= MAX_PROMPT_CHARS) return prompt;
      }
      return lastPrompt;
    }

    function createPromptEntry(label, filenameSuffix, prompt, validation, extra = {}) {
      return {
        label,
        filenameSuffix,
        prompt,
        validation,
        ...extra
      };
    }

    function parseTimezoneOffset(value) {
      const source = String(value ?? "").trim();
      if (!source) return engineTimezoneOffset;
      if (source === "Asia/Taipei") return 8;
      const match = source.match(/([+-]?\d+(?:\.\d+)?)/);
      return match ? Number(match[1]) : engineTimezoneOffset;
    }

    function parseTargetDateInput(targetDate) {
      const raw = String(targetDate ?? "").trim();
      if (!raw) return null;
      const parts = raw.split("-").map((part) => Number(part));
      if (parts.length === 1 && parts[0]) return { precision: "year", year: parts[0] };
      if (parts.length === 2 && parts[0] && parts[1]) return { precision: "month", year: parts[0], month: parts[1] };
      if (parts.length >= 3 && parts[0] && parts[1] && parts[2]) return { precision: "day", year: parts[0], month: parts[1], day: parts[2] };
      return null;
    }

    function parseTargetTimeInput(targetTime) {
      const raw = String(targetTime ?? "").trim();
      if (!raw) return null;
      const [hourText = "0", minuteText = "0"] = raw.split(":");
      const hour = Number(hourText);
      const minute = Number(minuteText);
      if (Number.isNaN(hour) || Number.isNaN(minute)) return null;
      return { hour, minute };
    }

    function findLuckCycleForYear(payload, year) {
      return (payload.luckCycles ?? []).find((cycle) => year >= cycle.yearStart && year <= cycle.yearEnd) ?? payload.currentLuck ?? null;
    }

    function enrichFlowPillar(pillar, dayMaster) {
      if (!pillar) return null;
      const mainStem = pillar.branch ? branchMainStem[pillar.branch] : "";
      return {
        ...pillar,
        pillar: pillar.ganzhi ?? `${pillar.stem}${pillar.branch}`,
        stemTenGod: pillar.stem ? getTenGod(dayMaster, pillar.stem) : "",
        branchMainStem: mainStem,
        branchTenGod: mainStem ? getTenGod(dayMaster, mainStem) : "",
        stemElement: pillar.stem ? stemElement[pillar.stem] : "",
        branchElement: pillar.branch ? branchElement[pillar.branch] : ""
      };
    }

    function getDynamicMonthContext(target, dayMaster, timezoneOffset) {
      if (!target.month) return null;
      const day = target.day ?? 15;
      const hour = target.hour ?? 12;
      const minute = target.minute ?? 0;
      const yearPillar = getYearPillar(target.year, isAfterLiChun(target.year, target.month, day, hour, minute, timezoneOffset));
      const monthPillar = getMonthPillar(yearPillar.stem, target.year, target.month, day, hour, minute, timezoneOffset);
      const monthIndex = getSolarMonthIndex(target.year, target.month, day, hour, minute, timezoneOffset);
      const label = solarTermMonthLabels[monthIndex];
      return {
        ...enrichFlowPillar(monthPillar, dayMaster),
        solarTermName: label?.solarTermName ?? "節氣",
        approximateGregorianRange: label?.approximateGregorianRange ?? "",
        monthIndex
      };
    }

    function describeStemRelation(a, b) {
      if (a === b) return "同干比照";
      if (stemFiveHe[a] === b) return "天干五合";
      if (elementControls[stemElement[a]] === stemElement[b]) return "天干相剋";
      if (elementGenerates[stemElement[a]] === stemElement[b]) return "天干相生";
      return "";
    }

    function describeBranchRelation(a, b) {
      if (a === b) return "伏吟";
      if (branchLiuChong[a] === b) return "六沖";
      if (branchLiuHe[a] === b) return "六合";
      if (branchLiuHai[a] === b) return "六害";
      if (branchLiuPo[a] === b) return "六破";
      if (branchSelfXing.includes(a) && a === b) return "自刑";
      if (branchSanXingPairs.some(([x, y]) => x === a && y === b)) return "三刑";
      return "";
    }

    function collectDynamicInteractions(payload, dynamicPillars, currentLuck) {
      const references = [
        { scope: "原局", items: pillarOrder.map((key) => ({ key, label: pillarLabels[key], stem: payload.pillars[key].stem, branch: payload.pillars[key].branch })) },
        currentLuck ? { scope: "大運", items: [{ key: "luck", label: "目前大運", stem: currentLuck.stem, branch: currentLuck.branch }] } : null
      ].filter(Boolean);
      const results = [];
      dynamicPillars.forEach((item) => {
        references.forEach((group) => {
          group.items.forEach((reference) => {
            const stemRelation = item.stem && reference.stem ? describeStemRelation(item.stem, reference.stem) : "";
            const branchRelation = item.branch && reference.branch ? describeBranchRelation(item.branch, reference.branch) : "";
            if (stemRelation) {
              results.push({
                source: item.label,
                target: `${group.scope}${reference.label}`,
                relation: stemRelation,
                affectedPillars: reference.key === "luck" ? [] : [reference.key]
              });
            }
            if (branchRelation) {
              results.push({
                source: item.label,
                target: `${group.scope}${reference.label}`,
                relation: branchRelation,
                affectedPillars: reference.key === "luck" ? [] : [reference.key]
              });
            }
          });
        });
      });
      return results;
    }

    function calculateDynamicLuckContext(payload, query) {
      const dateInput = parseTargetDateInput(query.targetDate);
      if (!dateInput) throw new Error("請輸入目標日期");
      const timeInput = parseTargetTimeInput(query.targetTime);
      const timezoneOffset = parseTimezoneOffset(query.timezone || payload.user.timezone);
      const precision = timeInput ? "hour" : dateInput.precision;
      const target = {
        ...dateInput,
        hour: timeInput?.hour ?? 12,
        minute: timeInput?.minute ?? 0
      };
      const currentLuck = findLuckCycleForYear(payload, target.year);
      const annual = enrichFlowPillar(getAnnualFlow(target.year, payload.dayMaster.stem), payload.dayMaster.stem);
      const monthly = ["month", "day", "hour"].includes(dateInput.precision) || precision === "hour"
        ? getDynamicMonthContext(target, payload.dayMaster.stem, timezoneOffset)
        : null;
      const daily = ["day", "hour"].includes(dateInput.precision) || precision === "hour"
        ? enrichFlowPillar(getDayPillar(target.year, target.month, target.day), payload.dayMaster.stem)
        : null;
      const hourly = precision === "hour"
        ? enrichFlowPillar(getHourPillar(daily.stem, target.hour), payload.dayMaster.stem)
        : null;
      const dynamicPillars = [
        { label: "流年", ...annual },
        monthly ? { label: "流月", ...monthly } : null,
        daily ? { label: "流日", ...daily } : null,
        hourly ? { label: "流時", ...hourly } : null
      ].filter(Boolean);
      const interactions = collectDynamicInteractions(payload, dynamicPillars, currentLuck);
      const majorAttentionItems = buildDynamicConditions(payload, { interactions, annual, monthly, daily, hourly });
      return {
        query,
        precision,
        timezoneOffset,
        currentLuck,
        annual,
        monthly,
        daily,
        hourly,
        interactions,
        majorAttentionItems
      };
    }

      const annualMonths = analyzeAnnualMonths(payload);

      const climate = analyzeClimate(payload);

      const luck = analyzeLuck(payload);

      const monthly = analyzeMonthly(payload, annualMonths);

          <div class="pillar-chars">
            <div class="char ${elementClass(pillar.stemElement)}">${escapeHtml(pillar.stem)}</div>
            <div class="char ${elementClass(pillar.branchElement)}">${escapeHtml(pillar.branch)}</div>
          </div>
          <div class="pillar-meta">
            天干 ${elementText(pillar.stemElement)}｜${escapeHtml(pillar.tenGodStem)}<br>
            地支 ${elementText(pillar.branchElement)}｜主氣 ${escapeHtml(pillar.branchMainStem)}${escapeHtml(pillar.branchMainTenGod)}<br>
            藏干 ${(pillar.hiddenStems ?? []).map((hidden) => `${escapeHtml(hidden.stem)}${escapeHtml(hidden.tenGod)}`).join("、") || "無"}
          </div>
        </article>
      `;
    }

    function renderElementBars(fiveElements) {
      const max = Math.max(1, ...Object.values(fiveElements));
      return Object.entries(fiveElements).map(([element, count]) => `
        <div class="bar-row">
          <span class="${elementClass(element)}">${element}</span>
          <div class="bar-track"><div class="bar-fill ${elementClass(element)}" style="width:${Math.round(count / max * 100)}%; background: currentColor;"></div></div>
          <span>${count}</span>
        </div>
      `).join("");
    }

    function renderSection(section) {
      return `
        <section class="section ${section.id === "life-domains" || section.id === "luck-cycle-analysis" ? "wide" : ""}" id="${escapeHtml(section.id)}">
          <h2>${escapeHtml(section.title)}</h2>
          <p class="subtitle">${escapeHtml(section.subtitle ?? "")}</p>
          <div class="tags">${(section.tags ?? []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          <ul class="evidence">${(section.evidence ?? []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          <p class="conclusion">${escapeHtml(section.conclusion)}</p>
        </section>
      `;
    }

    function renderTimeline(cycles) {
      if (!cycles?.length) return "<p class=\"subtitle\">目前缺少大運資料。</p>";
      return `<div class="timeline">${cycles.map((cycle) => `
        <div class="timeline-item">
          <span>${cycle.ageStart}-${cycle.ageEnd} 歲</span>
          <strong>${escapeHtml(cycle.pillar)}</strong>
          <span>天干 ${escapeHtml(cycle.stemTenGod)}，地支 ${escapeHtml(cycle.branchTenGod)}；五行主題 ${escapeHtml((cycle.elementTheme ?? []).join("、"))}</span>
        </div>
      `).join("")}</div>`;
    }

    function renderAnnualMonths(months) {
      if (!months.length) return "<p class=\"subtitle\">目前缺少流年資料，暫不產生流月。</p>";
      return `<div class="monthly-grid">${months.map((month) => `
        <article class="monthly-card">
          <h3>${escapeHtml(month.pillar)}月</h3>
          <p class="subtitle">${escapeHtml(month.solarTermName)}起｜${escapeHtml(month.approximateGregorianRange)}</p>
          <div class="monthly-meta">
            <span class="tag">十神 ${escapeHtml(month.tenGod)}</span>
            <span class="tag">五行 ${escapeHtml(month.element)}${escapeHtml(month.branchElement)}</span>
            <span class="tag">主氣 ${escapeHtml(month.branchTenGod)}</span>
          </div>
          <p><strong>本月主題：</strong>${escapeHtml(month.theme)}</p>
          <p><strong>命理依據：</strong>${escapeHtml(month.evidence)}</p>
          <p><strong>結論建議：</strong>${escapeHtml(month.advice)}</p>
        </article>
      `).join("")}</div>`;
    }

    function renderShenSha(result) {
      if (!result.hits.length) {
        return `
          <p class="shensha-disclaimer">${escapeHtml(result.disclaimer)}</p>
          <p class="conclusion">${escapeHtml(result.summary)}</p>
        `;
      }
      return `
        <p class="shensha-disclaimer">${escapeHtml(result.disclaimer)}</p>
        <p class="conclusion">${escapeHtml(result.summary)}</p>
        <div class="shensha-grid">${result.hits.map((hit) => `
          <article class="shensha-card">
            <h3>${escapeHtml(hit.name)}</h3>
            <div class="tags">
              <span class="tag">${escapeHtml(hit.category)}</span>
              <span class="tag">${escapeHtml(hit.pillarLabel)}</span>
              <span class="tag">${escapeHtml(hit.matchedValue)}</span>
            </div>
            <p><strong>依據：</strong>${escapeHtml(summarizeShenShaBasis(hit.basis))}</p>
            <p><strong>命中：</strong>${escapeHtml(hit.pillarLabel)}・${escapeHtml(hit.matchedValue)}</p>
            <p><strong>簡義：</strong>${escapeHtml(hit.meaning)}</p>
          </article>
        `).join("")}</div>
      `;
    }

    function renderEmptyState() {
      document.getElementById("app").innerHTML = `
        <section class="empty-state">
          <h1>尚未取得命盤資料</h1>
          <p class="lead">請先返回主頁完成排盤，再點擊「論命」進入本頁。</p>
          <p><a class="back-link" href="./">返回排盤</a></p>
        </section>
      `;
    }

    function renderPromptPanel(exportState) {
      const current = exportState[exportState.mode];
      const statusClass = current.validation.status === "超過上限"
        ? "over"
        : current.validation.status === "接近上限"
          ? "near"
          : "safe";
      const countLabel = exportState.mode === "permanent"
        ? `永久 Prompt 字數：${current.validation.chars}`
        : exportState.mode === "debug"
          ? `Prompt 字數：${current.validation.chars} / ${MAX_PROMPT_CHARS}`
          : `動態資料包字數：${current.validation.chars}${current.validation.max ? ` / ${current.validation.max}` : ""}`;
      return `
        <div class="prompt-toolbar">
          <div class="prompt-mode-group">
            <button id="prompt-mode-permanent" class="${exportState.mode === "permanent" ? "active" : ""}" type="button">永久 AI Prompt</button>
            <button id="prompt-mode-dynamic" class="${exportState.mode === "dynamic" ? "active" : ""}" type="button">動態時運資料包</button>
            <button id="prompt-mode-debug" class="${exportState.mode === "debug" ? "active" : ""}" type="button">完整除錯資料</button>
          </div>
          <div class="prompt-meta">
            <span id="prompt-char-count">${countLabel}</span>
            <span id="prompt-status" class="prompt-status ${statusClass}">狀態：${current.validation.status}</span>
          </div>
        </div>
        <pre id="prompt-output" class="prompt-box">${escapeHtml(current.prompt)}</pre>
      `;
    }

    function getPromptFilename(mode, payload) {
      const birthDate = String(payload.user?.birthSolar ?? "prompt").slice(0, 10);
      return `bazi-${mode}-prompt-${birthDate}.md`;
    }

    async function copyCurrentPrompt() {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      await navigator.clipboard.writeText(current.prompt);
      const button = document.getElementById("copy-prompt");
      if (!button) return;
      button.textContent = "已複製";
      setTimeout(() => {
        const latestButton = document.getElementById("copy-prompt");
        if (latestButton) latestButton.textContent = "複製 Prompt";
      }, 1200);
    }

    function downloadCurrentPrompt(payload) {
      const current = latestPromptExport?.[latestPromptExport.mode];
      if (!current) return;
      const blob = new Blob([current.prompt], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = getPromptFilename(current.filenameSuffix, payload);
      link.click();
      URL.revokeObjectURL(url);
    }

    function syncTopbarPromptButtons(payload) {
      const copyButton = document.getElementById("copy-prompt");
      const downloadButton = document.getElementById("download-prompt");
      if (!copyButton || !downloadButton) return;
      copyButton.hidden = false;
      downloadButton.hidden = false;
      copyButton.onclick = () => { copyCurrentPrompt().catch(() => {}); };
      downloadButton.onclick = () => downloadCurrentPrompt(payload);
    }

    function bindPromptModeSwitch(payload) {
      document.getElementById("prompt-mode-permanent")?.addEventListener("click", () => {
        latestPromptExport.mode = "permanent";
        updatePromptPanel(payload);
      });
      document.getElementById("prompt-mode-dynamic")?.addEventListener("click", () => {
        latestPromptExport.mode = "dynamic";
        updatePromptPanel(payload);
      });
      document.getElementById("prompt-mode-debug")?.addEventListener("click", () => {
        latestPromptExport.mode = "debug";
        updatePromptPanel(payload);
      });
    }

    function updatePromptPanel(payload) {
      const container = document.getElementById("ai-prompt-panel");
      if (!container || !latestPromptExport) return;
      container.innerHTML = renderPromptPanel(latestPromptExport);
      bindPromptModeSwitch(payload);
      syncTopbarPromptButtons(payload);
    }

    function renderDynamicLuckQuery(payload) {
      return `
        <form id="dynamic-luck-form" class="dynamic-query-panel">
          <div class="dynamic-query-grid">
            <label class="field">
              <span>目標日期</span>
              <input id="dynamic-target-date" name="targetDate" type="text" placeholder="2026 或 2026-07 或 2026-07-13" required>
            </label>
            <label class="field">
              <span>目標時間</span>
              <input id="dynamic-target-time" name="targetTime" type="time">
            </label>
            <label class="field">
              <span>時區</span>
              <input id="dynamic-timezone" name="timezone" type="text" value="${escapeHtml(payload.user.timezone || "Asia/Taipei")}">
            </label>
            <label class="field">
              <span>所在地</span>
              <input id="dynamic-location" name="location" type="text" value="${escapeHtml(payload.user.birthPlace || "")}" placeholder="例如：台北">
            </label>
            <label class="field span-2">
              <span>查詢主題</span>
              <input id="dynamic-topic" name="topic" type="text" placeholder="例如：轉職、簽約、感情、考試、搬遷">
            </label>
            <label class="field span-3">
              <span>補充背景</span>
              <textarea id="dynamic-context" name="context" rows="3" placeholder="補上現況、壓力來源、選項與顧慮。"></textarea>
            </label>
            <label class="field span-2">
              <span>決策期限</span>
              <input id="dynamic-deadline" name="decisionDeadline" type="text" placeholder="例如：2026-08-01 前">
            </label>
          </div>
          <div class="dynamic-actions">
            <button class="primary" type="submit">產生動態資料包</button>
          </div>
        </form>
      `;
    }

    function renderDynamicLuckResult(context) {
      if (!context) {
        return `
          <section class="dynamic-output-panel">
            <p class="subtitle">填入目標日期後，這裡會整理流年、流月、流日、流時與重大注意事項。</p>
          </section>
        `;
      }
      return `
        <section class="dynamic-output-panel">
          <div class="dynamic-summary-list">
            <div class="dynamic-summary-item"><strong>所處大運</strong>${escapeHtml(context.currentLuck?.pillar ?? "待定")}</div>
            <div class="dynamic-summary-item"><strong>流年</strong>${escapeHtml(context.annual?.pillar ?? "未提供")}</div>
            <div class="dynamic-summary-item"><strong>流月</strong>${escapeHtml(context.monthly?.pillar ?? "未分析")}</div>
            <div class="dynamic-summary-item"><strong>流日</strong>${escapeHtml(context.daily?.pillar ?? "未分析")}</div>
            <div class="dynamic-summary-item"><strong>流時</strong>${escapeHtml(context.hourly?.pillar ?? "未分析")}</div>
            <div class="dynamic-summary-item"><strong>分析層級</strong>${escapeHtml(context.precision)}</div>
          </div>
          <div class="attention-list">
            ${context.majorAttentionItems.length ? context.majorAttentionItems.map((item) => `
              <article class="section attention-card">
                <h3>${escapeHtml(item.category)}｜${escapeHtml(item.title)}</h3>
                <p><strong>依據：</strong>${escapeHtml(item.evidence.join("；"))}</p>
                <p><strong>風險：</strong>${escapeHtml(item.riskConditions.join("；"))}</p>
                <p><strong>有利條件：</strong>${escapeHtml(item.favorableConditions.join("；"))}</p>
                <p><strong>建議：</strong>${escapeHtml(item.actionAdvice.join("；"))}</p>
                <p><strong>備註：</strong>${escapeHtml(item.uncertaintyNote)}</p>
              </article>
            `).join("") : `<article class="section attention-card"><h3>重大注意事項</h3><p>目前未達兩個以上獨立條件同時成立，暫以原局與大運主題穩定推進。</p></article>`}
          </div>
        </section>
      `;
    }

    function bindDynamicLuckForm(payload) {
      const form = document.getElementById("dynamic-luck-form");
      if (!form) return;
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const query = {
          targetDate: document.getElementById("dynamic-target-date")?.value ?? "",
          targetTime: document.getElementById("dynamic-target-time")?.value ?? "",
          timezone: document.getElementById("dynamic-timezone")?.value ?? payload.user.timezone,
          location: document.getElementById("dynamic-location")?.value ?? "",
          topic: document.getElementById("dynamic-topic")?.value ?? "",
          context: document.getElementById("dynamic-context")?.value ?? "",
          decisionDeadline: document.getElementById("dynamic-deadline")?.value ?? ""
        };
        try {
          const dynamicContext = calculateDynamicLuckContext(payload, query);
          const prompt = buildDynamicLuckPackage(payload, dynamicContext);
          latestPromptExport.dynamic = createPromptEntry("動態時運資料包", "dynamic", prompt, validateDynamicPromptLength(prompt), {
            ready: true,
            context: dynamicContext
          });
          latestPromptExport.mode = "dynamic";
          updatePromptPanel(payload);
          const resultContainer = document.getElementById("dynamic-luck-result");
          if (resultContainer) resultContainer.innerHTML = renderDynamicLuckResult(dynamicContext);
        } catch (error) {
          const resultContainer = document.getElementById("dynamic-luck-result");
          if (resultContainer) {
            resultContainer.innerHTML = `<section class="dynamic-output-panel"><p class="conclusion">${escapeHtml(error.message || "動態資料產生失敗")}</p></section>`;
          }
        }
      });
    }

    function renderBaziAnalysis(payload) {
      const analysis = analyzeBazi(payload);
      const annual = payload.annualLuck;
      latestPromptExport = analysis.promptExport;

      document.getElementById("app").innerHTML = `
        <section class="hero">
          <div class="hero-copy">
            <h1>八字論命</h1>
            <p class="lead">以月令、旺衰、通根、格局、調候、用神為序，再看大運流年如何引動原局。</p>
          </div>
          <aside class="summary-panel">
            <div class="summary-grid">
              <div class="metric"><span>日主</span><strong class="${elementClass(payload.dayMaster.element)}">${escapeHtml(payload.dayMaster.stem)}${escapeHtml(payload.dayMaster.element)}</strong></div>
              <div class="metric"><span>出生</span><strong>${escapeHtml(payload.user.birthSolar)}</strong></div>
              <div class="metric"><span>月令</span><strong>${escapeHtml(payload.pillars.month.branch)}月</strong></div>
              <div class="metric"><span>流年</span><strong>${annual ? `${escapeHtml(annual.year)} ${escapeHtml(annual.pillar)}` : "待定"}</strong></div>
            </div>
          </aside>
        </section>

        <section class="chart-overview" id="chart-overview">
          ${renderPillar(payload.pillars.year, "年柱")}
          ${renderPillar(payload.pillars.month, "月柱")}
          ${renderPillar(payload.pillars.day, "日柱")}
          ${renderPillar(payload.pillars.hour, "時柱")}
        </section>

        <section class="section wide" id="five-element-bars">
          <h2>五行分布</h2>
          <p class="subtitle">數量只作入口，正式判斷仍以月令、透干、通根與合沖為主。</p>
          ${renderElementBars(payload.fiveElements)}
        </section>

        <div class="section-grid">
          ${analysis.sections.map(renderSection).join("")}
          <section class="section wide" id="luck-timeline">
            <h2>大運時間軸</h2>
            <p class="subtitle">每步十年。</p>
            ${renderTimeline(payload.luckCycles)}
          </section>
          <section class="section wide" id="monthly-cards">
            <h2>十二流月卡</h2>
            <p class="subtitle">依流年天干五虎遁推算，日期以節氣約略區間呈現。</p>
            ${renderAnnualMonths(analysis.annualMonths)}
          </section>
          <section class="section wide" id="shensha-list">
            <h2>核心神煞 Core Shen Sha Set</h2>
            <p class="subtitle">規則版本 ${escapeHtml(analysis.shenShaResult.ruleSetVersion)}；固定規則引擎計算，只作輔助參考。</p>
            ${renderShenSha(analysis.shenShaResult)}
          </section>
          <section class="section wide" id="ai-master-reading">
            <h2>AI Prompt 匯出</h2>
            <p class="subtitle">預設顯示永久 AI Prompt；完整除錯資料仍保留於內部輸出層。</p>
            <div id="ai-prompt-panel">${renderPromptPanel(latestPromptExport)}</div>
          </section>
          <section class="section wide" id="dynamic-luck-tools">
            <h2>動態時運資料包</h2>
            <p class="subtitle">輸入目標年月日時後，依原局、大運、流年、流月、流日、流時逐層整理。</p>
            ${renderDynamicLuckQuery(payload)}
            <div id="dynamic-luck-result">${renderDynamicLuckResult(latestPromptExport.dynamic.context)}</div>
          </section>
        </div>
      `;
      bindPromptModeSwitch(payload);
      syncTopbarPromptButtons(payload);
      bindDynamicLuckForm(payload);
    }

    try {
      const raw = localStorage.getItem("baziAnalysisPayload");
      const payload = raw ? JSON.parse(raw) : null;
      if (!payload?.pillars?.day || !payload?.dayMaster) renderEmptyState();
      else renderBaziAnalysis(payload);
    } catch (error) {
      renderEmptyState();
    }
  </script>
</body>
</html>
