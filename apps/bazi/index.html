<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八字輸入端測試</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf4dc;
      --text: #2f3338;
      --muted: #666a70;
      --line: #c9ced6;
      --blue: #3674f6;
      --red: #df3348;
      --white: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      font-size: 28px;
      font-weight: 700;
    }

    main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 28px;
    }

    .page-top {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 148px;
      height: 52px;
      padding: 0 18px;
      border: 2px solid rgba(47, 51, 56, 0.18);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
    }

    .form {
      display: grid;
      gap: 28px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 24px 0 28px;
    }

    .tab-button {
      min-width: 0;
      width: auto;
      height: 56px;
      padding: 0 24px;
      border: 2px solid rgba(47, 51, 56, 0.18);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 22px;
    }

    .tab-button.is-active {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .calendar-toggle {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px 34px;
    }

    .calendar-toggle .option {
      font-size: 26px;
    }

    .calendar-panel {
      display: grid;
      gap: 10px;
    }

    .calendar-panel[hidden],
    .tab-panel[hidden] {
      display: none;
    }

    .calendar-preview {
      margin-left: 208px;
      min-height: 34px;
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
    }

    .calendar-preview.is-error {
      color: var(--red);
    }

    .row > input[type="text"] {
      flex: 1;
      min-width: 0;
    }

    .lunar-date-controls {
      display: grid;
      grid-template-columns: minmax(170px, 230px) minmax(160px, 220px) minmax(140px, 190px) minmax(118px, 160px) minmax(118px, 160px);
      gap: 0;
      flex: 1;
    }

    .profile-toolbar {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 22px;
    }

    .profile-search {
      flex: 1;
      height: 58px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 5px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 22px;
      font-weight: 500;
    }

    .storage-note,
    .empty-profiles {
      color: var(--muted);
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
    }

    .profile-list {
      display: grid;
      gap: 14px;
    }

    .profile-card {
      padding: 18px;
      border: 1px solid rgba(47, 51, 56, 0.18);
      border-radius: 6px;
      background: #fffdf4;
    }

    .profile-card h3 {
      margin: 0 0 12px;
      font-size: 25px;
    }

    .profile-card p {
      margin: 6px 0;
      color: #4d5258;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
    }

    .profile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .profile-actions button {
      min-width: 150px;
      width: auto;
      height: 52px;
      padding: 0 16px;
      font-size: 19px;
    }

    .profile-delete-button {
      border: 2px solid rgba(223, 51, 72, 0.4);
      background: #ffffff;
      color: var(--red);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 28px;
      min-height: 74px;
    }

    .label {
      width: 180px;
      flex: 0 0 180px;
      text-align: right;
      white-space: nowrap;
      font-size: 32px;
      letter-spacing: 0;
    }

    .date-controls {
      display: grid;
      grid-template-columns: minmax(170px, 230px) minmax(96px, 128px) minmax(108px, 150px) minmax(132px, 180px) minmax(118px, 160px);
      gap: 0;
      flex: 1;
    }

    .quick-time-row {
      margin-top: -20px;
      margin-left: 208px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quick-time-button {
      min-width: 180px;
      height: 48px;
      border: 2px solid rgba(47, 51, 56, 0.16);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
    }

    .quick-time-note {
      color: var(--muted);
      font-size: 18px;
      font-weight: 600;
    }

    select,
    input[type="number"],
    input[type="text"] {
      width: 100%;
      height: 68px;
      padding: 0 48px 0 18px;
      border: 2px solid var(--line);
      border-radius: 5px;
      background: var(--white);
      color: #24272c;
      font: inherit;
      font-weight: 500;
      letter-spacing: 0;
    }

    input[type="number"] {
      padding-right: 18px;
    }

    .radio-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 34px 48px;
      flex: 1;
    }

    label.option {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      min-height: 52px;
      cursor: pointer;
      line-height: 1.2;
      letter-spacing: 0;
    }

    input[type="radio"] {
      width: 36px;
      height: 36px;
      margin: 0;
      accent-color: var(--blue);
      flex: 0 0 auto;
    }

    .hint {
      color: var(--muted);
      font-size: 26px;
      font-weight: 700;
    }

    .subhint {
      margin-top: -22px;
      margin-left: 208px;
      color: var(--muted);
      font-size: 26px;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      padding-top: 22px;
    }

    button {
      min-width: 282px;
      height: 96px;
      border: 0;
      border-radius: 8px;
      background: var(--red);
      color: var(--white);
      font: inherit;
      font-size: 34px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0;
    }

    button:active {
      transform: translateY(1px);
    }

    .secondary-button {
      border: 2px solid rgba(47, 51, 56, 0.18);
      background: #ffffff;
      color: var(--text);
    }

    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .result {
      margin-top: 28px;
      padding: 18px 20px;
      border: 2px solid rgba(47, 51, 56, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.66);
    }

    .result-title {
      margin: 0 0 16px;
      font-size: 26px;
    }

    .pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .pillar {
      display: grid;
      gap: 12px;
      min-height: 300px;
      padding: 16px 12px;
      border: 1px solid rgba(47, 51, 56, 0.18);
      border-radius: 6px;
      background: #fffdf4;
      text-align: center;
      align-content: start;
    }

    .pillar-label {
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
    }

    .pillar-line {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .pillar-char-row {
      display: grid;
      grid-template-columns: 76px minmax(72px, 1fr);
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .pillar-char {
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      border: 2px solid rgba(47, 51, 56, 0.16);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }

    .pillar-char.branch {
      background: #f7fbff;
    }

    .element-wood {
      color: #1d8f5a;
      border-color: rgba(29, 143, 90, 0.38);
      background: #eefaf3;
    }

    .element-fire {
      color: #d94835;
      border-color: rgba(217, 72, 53, 0.38);
      background: #fff1ee;
    }

    .element-earth {
      color: #a66a1f;
      border-color: rgba(166, 106, 31, 0.38);
      background: #fff6e5;
    }

    .element-metal {
      color: #7b7f88;
      border-color: rgba(123, 127, 136, 0.42);
      background: #f4f6f8;
    }

    .element-water {
      color: #2674b8;
      border-color: rgba(38, 116, 184, 0.38);
      background: #eef7ff;
    }

    .char-meta {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      text-align: left;
    }

    .char-meta span {
      display: block;
    }

    .char-meta strong {
      color: var(--text);
      font-weight: 800;
    }

    .element-text {
      display: inline;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 900;
    }

    .hidden-stem {
      display: inline-block;
      margin-right: 4px;
      font-weight: 800;
      white-space: nowrap;
    }

    .analysis-section {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(47, 51, 56, 0.16);
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-heading h3 {
      margin: 0;
      font-size: 24px;
    }

    .section-note {
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .luck-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .annual-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .annual-controls input {
      width: 120px;
      height: 42px;
      padding: 0 10px;
      font-size: 18px;
      font-weight: 800;
    }

    .annual-confirm-button {
      min-width: 68px;
      height: 42px;
      border: 2px solid rgba(47, 51, 56, 0.16);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
    }

    .luck-item,
    .annual-card {
      border: 1px solid rgba(47, 51, 56, 0.16);
      border-radius: 6px;
      background: #fffdf4;
      padding: 12px;
    }

    .luck-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .luck-item .pillar-line,
    .annual-card .pillar-line {
      justify-items: stretch;
    }

    .luck-item .pillar-char-row,
    .annual-card .pillar-char-row {
      grid-template-columns: 58px minmax(82px, 1fr);
    }

    .luck-item .pillar-char,
    .annual-card .pillar-char {
      width: 58px;
      height: 58px;
      font-size: 32px;
    }

    .annual-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 760px) {
      body {
        font-size: 22px;
      }

      main {
        width: min(520px, calc(100vw - 24px));
        padding-top: 24px;
      }

      .page-top {
        justify-content: stretch;
      }

      .home-link {
        width: 100%;
      }

      .form {
        gap: 28px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        min-height: 0;
      }

      .label {
        width: auto;
        flex-basis: auto;
        text-align: left;
        font-size: 26px;
      }

      .date-controls {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tabs {
        margin-top: 18px;
      }

      .tab-button {
        flex: 1;
        padding: 0 10px;
        font-size: 20px;
      }

      .calendar-toggle {
        gap: 14px 22px;
      }

      .calendar-toggle .option {
        font-size: 21px;
      }

      .calendar-preview {
        margin-left: 0;
        font-size: 17px;
      }

      .lunar-date-controls {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .profile-toolbar {
        display: grid;
      }

      .profile-search {
        width: 100%;
        font-size: 19px;
      }

      .quick-time-row {
        margin-top: -12px;
        margin-left: 0;
        display: grid;
        gap: 8px;
      }

      .quick-time-button {
        width: 100%;
        height: 52px;
        font-size: 20px;
      }

      select,
      input[type="number"],
      input[type="text"] {
        height: 58px;
        padding-left: 12px;
        font-size: 21px;
      }

      .radio-group {
        gap: 18px 26px;
      }

      label.option {
        gap: 12px;
      }

      .hint,
      .subhint {
        font-size: 19px;
      }

      .subhint {
        margin-top: -14px;
        margin-left: 0;
      }

      button {
        width: 100%;
        min-width: 0;
        height: 74px;
        font-size: 28px;
      }

      .pillars {
        grid-template-columns: 1fr 1fr;
      }

      .pillar {
        min-height: 280px;
      }

      .pillar-char {
        width: 66px;
        height: 66px;
        font-size: 36px;
      }

      .pillar-char-row {
        grid-template-columns: 66px minmax(66px, 1fr);
      }

      .section-heading {
        display: grid;
      }

      .luck-grid {
        grid-template-columns: 1fr;
      }

      .annual-grid {
        grid-template-columns: 1fr;
      }

      .annual-controls {
        display: grid;
      }

      .annual-controls input {
        width: 100%;
      }
    }
  </style>
  <link rel="stylesheet" href="../../assets/louisko-theme.css">
</head>
<body>
  <main>
    <div class="page-top">
      <a class="louisko-page-brand" href="../../index.html" aria-label="Louisko 首頁">
        <img class="louisko-logo" src="../../assets/louis-logo-transparent.png" alt="Louis">
        <span class="louisko-brand-text">Louisko</span>
      </a>
      <a class="home-link" href="../../index.html">回首頁</a>
    </div>
    <section class="bazi-input-hero">
      <p class="kicker">Bazi</p>
      <h1>八字排盤</h1>
    </section>
    <nav class="tabs" aria-label="八字功能分頁">
      <button class="tab-button is-active" id="tab-chart" type="button" aria-controls="chart-panel" aria-selected="true">八字排盤</button>
      <button class="tab-button" id="tab-profiles" type="button" aria-controls="profiles-panel" aria-selected="false">命主紀錄</button>
    </nav>

    <section class="tab-panel" id="chart-panel">
      <form class="form" id="birth-form">
        <div class="row">
          <div class="label">命主姓名：</div>
          <input id="profile-name" type="text" maxlength="100" autocomplete="name" placeholder="請輸入全名、英文名或綽號" aria-label="命主姓名">
        </div>

        <div class="row">
          <div class="label">曆法輸入：</div>
          <div class="calendar-toggle">
            <label class="option"><input type="radio" name="calendarType" value="solar" checked>國曆（陽曆）</label>
            <label class="option"><input type="radio" name="calendarType" value="lunar">農曆（陰曆）</label>
          </div>
        </div>

        <div class="calendar-panel" id="solar-input-panel">
          <div class="row">
            <div class="label">國曆生日：</div>
            <div class="date-controls">
              <input id="year" type="number" min="1900" max="2100" step="1" aria-label="西元年">
              <select id="month" aria-label="國曆月份"></select>
              <select id="day" aria-label="國曆日期"></select>
              <select id="hour" aria-label="出生小時"></select>
              <select id="minute" aria-label="出生分鐘"></select>
            </div>
          </div>
          <div class="calendar-preview" id="solar-lunar-preview" aria-live="polite"></div>
        </div>

        <div class="calendar-panel" id="lunar-input-panel" hidden>
          <div class="row">
            <div class="label">農曆生日：</div>
            <div class="lunar-date-controls">
              <input id="lunar-year" type="number" min="1900" max="2100" step="1" aria-label="農曆年份">
              <select id="lunar-month" aria-label="農曆月份"></select>
              <select id="lunar-day" aria-label="農曆日期"></select>
              <select id="lunar-hour" aria-label="出生小時"></select>
              <select id="lunar-minute" aria-label="出生分鐘"></select>
            </div>
          </div>
          <div class="calendar-preview" id="lunar-solar-preview" aria-live="polite"></div>
        </div>

        <div class="quick-time-row">
          <button class="quick-time-button" id="set-current-time" type="button">當下時間</button>
          <span class="quick-time-note" id="current-time-note"></span>
        </div>

        <div class="row">
          <div class="label">性別：</div>
          <div class="radio-group">
            <label class="option"><input type="radio" name="gender" value="男" checked>男</label>
            <label class="option"><input type="radio" name="gender" value="女">女</label>
          </div>
        </div>

        <div class="row">
          <div class="label">出生地：</div>
          <div class="radio-group">
            <label class="option"><input type="radio" name="birthHemisphere" value="北半球" checked>北半球</label>
            <label class="option"><input type="radio" name="birthHemisphere" value="南半球">南半球<span class="hint">(例如紐、澳、南美等地)</span></label>
          </div>
        </div>

        <div class="row">
          <div class="label">換日法：</div>
          <div class="radio-group">
            <label class="option"><input type="radio" name="dayChangeMethod" value="子初換日" checked>子初換日(建議)</label>
            <label class="option"><input type="radio" name="dayChangeMethod" value="子正換日">子正換日</label>
          </div>
        </div>
        <div class="subhint">(換日法差異僅影響23:00~23:59出生者)</div>

        <div class="actions">
          <button type="submit">開始批算√</button>
          <button class="secondary-button" id="open-analysis" type="button" disabled>論命</button>
        </div>
      </form>

      <section class="result" id="result" hidden>
        <h2 class="result-title">年月日時八字</h2>
        <div class="pillars" id="pillars"></div>
        <div class="analysis-section">
          <div class="section-heading">
            <h3>大運</h3>
            <span class="section-note" id="luck-direction-note"></span>
          </div>
          <div class="luck-grid" id="luck-cycles"></div>
        </div>
        <div class="analysis-section">
          <div class="section-heading">
            <h3>流年</h3>
            <label class="annual-controls">
              <span>流年當年</span>
              <input id="annual-target-year" type="number" min="1" max="9999" step="1" aria-label="流年當年">
              <button class="annual-confirm-button" id="confirm-annual-year" type="button">確認</button>
            </label>
          </div>
          <div class="annual-grid" id="annual-flow"></div>
        </div>
      </section>
    </section>

    <section class="tab-panel" id="profiles-panel" hidden>
      <div class="profile-toolbar">
        <input class="profile-search" id="profile-search" type="search" placeholder="搜尋命主姓名或西元出生年" aria-label="搜尋命主">
      </div>
      <p class="storage-note" id="profile-storage-status" aria-live="polite">正在連線雲端命主紀錄…</p>
      <div class="profile-list" id="profile-list"></div>
    </section>
  </main>

  <script src="./vendor/lunar-javascript-1.7.7.js"></script>
  <script>
    const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const tigerStartStemByYearStem = {
      甲: "丙", 己: "丙", 乙: "戊", 庚: "戊", 丙: "庚", 辛: "庚", 丁: "壬", 壬: "壬", 戊: "甲", 癸: "甲"
    };
    const stemElement = {
      甲: "木", 乙: "木", 丙: "火", 丁: "火", 戊: "土", 己: "土", 庚: "金", 辛: "金", 壬: "水", 癸: "水"

    function getLunarLibrary() {
      if (typeof window.Solar?.fromYmdHms !== "function" || typeof window.Lunar?.fromYmdHms !== "function" || typeof window.LunarYear?.fromYear !== "function") {
        throw new Error("曆法轉換引擎尚未載入，請重新整理頁面。");
      }
      return { Solar: window.Solar, Lunar: window.Lunar, LunarYear: window.LunarYear };
    }

    function formatLunarMonth(month, isLeap = false) {
      const names = ["", "正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
      return `${isLeap ? "閏" : ""}${names[month] || `${month}月`}`;
    }

    function formatLunarDay(day) {
      const names = ["", "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十", "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十", "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"];
      return names[day] || `${day}日`;
    }

    function formatSolarDate(date) {
      return `${date.year}-${String(date.month).padStart(2, "0")}-${String(date.day).padStart(2, "0")} ${String(date.hour).padStart(2, "0")}:${String(date.minute).padStart(2, "0")}`;
    }

    function formatLunarRecord(lunar) {
      return `${lunar.ganzhiYear || ""}年 ${formatLunarMonth(lunar.month, lunar.isLeap)}${formatLunarDay(lunar.day)}`;
    }

    function solarToLunar(solar) {
      const { Solar } = getLunarLibrary();
      const lunar = Solar.fromYmdHms(solar.year, solar.month, solar.day, solar.hour, solar.minute, 0).getLunar();
      return {
        year: lunar.getYear(),
        month: Math.abs(lunar.getMonth()),
        day: lunar.getDay(),
        isLeap: lunar.getMonth() < 0,
        ganzhiYear: lunar.getYearInGanZhi()
      };
    }

    function lunarToSolar(lunar, hour, minute) {
      const { Lunar } = getLunarLibrary();
      const lunarMonth = lunar.isLeap ? -Math.abs(lunar.month) : Math.abs(lunar.month);
      const source = Lunar.fromYmdHms(lunar.year, lunarMonth, lunar.day, hour, minute, 0);
      const solar = source.getSolar();
      return {
        year: solar.getYear(),
        month: solar.getMonth(),
        day: solar.getDay(),
        hour,
        minute
      };
    }

    function getLunarMonthDays(year, month, isLeap) {
      const { LunarYear } = getLunarLibrary();
      const lunarMonth = isLeap ? -Math.abs(month) : Math.abs(month);
      const lunarMonthRecord = LunarYear.fromYear(year).getMonth(lunarMonth);
      if (!lunarMonthRecord) {
        throw new RangeError(`此農曆年份沒有${formatLunarMonth(month, isLeap)}。`);
      }
      return lunarMonthRecord.getDayCount();
    }

    function getLeapMonth(year) {
      const { LunarYear } = getLunarLibrary();
      return LunarYear.fromYear(year).getLeapMonth();
    }

    function appendOptions(select, options, selectedValue) {
      select.innerHTML = "";
      for (const option of options) {
        const el = document.createElement("option");
        el.value = String(option.value);
        el.textContent = option.label;
        el.selected = option.value === selectedValue;
        select.appendChild(el);
      }
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function updateDayOptions() {
      const year = Number(document.getElementById("year").value) || defaults.year;
      const month = Number(document.getElementById("month").value) || defaults.month;
      const daySelect = document.getElementById("day");
      const previousDay = Number(daySelect.value) || defaults.day;
      const maxDay = getDaysInMonth(year, month);
      const selectedDay = Math.min(previousDay, maxDay);

      appendOptions(
        daySelect,
        Array.from({ length: maxDay }, (_, index) => ({ value: index + 1, label: `${index + 1} 日` })),
        selectedDay
      );
    }

    function updateLunarMonthOptions() {
      const year = Number(document.getElementById("lunar-year").value);
      const monthSelect = document.getElementById("lunar-month");
      const previousMonth = Number(monthSelect.value) || 1;
      if (!Number.isInteger(year) || year < LUNAR_MIN_YEAR || year > LUNAR_MAX_YEAR) {
        appendOptions(monthSelect, [], null);
        updateLunarDayOptions();
        return;
      }

      const leapMonth = getLeapMonth(year);
      const options = [];
      for (let month = 1; month <= 12; month += 1) {
        options.push({ value: month, label: formatLunarMonth(month) });
        if (month === leapMonth) options.push({ value: -month, label: formatLunarMonth(month, true) });
      }
      const selectedMonth = options.some((option) => option.value === previousMonth) ? previousMonth : 1;
      appendOptions(monthSelect, options, selectedMonth);
      updateLunarDayOptions();
    }

    function updateLunarDayOptions() {
      const year = Number(document.getElementById("lunar-year").value);
      const selectedMonthValue = Number(document.getElementById("lunar-month").value);
      const daySelect = document.getElementById("lunar-day");
      if (!Number.isInteger(year) || !selectedMonthValue) {
        appendOptions(daySelect, [], null);
        return;
      }

      try {
        const month = Math.abs(selectedMonthValue);
        const isLeap = selectedMonthValue < 0;
        const maxDay = getLunarMonthDays(year, month, isLeap);
        const previousDay = Number(daySelect.value) || 1;
        appendOptions(
          daySelect,
          Array.from({ length: maxDay }, (_, index) => ({ value: index + 1, label: formatLunarDay(index + 1) })),
          Math.min(previousDay, maxDay)
        );
      } catch (error) {
        appendOptions(daySelect, [], null);
      }
    }

        month: Math.abs(monthValue),

    function setLunarFields(lunar, hour = defaults.hour, minute = defaults.minute) {
      document.getElementById("lunar-year").value = String(lunar.year);
      updateLunarMonthOptions();
      document.getElementById("lunar-month").value = String(lunar.isLeap ? -lunar.month : lunar.month);
      updateLunarDayOptions();
      document.getElementById("lunar-day").value = String(lunar.day);
      document.getElementById("lunar-hour").value = String(hour);

    function isCompleteSolar(solar) {
      try {
        validateBirthInput({ ...solar, timezoneOffset: defaults.timezoneOffset, lateZiSwitchDay: false });
        return true;
      } catch (error) {
        return false;
      }
    }

    function isCompleteLunar(lunar) {
      return Number.isInteger(lunar.year) && lunar.year >= LUNAR_MIN_YEAR && lunar.year <= LUNAR_MAX_YEAR &&
        Number.isInteger(lunar.month) && lunar.month >= 1 && lunar.month <= 12 && Number.isInteger(lunar.day) &&
        Number.isInteger(lunar.hour) && lunar.hour >= 0 && lunar.hour <= 23 && Number.isInteger(lunar.minute) &&
        lunar.minute >= 0 && lunar.minute <= 59;
    }

    function updateCalendarPreview() {
      const solarPreview = document.getElementById("solar-lunar-preview");
      const lunarPreview = document.getElementById("lunar-solar-preview");
      solarPreview.classList.remove("is-error");
      lunarPreview.classList.remove("is-error");

      if (activeCalendarType === "solar") {
        const solar = readSolarFields();
        if (!isCompleteSolar(solar)) {
          solarPreview.textContent = "請輸入完整且合法的國曆出生年月日時。";
          solarPreview.classList.add("is-error");
          return;
        }
        try {
          lastConvertedSolar = solar;
          lastConvertedLunar = solarToLunar(solar);
          solarPreview.textContent = `對應農曆：${formatLunarRecord(lastConvertedLunar)}`;
        } catch (error) {
          solarPreview.textContent = error instanceof Error ? error.message : "日期轉換失敗，請確認輸入日期是否合法。";
          solarPreview.classList.add("is-error");
        }
        return;
      }

      const lunar = readLunarFields();
      if (!isCompleteLunar(lunar)) {
        lunarPreview.textContent = "請輸入完整且合法的農曆出生年月日時。";
        lunarPreview.classList.add("is-error");
        return;
      }
      try {
        const maxDay = getLunarMonthDays(lunar.year, lunar.month, lunar.isLeap);
        if (lunar.day > maxDay) throw new RangeError(`農曆${formatLunarMonth(lunar.month, lunar.isLeap)}此年只有${maxDay}天。`);
        lastConvertedLunar = lunar;
        lastConvertedSolar = lunarToSolar(lunar, lunar.hour, lunar.minute);
        lunarPreview.textContent = `對應國曆：${formatSolarDate(lastConvertedSolar)}`;
      } catch (error) {
        lunarPreview.textContent = error instanceof Error ? error.message : "日期轉換失敗，請確認輸入日期是否合法。";
        lunarPreview.classList.add("is-error");
      }
    }

    function getStoredProfiles() {

        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter((profile) => profile && typeof profile === "object" && profile.id && profile.birthSolar);
      } catch (error) {
        return [];
      }
    }

    function writeStoredProfiles(profiles) {

    function getBaziProfileOwnerKey() {
      if (profileCloudState.ownerKey) return profileCloudState.ownerKey;
      try {
        const existing = window.localStorage.getItem(PROFILE_OWNER_KEY_STORAGE_KEY);
        if (/^[a-zA-Z0-9_-]{16,100}$/.test(existing || "")) {
          profileCloudState.ownerKey = existing;
          return existing;
        }
        const generated = window.crypto?.randomUUID?.() || `owner-${Date.now()}-${Math.random().toString(36).slice(2, 14)}`;
        window.localStorage.setItem(PROFILE_OWNER_KEY_STORAGE_KEY, generated);
        profileCloudState.ownerKey = generated;
        return generated;
      } catch (error) {
        const generated = `owner-${Date.now()}-${Math.random().toString(36).slice(2, 14)}`;
        profileCloudState.ownerKey = generated;
        return generated;
      }
    }

    function getBaziCloudApiBases() {
      if (window.location?.protocol && window.location.protocol !== "file:") return [window.location.origin];
      return BAZI_CLOUD_API_BASES;
    }

    async function fetchBaziCloud(path, options = {}) {
      const ownerKey = getBaziProfileOwnerKey();
      const headers = { ...(options.headers || {}), ["X-Bazi-Owner-Key"]: ownerKey };
      if (options.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
      let lastResponse = null;
      let lastError = null;
      for (const base of getBaziCloudApiBases()) {
        try {
          const response = await fetch(`${base}${path}`, { ...options, headers });
          if (response.status === 404 || response.status === 405) {
            lastResponse = response;
            continue;
          }
          return response;
        } catch (error) {
          lastError = error;
        }
      }
      if (lastResponse) return lastResponse;
      throw lastError || new Error("雲端命主紀錄連線失敗。");
    }

    async function getBaziCloudProfiles() {
      const response = await fetchBaziCloud(BAZI_PROFILE_API_PATH, { cache: "no-store" });
      if (!response.ok) throw new Error(`雲端命主紀錄讀取失敗（${response.status}）。`);
      const data = await response.json();
      return Array.isArray(data.profiles) ? data.profiles : [];
    }

    async function postBaziCloudProfile(profile) {
      const response = await fetchBaziCloud(BAZI_PROFILE_API_PATH, {
        method: "POST",
        body: JSON.stringify({ profile })
      });
      if (!response.ok) throw new Error(`雲端命主紀錄儲存失敗（${response.status}）。`);
      const data = await response.json();
      return Array.isArray(data.profiles) ? data.profiles : [];
    }

    async function deleteBaziCloudProfile(id) {
      const response = await fetchBaziCloud(`${BAZI_PROFILE_API_PATH}/${encodeURIComponent(id)}`, { method: "DELETE" });
      if (!response.ok) throw new Error(`雲端命主紀錄刪除失敗（${response.status}）。`);
      const data = await response.json();
      return Array.isArray(data.profiles) ? data.profiles : [];
    }

    async function initializeBaziProfileCloud() {
      if (profileCloudState.syncing) return;
      profileCloudState.syncing = true;
      setProfileStorageStatus("正在連線雲端命主紀錄…");
      try {
        const localProfiles = getStoredProfiles();
        let cloudProfiles = await getBaziCloudProfiles();
        if (!cloudProfiles.length && localProfiles.length) {
          for (const profile of localProfiles) cloudProfiles = await postBaziCloudProfile(profile);
        }
        writeStoredProfiles(cloudProfiles);
        profileCloudState.available = true;
        setProfileStorageStatus("雲端命主紀錄已連線；目前以此瀏覽器同步識別碼分開，尚未提供帳號跨裝置登入。", true);
        renderProfiles();
      } catch (error) {
        profileCloudState.available = false;
        setProfileStorageStatus("雲端暫時無法連線，目前只保留在此瀏覽器；連線恢復後可再同步。");
        console.warn("Bazi cloud profile sync failed:", error);
      } finally {
        profileCloudState.syncing = false;
      }
    }

    async function syncBaziProfileToCloud(profile) {
      try {
        const cloudProfiles = await postBaziCloudProfile(profile);
        writeStoredProfiles(cloudProfiles);
        profileCloudState.available = true;
        setProfileStorageStatus("雲端命主紀錄已同步；目前以此瀏覽器同步識別碼分開，尚未提供帳號跨裝置登入。", true);
        renderProfiles();
      } catch (error) {
        profileCloudState.available = false;
        setProfileStorageStatus("雲端同步失敗，目前資料仍保留在此瀏覽器；請稍後重試。");
        console.warn("Bazi cloud profile save failed:", error);
      }
    }

    async function syncDeletedBaziProfileToCloud(id) {
      try {
        const cloudProfiles = await deleteBaziCloudProfile(id);
        writeStoredProfiles(cloudProfiles);
        profileCloudState.available = true;
        setProfileStorageStatus("雲端命主紀錄已同步刪除。", true);
        renderProfiles();
      } catch (error) {
        profileCloudState.available = false;
        setProfileStorageStatus("雲端刪除尚未完成；本機紀錄已刪除，請稍後重試。", false);
        console.warn("Bazi cloud profile delete failed:", error);
      }
    }

    function createProfileId() {
      if (window.crypto?.randomUUID) return window.crypto.randomUUID();
      return `profile-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function profileIdentity(profile) {
      const solar = profile.birthSolar;
      return [
        profile.name || "",
        solar.year,
        solar.month,
        solar.day,
        solar.hour,
        solar.minute,
        profile.gender,
        profile.hemisphere,
        profile.dayChangeRule,
        profile.birthPlace || "",
        profile.timezone || "Asia/Taipei"
      ].join("|");
    }

    function saveBaziProfile(profile) {
      const profiles = getStoredProfiles();
      const identity = profileIdentity(profile);
      const existingIndex = profiles.findIndex((item) => profileIdentity(item) === identity);
      const now = new Date().toISOString();
      const record = {
        ...profile,
        id: existingIndex >= 0 ? profiles[existingIndex].id : profile.id || createProfileId(),
        createdAt: existingIndex >= 0 ? profiles[existingIndex].createdAt : now,
        updatedAt: now,
        version: 1
      };
      if (existingIndex >= 0) profiles[existingIndex] = record;
      else profiles.push(record);
      writeStoredProfiles(profiles);
      return record;
    }

    function deleteBaziProfile(id) {
      return writeStoredProfiles(getStoredProfiles().filter((profile) => profile.id !== id));
    }

    function buildBaziProfileRecord(input) {
      const solar = {
        year: input.year,
        month: input.month,
        day: input.day,
        hour: input.hour,
        minute: input.minute
      };
      const name = input.displayName || `未命名命主 ${formatSolarDate(solar).slice(0, 10)}`;
      return {
        id: createProfileId(),
        name,
        inputCalendarType: input.calendarType,
        birthSolar: solar,
        birthLunar: input.birthLunar,
        gender: input.gender === "男" ? "male" : "female",
        hemisphere: input.birthHemisphere === "南半球" ? "south" : "north",
        dayChangeRule: input.lateZiSwitchDay ? "lateZiHour" : "midnight",
        birthPlace: input.birthHemisphere,
        timezone: input.timezoneOffset === 8 ? "Asia/Taipei" : `UTC${input.timezoneOffset >= 0 ? "+" : ""}${input.timezoneOffset}`,
        timezoneOffset: input.timezoneOffset,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        version: 1
      };
    }

    function formatProfileTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "未記錄";
      return date.toLocaleString("zh-TW", { dateStyle: "medium", timeStyle: "short" });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, (character) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[character]));
    }

    function renderProfiles() {
      const container = document.getElementById("profile-list");
      const query = document.getElementById("profile-search").value.trim().toLowerCase();
      const profiles = getStoredProfiles()
        .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
        .filter((profile) => !query || `${profile.name} ${profile.birthSolar?.year}`.toLowerCase().includes(query));

      if (!profiles.length) {
        container.innerHTML = `<p class="empty-profiles">${query ? "找不到符合條件的命主紀錄。" : "尚無命主紀錄。完成一次排盤後，資料會自動出現在這裡。"}</p>`;

      }

      container.innerHTML = profiles.map((profile) => {

        const hemisphere = profile.hemisphere === "south" ? "南半球" : "北半球";

            <div class="profile-actions">
              <button class="profile-use-button" type="button" data-profile-id="${escapeHtml(profile.id)}">使用此資料</button>
              <button class="profile-delete-button" type="button" data-delete-profile-id="${escapeHtml(profile.id)}">刪除</button>
            </div>
          </article>

    }

    function setRadioValue(name, value) {
      const radio = document.querySelector(`input[name="${name}"][value="${value}"]`);
      if (radio) radio.checked = true;

    function loadBaziProfile(profile) {

    function showTab(tab) {
      const isChart = tab === "chart";
      document.getElementById("chart-panel").hidden = !isChart;
      document.getElementById("profiles-panel").hidden = isChart;
      document.getElementById("tab-chart").classList.toggle("is-active", isChart);
      document.getElementById("tab-profiles").classList.toggle("is-active", !isChart);
      document.getElementById("tab-chart").setAttribute("aria-selected", String(isChart));
      document.getElementById("tab-profiles").setAttribute("aria-selected", String(!isChart));
      if (!isChart) renderProfiles();
    }

    function getTenGod(dayMaster, targetStem) {
      if (dayMaster === targetStem) return "比肩";
      const dayElement = stemElement[dayMaster];
      const targetElement = stemElement[targetStem];
      const samePolarity = stemYinYang[dayMaster] === stemYinYang[targetStem];

      if (dayElement === targetElement) return samePolarity ? "比肩" : "劫財";
      if (elementGenerates[dayElement] === targetElement) return samePolarity ? "食神" : "傷官";
      if (elementControls[dayElement] === targetElement) return samePolarity ? "偏財" : "正財";
      if (elementControls[targetElement] === dayElement) return samePolarity ? "七殺" : "正官";
      if (elementGenerates[targetElement] === dayElement) return samePolarity ? "偏印" : "正印";
      return "";
    }

    function stemIsYang(stem) {
      return ["甲", "丙", "戊", "庚", "壬"].includes(stem);
    }

    function getLuckDirection(gender, yearStem) {
      const yang = stemIsYang(yearStem);
      return (gender === "男" && yang) || (gender === "女" && !yang) ? "順行" : "逆行";
    }

    function movePillar(base, offset) {
      const stem = stems[(stems.indexOf(base.stem) + offset + 1000) % 10];
      const branch = branches[(branches.indexOf(base.branch) + offset + 1200) % 12];
      return { stem, branch, ganzhi: `${stem}${branch}` };
    }

    function calculateStartAge(diffHours) {
      return Number((diffHours / 24 / 3).toFixed(2));
    }

    function getAdjacentSolarTermForLuck(input, direction) {
      const birthUtcMs = localTimeToUtcMs(input.year, input.month, input.day, input.hour, input.minute, input.timezoneOffset);
      const terms = [input.year - 1, input.year, input.year + 1]
        .flatMap((year) => getSolarMonthTermTimes(year))
        .sort((a, b) => a.utcMs - b.utcMs);
      return direction === "順行"
        ? terms.find((term) => term.utcMs > birthUtcMs)
        : terms.filter((term) => term.utcMs < birthUtcMs).at(-1);
    }

    function formatTermLocalTime(utcMs, timezoneOffset) {
      const termLocalTime = new Date(utcMs + timezoneOffset * 60 * msPerMinute);
      return `${termLocalTime.getUTCFullYear()}-${String(termLocalTime.getUTCMonth() + 1).padStart(2, "0")}-${String(termLocalTime.getUTCDate()).padStart(2, "0")} ${String(termLocalTime.getUTCHours()).padStart(2, "0")}:${String(termLocalTime.getUTCMinutes()).padStart(2, "0")}`;
    }

    function calculateLuckStartInfo(input, direction) {
      const birthUtcMs = localTimeToUtcMs(input.year, input.month, input.day, input.hour, input.minute, input.timezoneOffset);
      const target = getAdjacentSolarTermForLuck(input, direction);
      if (!target) throw new Error("無法取得起運用的前後節氣。");
      const diffHours = Math.abs(target.utcMs - birthUtcMs) / (60 * msPerMinute);
      return {
        direction,
        startAge: calculateStartAge(diffHours),
        diffHours: Number(diffHours.toFixed(2)),
        solarTermName: target.name,
        solarTermTime: formatTermLocalTime(target.utcMs, input.timezoneOffset),
        solarTermUtcMs: target.utcMs
      };
    }

    function calculateLuckCycles(monthPillar, dayMaster, birthYear, direction, startAge, steps = 10) {
      const sign = direction === "順行" ? 1 : -1;
      return Array.from({ length: steps }, (_, index) => {
        const pillar = movePillar(monthPillar, sign * (index + 1));
        const startAgeOfCycle = startAge + index * 10;
        const mainStem = branchMainStem[pillar.branch];
        return {
          index: index + 1,
          ...pillar,
          startAge: Math.floor(startAgeOfCycle),
          endAge: Math.floor(startAge + (index + 1) * 10 - 1),
          startYear: birthYear + Math.floor(startAgeOfCycle),
          endYear: birthYear + Math.floor(startAge + (index + 1) * 10 - 1),
          startAgeExact: Number(startAgeOfCycle.toFixed(2)),
          stemTenGod: getTenGod(dayMaster, pillar.stem),
          branchMainTenGod: getTenGod(dayMaster, mainStem),
          branchMainStem: mainStem
        };
      });
    }

    function getAnnualFlow(year, dayMaster) {
      const pillar = ganzhiFromIndex(year - jiaZiYear);
      const mainStem = branchMainStem[pillar.branch];
      return {
        year,
        ...pillar,
        stemTenGod: getTenGod(dayMaster, pillar.stem),
        branchMainStem: mainStem,
        branchMainTenGod: getTenGod(dayMaster, mainStem)
      };
    }

    function elementClass(element) {
      return elementClassByElement[element] ?? "";
    }

    function elementBadge(element) {
      return `<strong class="element-text ${elementClass(element)}">${element}</strong>`;
    }

    function renderHiddenStemTenGod(dayMaster, stem) {
      const element = stemElement[stem];
      return `<span class="hidden-stem ${elementClass(element)}">${stem}${getTenGod(dayMaster, stem)}</span>`;
    }

    function renderPillarContent(pillar, dayMaster, stemTenGodLabel) {
      const pillarStemElement = stemElement[pillar.stem];
      const pillarBranchElement = branchElement[pillar.branch];
      const mainStem = branchMainStem[pillar.branch];
      const branchTenGod = getTenGod(dayMaster, mainStem);
      const hiddenTenGods = hiddenStems[pillar.branch]
        .filter((stem) => stem !== mainStem)
        .map((stem) => renderHiddenStemTenGod(dayMaster, stem))
        .join("") || "無";

      return `
        <div class="pillar-line">
          <div class="pillar-char-row">
            <div class="pillar-char stem ${elementClass(pillarStemElement)}">${pillar.stem}</div>
            <div class="char-meta">
              <span>天干</span>
              <span>五行 ${elementBadge(pillarStemElement)}</span>
              <span>十神 <strong>${stemTenGodLabel}</strong></span>
            </div>
          </div>
          <div class="pillar-char-row">
            <div class="pillar-char branch ${elementClass(pillarBranchElement)}">${pillar.branch}</div>
            <div class="char-meta">
              <span>地支</span>
              <span>五行 ${elementBadge(pillarBranchElement)}</span>
              <span>主氣 <strong>${mainStem}${branchTenGod}</strong></span>
              <span>藏干 ${hiddenTenGods}</span>
            </div>
          </div>
        </div>
      `;
    }

    function toBirthInput() {
      const dayChangeMethod = getSelected("dayChangeMethod");
      const calendarType = activeCalendarType;
      let solar;
      let lunar;

      if (calendarType === "solar") {
        solar = readSolarFields();
        validateBirthInput({ ...solar, timezoneOffset: defaults.timezoneOffset, lateZiSwitchDay: false });
        lunar = solarToLunar(solar);
      } else {
        lunar = readLunarFields();
        if (!isCompleteLunar(lunar)) throw new RangeError("請輸入完整的農曆出生年月日時。");
        const maxDay = getLunarMonthDays(lunar.year, lunar.month, lunar.isLeap);
        if (lunar.day > maxDay) throw new RangeError(`農曆${formatLunarMonth(lunar.month, lunar.isLeap)}此年只有${maxDay}天。`);
        solar = lunarToSolar(lunar, lunar.hour, lunar.minute);
      }

      return {
        ...solar,
        gender: getSelected("gender"),
        birthHemisphere: getSelected("birthHemisphere"),
        dayChangeMethod,
        lateZiSwitchDay: dayChangeMethod === "子初換日",
        timezoneOffset: defaults.timezoneOffset,
        displayName: document.getElementById("profile-name").value.trim(),
        calendarType,
        birthLunar: lunar
      };
    }

    function getTargetAnnualYear() {
      const year = Number(document.getElementById("annual-target-year").value);
      return Number.isInteger(year) && year >= 1 ? year : new Date().getFullYear();
    }

    function validateBirthInput(input) {
      const date = new Date(Date.UTC(0, input.month - 1, input.day, input.hour, input.minute));
      date.setUTCFullYear(input.year);
      const isValid =
        Number.isInteger(input.year) &&
        Number.isInteger(input.month) &&
        Number.isInteger(input.day) &&
        Number.isInteger(input.hour) &&
        Number.isInteger(input.minute) &&
        input.year >= 1 &&
        input.year <= 9999 &&
        input.month >= 1 &&
        input.month <= 12 &&
        input.hour >= 0 &&
        input.hour <= 23 &&
        input.minute >= 0 &&
        input.minute <= 59 &&
        date.getUTCFullYear() === input.year &&
        date.getUTCMonth() === input.month - 1 &&
        date.getUTCDate() === input.day;

      if (!isValid) {
        throw new RangeError("請輸入有效的陽曆生日。");
      }
    }

    function ganzhiFromIndex(index) {
      const i = ((index % 60) + 60) % 60;
      const stem = stems[i % 10];
      const branch = branches[i % 12];
      return { stem, branch, ganzhi: `${stem}${branch}` };
    }

    function toJulianDayNumber(year, month, day) {
      const a = Math.floor((14 - month) / 12);
      const y = year + 4800 - a;
      const m = month + 12 * a - 3;
      return day + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    }

    function utcTime(year, monthIndex, day, hour = 0, minute = 0) {
      const date = new Date(Date.UTC(0, monthIndex, day, hour, minute));
      date.setUTCFullYear(year);
      return date.getTime();
    }

    function localTimeToUtcMs(year, month, day, hour = 0, minute = 0, timezoneOffset = engineTimezoneOffset) {
      return utcTime(year, month - 1, day, hour, minute) - timezoneOffset * 60 * msPerMinute;
    }

    function normalizeDegrees(value) {
      return ((value % 360) + 360) % 360;
    }

    function degreesToRadians(value) {
      return value * Math.PI / 180;
    }

    function signedAngleDifference(longitude, target) {
      return ((normalizeDegrees(longitude - target) + 540) % 360) - 180;
    }

    function julianDayFromUtcMs(utcMs) {
      return utcMs / msPerDay + 2440587.5;
    }

    function getSolarApparentLongitude(utcMs) {
      const jd = julianDayFromUtcMs(utcMs);
      const t = (jd - 2451545.0) / 36525;
      const meanLongitude = normalizeDegrees(280.46646 + 36000.76983 * t + 0.0003032 * t * t);
      const meanAnomaly = 357.52911 + 35999.05029 * t - 0.0001537 * t * t;
      const anomalyRad = degreesToRadians(meanAnomaly);
      const equationOfCenter =
        (1.914602 - 0.004817 * t - 0.000014 * t * t) * Math.sin(anomalyRad) +
        (0.019993 - 0.000101 * t) * Math.sin(2 * anomalyRad) +
        0.000289 * Math.sin(3 * anomalyRad);
      const trueLongitude = meanLongitude + equationOfCenter;
      const omega = 125.04 - 1934.136 * t;
      return normalizeDegrees(trueLongitude - 0.00569 - 0.00478 * Math.sin(degreesToRadians(omega)));
    }

    function findSolarTermUtcMs(year, term) {
      const estimate = localTimeToUtcMs(year, term.month, term.day, 12);
      const target = term.longitude;
      let lower = estimate - 5 * msPerDay;
      let upper = estimate + 5 * msPerDay;
      let lowerDiff = signedAngleDifference(getSolarApparentLongitude(lower), target);
      let upperDiff = signedAngleDifference(getSolarApparentLongitude(upper), target);

      if (lowerDiff > 0 || upperDiff < 0) {
        let previousTime = lower;
        let previousDiff = lowerDiff;
        for (let time = lower + 6 * 60 * msPerMinute; time <= upper; time += 6 * 60 * msPerMinute) {
          const diff = signedAngleDifference(getSolarApparentLongitude(time), target);
          if (previousDiff <= 0 && diff >= 0) {
            lower = previousTime;
            upper = time;
            lowerDiff = previousDiff;
            upperDiff = diff;
            break;
          }
          previousTime = time;
          previousDiff = diff;
        }
      }

      if (lowerDiff > 0 || upperDiff < 0) {
        throw new Error(`Cannot bracket solar term ${term.name} for ${year}`);
      }

      for (let i = 0; i < 50; i += 1) {
        const mid = (lower + upper) / 2;
        const diff = signedAngleDifference(getSolarApparentLongitude(mid), target);
        if (diff >= 0) upper = mid;
        else lower = mid;
      }

      return Math.round(upper / 60000) * 60000;
    }

    function getSolarMonthTermTimes(year) {
      return solarMonthTerms
        .map((term) => ({ ...term, utcMs: findSolarTermUtcMs(year, term) }))
        .sort((a, b) => a.utcMs - b.utcMs);
    }

    function dateParts(date) {
      return {
        year: date.getUTCFullYear(),
        month: date.getUTCMonth() + 1,
        day: date.getUTCDate(),
        hour: date.getUTCHours(),
        minute: date.getUTCMinutes()
      };
    }

    function normalizeBirthDate(input) {
      const sourceUtcMs = utcTime(input.year, input.month - 1, input.day, input.hour, input.minute) -
        input.timezoneOffset * 60 * msPerMinute;
      const engineDate = new Date(sourceUtcMs + engineTimezoneOffset * 60 * msPerMinute);
      const normalized = dateParts(engineDate);
      const dayPillarDate = input.lateZiSwitchDay && normalized.hour === 23
        ? new Date(utcTime(normalized.year, normalized.month - 1, normalized.day) + msPerDay)
        : engineDate;
      const dayPillarParts = dateParts(dayPillarDate);

      return {
        ...normalized,
        dayPillarYear: dayPillarParts.year,
        dayPillarMonth: dayPillarParts.month,
        dayPillarDay: dayPillarParts.day
      };
    }

    function isAfterLiChun(year, month, day, hour, minute) {
      const birthUtcMs = localTimeToUtcMs(year, month, day, hour, minute);
      const liChun = getSolarMonthTermTimes(year).find((term) => term.indexFromYin === 0);
      if (!liChun) throw new Error(`Cannot find Li Chun for ${year}`);
      return birthUtcMs >= liChun.utcMs;
    }

    function getYearPillar(year, afterLiChun = true) {
      return ganzhiFromIndex((afterLiChun ? year : year - 1) - jiaZiYear);
    }

    function getSolarMonthIndex(year, month, day, hour, minute) {
      const birthUtcMs = localTimeToUtcMs(year, month, day, hour, minute);
      let current = 10;

      for (const term of getSolarMonthTermTimes(year)) {
        if (birthUtcMs >= term.utcMs) {
          current = term.indexFromYin;
        } else {
          break;
        }
      }

      return current;
    }

    function getMonthPillar(yearStem, year, month, day, hour, minute) {
      const monthIndex = getSolarMonthIndex(year, month, day, hour, minute);
      const startStem = tigerStartStemByYearStem[yearStem];
      const stem = stems[(stems.indexOf(startStem) + monthIndex) % 10];
      const branch = monthBranches[monthIndex % 12];
      return { stem, branch, ganzhi: `${stem}${branch}` };
    }

    function getDayPillar(year, month, day) {
      return ganzhiFromIndex(toJulianDayNumber(year, month, day) + jiaZiDayOffset);
    }

    function getHourBranch(hour) {
      return branches[Math.floor((hour + 1) / 2) % 12];
    }

    function getHourPillar(dayStem, hour) {
      const branch = getHourBranch(hour);
      const startStem = ratStartStemByDayStem[dayStem];
      const stem = stems[(stems.indexOf(startStem) + branches.indexOf(branch)) % 10];
      return { stem, branch, ganzhi: `${stem}${branch}` };
    }

    function calculateFourPillars(input) {
      const normalized = normalizeBirthDate(input);
      const year = getYearPillar(normalized.year, isAfterLiChun(normalized.year, normalized.month, normalized.day, normalized.hour, normalized.minute));
      const month = getMonthPillar(year.stem, normalized.year, normalized.month, normalized.day, normalized.hour, normalized.minute);
      const day = getDayPillar(normalized.dayPillarYear, normalized.dayPillarMonth, normalized.dayPillarDay);
      const hour = getHourPillar(day.stem, normalized.hour);
      return { year, month, day, hour, normalized };
    }

    function getAnnualFlows(targetYear, dayMaster) {
      return Array.from({ length: 9 }, (_, index) => getAnnualFlow(targetYear - 3 + index, dayMaster));
    }

    function calculateBaziChart(input, targetYear) {
      const pillars = calculateFourPillars(input);
      const dayMaster = pillars.day.stem;
      const luckDirection = getLuckDirection(input.gender, pillars.year.stem);
      const luckStartInfo = calculateLuckStartInfo(input, luckDirection);
      const luckCycles = calculateLuckCycles(pillars.month, dayMaster, input.year, luckDirection, luckStartInfo.startAge, 10);
      const annualFlows = getAnnualFlows(targetYear, dayMaster);
      return {
        ...pillars,
        dayMaster,
        luckDirection,
        luckStartInfo,
        luckCycles,
        annualFlows,
        targetYear
      };
    }

    function toPayloadPillar(pillar, dayMaster, label) {
      const mainStem = branchMainStem[pillar.branch];
      return {
        label,
        stem: pillar.stem,
        branch: pillar.branch,
        pillar: pillar.ganzhi,
        stemElement: stemElement[pillar.stem],
        branchElement: branchElement[pillar.branch],
        tenGodStem: label === "day" ? "日主" : getTenGod(dayMaster, pillar.stem),
        branchMainStem: mainStem,
        branchMainTenGod: getTenGod(dayMaster, mainStem),
        hiddenStems: hiddenStems[pillar.branch].map((stem, index) => ({
          stem,
          element: stemElement[stem],
          tenGod: getTenGod(dayMaster, stem),
          qiType: index === 0 ? "本氣" : index === 1 ? "中氣" : "餘氣"
        }))
      };
    }

    function countTenGods(pillars, dayMaster) {
      const counts = {
        比肩: 0, 劫財: 0, 食神: 0, 傷官: 0, 正財: 0,
        偏財: 0, 正官: 0, 七殺: 0, 正印: 0, 偏印: 0
      };
      for (const pillar of Object.values(pillars)) {
        const stemGod = getTenGod(dayMaster, pillar.stem);
        if (stemGod !== "日主" && counts[stemGod] !== undefined) counts[stemGod] += 1;
        for (const stem of hiddenStems[pillar.branch]) {
          const god = getTenGod(dayMaster, stem);
          if (counts[god] !== undefined) counts[god] += 1;
        }
      }
      return counts;
    }

    function countFiveElementsForPayload(pillars) {
      const counts = { 木: 0, 火: 0, 土: 0, 金: 0, 水: 0 };
      for (const pillar of Object.values(pillars)) {
        counts[stemElement[pillar.stem]] += 1;
        counts[branchElement[pillar.branch]] += 1;
      }
      return counts;
    }

    function buildBaziAnalysisPayload(chart, input) {
      const rawPillars = {
        year: chart.year,
        month: chart.month,
        day: chart.day,
        hour: chart.hour
      };
      const pillars = {
        year: toPayloadPillar(chart.year, chart.dayMaster, "year"),
        month: toPayloadPillar(chart.month, chart.dayMaster, "month"),
        day: toPayloadPillar(chart.day, chart.dayMaster, "day"),
        hour: toPayloadPillar(chart.hour, chart.dayMaster, "hour")
      };
      const annualLuck = chart.annualFlows.find((annual) => annual.year === chart.targetYear) ?? chart.annualFlows[3];
      const currentLuck = chart.luckCycles.find((cycle) => chart.targetYear >= cycle.startYear && chart.targetYear <= cycle.endYear) ?? chart.luckCycles[0] ?? null;

      return {
        meta: {
          version: "1.0.0",
          source: "bazi-input-test",
          generatedAt: new Date().toISOString()
        },
        user: {
          name: input.displayName || "",
          displayName: input.displayName || "",
          gender: input.gender === "男" ? "male" : "female",
          birthSolar: `${input.year}-${String(input.month).padStart(2, "0")}-${String(input.day).padStart(2, "0")} ${String(input.hour).padStart(2, "0")}:${String(input.minute).padStart(2, "0")}`,
          birthLunar: formatLunarRecord(input.birthLunar),
          birthLunarData: input.birthLunar,
          inputCalendarType: input.calendarType,
          birthPlace: input.birthHemisphere,
          timezone: input.timezoneOffset === 8 ? "Asia/Taipei" : `UTC${input.timezoneOffset >= 0 ? "+" : ""}${input.timezoneOffset}`,
          dayChangeRule: input.lateZiSwitchDay ? "lateZiHour" : "midnight"
        },
        pillars,
        dayMaster: {
          stem: chart.dayMaster,
          element: stemElement[chart.dayMaster],
          yinYang: stemYinYang[chart.dayMaster]
        },
        fiveElements: countFiveElementsForPayload(rawPillars),
        tenGodCounts: countTenGods(rawPillars, chart.dayMaster),
        luckCycles: chart.luckCycles.map((cycle) => ({
          ageStart: cycle.startAge,
          ageEnd: cycle.endAge,
          ageStartExact: cycle.startAgeExact,
          yearStart: cycle.startYear,
          yearEnd: cycle.endYear,
          pillar: cycle.ganzhi,
          stem: cycle.stem,
          branch: cycle.branch,
          stemTenGod: cycle.stemTenGod,
          branchTenGod: cycle.branchMainTenGod,
          elementTheme: [stemElement[cycle.stem], branchElement[cycle.branch]]
        })),
        luckStartInfo: {
          direction: chart.luckStartInfo.direction,
          startAge: chart.luckStartInfo.startAge,
          diffHours: chart.luckStartInfo.diffHours,
          solarTermName: chart.luckStartInfo.solarTermName,
          solarTermTime: chart.luckStartInfo.solarTermTime
        },
        currentLuck: currentLuck ? {
          ageStart: currentLuck.startAge,
          ageEnd: currentLuck.endAge,
          pillar: currentLuck.ganzhi,
          stem: currentLuck.stem,
          branch: currentLuck.branch,
          stemTenGod: currentLuck.stemTenGod,
          branchTenGod: currentLuck.branchMainTenGod
        } : null,
        annualLuck: annualLuck ? {
          year: annualLuck.year,
          pillar: annualLuck.ganzhi,
          stem: annualLuck.stem,
          branch: annualLuck.branch,
          stemTenGod: annualLuck.stemTenGod,
          branchTenGod: annualLuck.branchMainTenGod
        } : null,
        monthlyLuck: []
      };
    }

    function renderPillars(chart, input) {
      const dayMaster = chart.day.stem;
      const labels = [
        ["年柱", chart.year],
        ["月柱", chart.month],
        ["日柱", chart.day],
        ["時柱", chart.hour]
      ];
      document.getElementById("pillars").innerHTML = labels.map(([label, pillar]) => {
        const stemTenGod = label === "日柱" ? "日主" : getTenGod(dayMaster, pillar.stem);

        return `
          <div class="pillar">
            <div class="pillar-label">${label}</div>
            ${renderPillarContent(pillar, dayMaster, stemTenGod)}
          </div>
        `;
      }).join("");

    }

    function renderLuckAndAnnual(chart) {
      document.getElementById("luck-direction-note").textContent =
        `${chart.luckDirection}｜${chart.luckStartInfo.startAge}歲起運｜取${chart.luckStartInfo.solarTermName} ${chart.luckStartInfo.solarTermTime}｜相差約${chart.luckStartInfo.diffHours}小時`;

      document.getElementById("luck-cycles").innerHTML = chart.luckCycles.map((cycle) => {
        return `
          <div class="luck-item">
            <div class="luck-head">
              <span>第 ${cycle.index} 運</span>
              <span>${cycle.startAge}-${cycle.endAge} 歲</span>
            </div>
            <div class="luck-head"><span>${cycle.startYear}-${cycle.endYear}</span><span>${cycle.ganzhi}</span></div>
            ${renderPillarContent(cycle, chart.dayMaster, cycle.stemTenGod)}
          </div>
        `;
      }).join("");

      document.getElementById("annual-flow").innerHTML = chart.annualFlows.map((annual) => `
        <div class="annual-card">
          <div class="luck-head">
            <span>${annual.year} 年</span>
            <span>${annual.year === chart.targetYear ? `當年 ${annual.ganzhi}` : annual.ganzhi}</span>
          </div>
          ${renderPillarContent(annual, chart.dayMaster, annual.stemTenGod)}
        </div>
      `).join("");
    }

    document.getElementById("year").value = String(defaults.year);
    document.getElementById("annual-target-year").value = String(new Date().getFullYear());

    appendOptions(
      document.getElementById("month"),
      Array.from({ length: 12 }, (_, index) => ({ value: index + 1, label: `${index + 1} 月` })),
      defaults.month
    );

    updateDayOptions();

    appendOptions(
      document.getElementById("hour"),
      Array.from({ length: 24 }, (_, hour) => {
        const branch = branches[Math.floor((hour + 1) / 2) % 12];
        return { value: hour, label: `${hour} ${branch}時` };
      }),
      defaults.hour
    );

    appendOptions(
      document.getElementById("minute"),
      Array.from({ length: 60 }, (_, minute) => ({ value: minute, label: `${String(minute).padStart(2, "0")} 分` })),
      defaults.minute
    );

    document.getElementById("lunar-year").value = String(defaults.year);
    appendOptions(
      document.getElementById("lunar-hour"),
      Array.from({ length: 24 }, (_, hour) => {
        const branch = branches[Math.floor((hour + 1) / 2) % 12];
        return { value: hour, label: `${hour} ${branch}時` };
      }),
      defaults.hour
    );
    appendOptions(
      document.getElementById("lunar-minute"),
      Array.from({ length: 60 }, (_, minute) => ({ value: minute, label: `${String(minute).padStart(2, "0")} 分` })),
      defaults.minute
    );
    updateLunarMonthOptions();
    setLunarFields(solarToLunar({ ...defaults }), defaults.hour, defaults.minute);
    updateCalendarPreview();

    document.querySelectorAll('input[name="calendarType"]').forEach((radio) => {
      radio.addEventListener("change", () => setCalendarType(radio.value));
    });

    document.getElementById("set-current-time").addEventListener("click", () => {
      const now = new Date();
      const solar = {
        year: now.getFullYear(),
        month: now.getMonth() + 1,
        day: now.getDate(),
        hour: now.getHours(),
        minute: now.getMinutes()
      };
      setSolarFields(solar);
      const lunar = solarToLunar(solar);
      setLunarFields(lunar, solar.hour, solar.minute);
      lastConvertedSolar = solar;
      lastConvertedLunar = lunar;
      document.getElementById("annual-target-year").value = String(now.getFullYear());
      selectedMinute = now.getMinutes();
      document.getElementById("current-time-note").textContent =
        `已帶入 ${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(selectedMinute).padStart(2, "0")}`;
      updateCalendarPreview();
    });

    document.getElementById("year").addEventListener("change", () => {
      updateDayOptions();
      updateCalendarPreview();
    });
    document.getElementById("year").addEventListener("input", () => {
      updateDayOptions();
      updateCalendarPreview();
    });
    document.getElementById("month").addEventListener("change", () => {
      updateDayOptions();
      updateCalendarPreview();
    });
    ["day", "hour", "minute"].forEach((id) => document.getElementById(id).addEventListener("change", updateCalendarPreview));
    document.getElementById("lunar-year").addEventListener("input", () => {
      updateLunarMonthOptions();
      updateCalendarPreview();
    });
    document.getElementById("lunar-year").addEventListener("change", () => {
      updateLunarMonthOptions();
      updateCalendarPreview();
    });
    document.getElementById("lunar-month").addEventListener("change", () => {
      updateLunarDayOptions();
      updateCalendarPreview();
    });
    ["lunar-day", "lunar-hour", "lunar-minute"].forEach((id) => document.getElementById(id).addEventListener("change", updateCalendarPreview));

    document.getElementById("tab-chart").addEventListener("click", () => showTab("chart"));
    document.getElementById("tab-profiles").addEventListener("click", () => showTab("profiles"));
    document.getElementById("profile-search").addEventListener("input", renderProfiles);
    document.getElementById("profile-list").addEventListener("click", (event) => {
      const useButton = event.target.closest("[data-profile-id]");
      if (useButton) {
        const profile = getStoredProfiles().find((item) => item.id === useButton.dataset.profileId);
        if (profile) loadBaziProfile(profile);
        return;
      }
      const deleteButton = event.target.closest("[data-delete-profile-id]");
      if (!deleteButton) return;
      const profile = getStoredProfiles().find((item) => item.id === deleteButton.dataset.deleteProfileId);
      if (!profile) return;
      if (window.confirm(`確定要刪除「${profile.name || "未命名命主"}」的命主紀錄嗎？\n此動作無法復原。`)) {
        deleteBaziProfile(profile.id);
        renderProfiles();
        void syncDeletedBaziProfileToCloud(profile.id);
      }
    });

    function calculateAndRender() {
      try {
        const input = toBirthInput();
        validateBirthInput(input);
        const chart = calculateBaziChart(input, getTargetAnnualYear());
        latestChart = chart;
        latestInput = input;
        const savedProfile = saveBaziProfile(buildBaziProfileRecord(input));
        void syncBaziProfileToCloud(savedProfile);
        renderPillars(chart, input);
        renderLuckAndAnnual(chart);
        document.getElementById("result").hidden = false;
        document.getElementById("open-analysis").disabled = false;
        return true;
      } catch (error) {
        alert(error instanceof Error ? error.message : "輸入資料有誤，請重新確認。");
        return false;
      }
    }

    document.getElementById("confirm-annual-year").addEventListener("click", calculateAndRender);

    document.getElementById("open-analysis").addEventListener("click", () => {
      if (!latestChart || !latestInput) {
        if (!calculateAndRender()) return;
      }
      const payload = buildBaziAnalysisPayload(latestChart, latestInput);
      localStorage.setItem("baziAnalysisPayload", JSON.stringify(payload));
      window.location.href = "./bazi-analysis.html";
    });

    document.getElementById("birth-form").addEventListener("submit", (event) => {
      event.preventDefault();
      calculateAndRender();
    });

    void initializeBaziProfileCloud();
  </script>
</body>
</html>
