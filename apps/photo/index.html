<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>攝影集｜Louisko</title>
<style>
:root{--bg:#f4f1ea;--ink:#272520;--muted:#777168;--line:rgba(39,37,32,.16);--panel:#fbfaf6;--accent:#8b2f23}
*{box-sizing:border-box}
body{margin:0;color:var(--ink);background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.7}
a{color:inherit}.shell{max-width:980px;margin:0 auto;padding:28px 20px 64px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:42px}.brand{font-weight:900;text-decoration:none}.back{border:1px solid var(--line);background:white;border-radius:999px;padding:10px 16px;text-decoration:none;font-weight:800}.hero{padding:34px 0 28px;border-bottom:1px solid var(--line)}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.14em}h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;font-size:48px;line-height:1.08;margin:10px 0 14px;letter-spacing:0}.lead{color:var(--muted);font-size:18px;margin:0;max-width:720px}.content{margin-top:30px;border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:24px}@media(max-width:620px){.top{align-items:flex-start;flex-direction:column}h1{font-size:34px}.back{width:100%;text-align:center}}
</style>
</head>
<body>
<main class="shell">
  <nav class="top"><a class="brand" href="../../index.html">Louisko</a><a class="back" href="../../index.html">回首頁</a></nav>
  <section class="hero"><h1>攝影集</h1></section>
</main>
</body>
</html>
