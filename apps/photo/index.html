<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHOTO｜Louisko</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="../../assets/louisko-theme.css" />
</head>
<body>
  <header class="app-header">
    <a class="brand-link" href="/" aria-label="回 Louisko 首頁">
      <img id="brandLogo" alt="Louis" />
    </a>
    <div>
      <p class="eyebrow">LOUIS IMAGE PROCESSOR</p>
      <h1>PHOTO</h1>
    </div>
  </header>

  <main class="app-shell">
    <section class="toolbar">
      <button class="tab-button is-active" data-view="upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>上傳</span></button>
      <button class="tab-button" data-view="albums"><i class="fa-solid fa-images"></i><span>相簿</span></button>
      <button id="cloudPullButton" class="tab-button" type="button"><i class="fa-solid fa-cloud-arrow-down"></i><span>讀取雲端</span></button>
      <a class="home-button" href="/" title="回首頁"><i class="fa-solid fa-house"></i></a>
    </section>

    <section id="uploadView" class="view is-active">
      <div class="upload-layout">
        <section class="panel upload-panel">
          <div class="panel-head">
            <div>
              <p class="label">目前相簿</p>
              <select id="albumSelect"></select>
            </div>
            <button id="newAlbumButton" class="icon-button" title="建立相簿"><i class="fa-solid fa-plus"></i></button>
          </div>

          <label class="drop-zone" for="fileInput">
            <i class="fa-solid fa-file-arrow-up"></i>
            <strong>選擇或拖曳照片</strong>
            <span>JPG / PNG / WEBP / HEIC</span>
          </label>
          <div class="mobile-pickers">
            <label class="picker-button" for="fileInput"><i class="fa-solid fa-images"></i><span>照片圖庫</span></label>
            <label class="picker-button" for="cameraInput"><i class="fa-solid fa-camera"></i><span>直接拍照</span></label>
          </div>
          <input id="fileInput" type="file" accept="image/*,.heic,.heif,image/heic,image/heif" multiple />
          <input id="cameraInput" type="file" accept="image/*,.heic,.heif,image/heic,image/heif" capture="environment" />

          <div class="status-row">
            <progress id="progressBar" max="100" value="0"></progress>
            <span id="statusText">準備就緒</span>
          </div>
          <div id="errorList" class="error-list" hidden></div>
        </section>
      </div>
    </section>

    <section id="albumsView" class="view">
      <div class="section-head">
        <div>
          <p class="label">Albums</p>
          <h2>相簿列表</h2>
        </div>
        <button class="secondary-button" data-view-jump="upload"><i class="fa-solid fa-arrow-left"></i><span>回到上傳頁面</span></button>
      </div>
      <div id="albumStatus" class="cloud-status" hidden></div>
      <div id="albumGrid" class="album-grid"></div>
    </section>

    <section id="detailView" class="view">
      <div class="section-head">
        <div>
          <p class="label">Album</p>
          <h2 id="detailTitle">相簿</h2>
        </div>
        <button class="secondary-button" data-view-jump="upload"><i class="fa-solid fa-arrow-left"></i><span>回到上傳頁面</span></button>
      </div>

      <div class="album-actions">
        <button id="selectAllButton"><i class="fa-solid fa-check-double"></i><span>全選</span></button>
        <button id="clearSelectButton"><i class="fa-regular fa-square"></i><span>取消全選</span></button>
        <button id="rotateLeftButton"><i class="fa-solid fa-rotate-left"></i><span>向左旋轉</span></button>
        <button id="rotateRightButton"><i class="fa-solid fa-rotate-right"></i><span>向右旋轉</span></button>
        <button id="resetButton"><i class="fa-solid fa-rotate"></i><span>重設</span></button>
        <button id="deletePhotosButton" class="danger"><i class="fa-solid fa-trash"></i><span>刪除選取</span></button>
        <button id="downloadButton"><i class="fa-solid fa-file-zipper"></i><span>下載選取</span></button>
        <button id="slideshowButton"><i class="fa-solid fa-circle-play"></i><span>連續播放</span></button>
        <button id="shareButton" class="mobile-share-button"><i class="fa-solid fa-share-nodes"></i><span>分享照片</span></button>
        <button id="cloudSyncButton"><i class="fa-solid fa-cloud-arrow-up"></i><span>同步雲端</span></button>
        <button id="cloudRefreshButton"><i class="fa-solid fa-cloud-arrow-down"></i><span>讀取雲端</span></button>
      </div>
      <div id="cloudStatus" class="cloud-status" hidden></div>

      <div id="photoGrid" class="photo-grid"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="closeLightbox" class="lightbox-close" title="關閉"><i class="fa-solid fa-xmark"></i></button>
    <button id="stopSlideshow" class="lightbox-stop" title="暫停輪播" aria-label="暫停輪播" hidden><i class="fa-solid fa-pause"></i></button>
    <button id="prevPhoto" class="lightbox-nav prev" title="上一張"><i class="fa-solid fa-chevron-left"></i></button>
    <img id="lightboxImage" alt="" />
    <button id="nextPhoto" class="lightbox-nav next" title="下一張"><i class="fa-solid fa-chevron-right"></i></button>
    <p id="lightboxCaption"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
